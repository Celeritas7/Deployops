<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployOps</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#07090f;--surface:#0f1219;--surface2:#161c28;--surface3:#1e2538;--border:#2a3350;--text:#e2e8f0;--text2:#94a3b8;--accent:#60a5fa;--accent2:#818cf8;--red:#f87171;--green:#34d399;--orange:#fbbf24;--pink:#f472b6;--cyan:#22d3ee}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.logo{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.topbar select{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:4px 10px;border-radius:6px;font-size:12px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--accent);background:var(--surface3)}
.btn-primary{background:var(--accent);color:#000;font-weight:600;border-color:var(--accent)}
.btn-primary:hover{opacity:.9}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-green{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
.admin-only{display:none}
.is-admin .admin-only{display:inline-flex}
.is-admin .add-form.admin-only{display:flex}
.is-admin div.mode-indicator.admin-only{display:inline-block}
body[data-tab="models"] #drawingSelect,
body[data-tab="models"] #uploadPdfBtn,
body[data-tab="deploy"] #drawingSelect,
body[data-tab="deploy"] #uploadPdfBtn{display:none!important}

/* TABS */
.tabbar{display:flex;gap:2px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;background:none;border:none;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-panel{display:none;padding:20px}
.tab-panel.active{display:block}

/* DRAWING VIEWER */
.drawing-area{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:10px}
.drawing-area.fullscreen-mode{position:fixed;inset:0;z-index:999;background:var(--bg);margin:0;border:none;border-radius:0}
.drawing-area.fullscreen-mode .drawing-container{max-height:calc(100vh - 50px)}
body.is-fullscreen .topbar,body.is-fullscreen .tabbar{display:none!important}
.drawing-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.drawing-container{position:relative;overflow:auto;max-height:calc(100vh - 220px)}
.drawing-container img{display:block;width:100%;user-select:none;-webkit-user-drag:none}
.drawing-container svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.drawing-container svg.interactive{pointer-events:all;touch-action:none}
.balloon-g{cursor:pointer;pointer-events:all}
.balloon-g:hover circle.b-main,.balloon-g:hover rect.b-main{stroke-width:3}
.balloon-g.selected circle.b-main,.balloon-g.selected rect.b-main{stroke:var(--cyan);stroke-width:4;filter:drop-shadow(0 0 6px rgba(34,211,238,.5))}
.tip-handle{cursor:move;pointer-events:all}
.tip-handle:hover circle{stroke-width:3}
.tip-handle.selected circle{stroke:var(--cyan);stroke-width:3}
.leader-line{pointer-events:none}

/* MODE PILLS */
.mode-pills{display:inline-flex;gap:4px;background:#000;border-radius:999px;padding:3px;align-items:center}
.mode-pill{padding:5px 12px;border-radius:999px;border:none;background:transparent;color:#aaa;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.mode-pill.active{background:var(--surface3);color:#fff}
.mode-pill .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.arrow-style-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.arrow-style-btn{padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-family:inherit;cursor:pointer}
.arrow-style-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;color:var(--text2)}
.upload-area .icon{font-size:48px}
.page-nav{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.mode-indicator{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.mode-indicator.add-mode{background:rgba(248,113,113,.15);color:var(--red);animation:pulse 1.5s infinite}
.mode-indicator.select-mode{background:rgba(96,165,250,.1);color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* CHECKLIST BUILDER */
.cl-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.cl-section-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.cl-section-header h3{font-size:14px;flex:1}
.cl-section-body{padding:12px 16px}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;border:1px solid transparent;transition:all .15s;margin:4px 0}
.cl-item:hover{background:var(--surface2);border-color:var(--border)}
.cl-item .order{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);min-width:24px}
.cl-item .label{flex:1;font-size:13px}
.cl-item .desc{font-size:11px;color:var(--text2);margin-top:2px}
.cl-item .meta{display:flex;gap:6px;flex-shrink:0}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.badge-blue{background:rgba(96,165,250,.12);color:var(--accent)}
.badge-red{background:rgba(248,113,113,.12);color:var(--red)}
.badge-green{background:rgba(52,211,153,.12);color:var(--green)}
.badge-orange{background:rgba(251,191,36,.12);color:var(--orange)}
.add-form{display:flex;gap:8px;flex-wrap:wrap;padding:12px;background:var(--surface3);border-radius:8px;margin-bottom:12px}
.add-form input,.add-form select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:12px;font-family:inherit}
.add-form input{flex:1;min-width:120px}
.sub-tabs{display:flex;gap:2px;margin-bottom:12px}
.sub-tab{padding:6px 14px;border-radius:6px;border:none;background:var(--surface2);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.sub-tab.active{background:var(--accent);color:#000;font-weight:600}

/* MODELS TAB */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.page-header h1{font-size:20px;flex:1;min-width:0}
.crumbs{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.crumbs a{color:var(--accent);cursor:pointer;text-decoration:none}
.crumbs a:hover{text-decoration:underline}
.crumbs .sep{opacity:.4}
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.model-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative}
.model-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(96,165,250,.15)}
.model-card .model-icon{font-size:28px;margin-bottom:6px}
.model-card h3{font-size:16px;margin-bottom:2px}
.model-card .ref{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:8px}
.model-card .desc{font-size:12px;color:var(--text2);margin-bottom:12px;min-height:30px;line-height:1.4}
.model-card .stats{display:flex;gap:14px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border);padding-top:10px}
.model-card .stats span{display:flex;flex-direction:column;gap:2px}
.model-card .stats b{color:var(--text);font-size:14px}
.model-card .card-actions{position:absolute;top:10px;right:10px;display:none;gap:4px}
.is-admin .model-card:hover .card-actions{display:flex}

/* PHASE TABS (inside a model) */
.phase-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--surface);border-radius:10px;padding:4px;border:1px solid var(--border);max-width:440px}
.phase-tab{flex:1;padding:10px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.phase-tab.active{background:var(--accent);color:#000}
.phase-tab .count{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.7}
.phase-tab.active .count{opacity:1}

/* PHASE TOOLBAR (above sections) */
.phase-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}

/* INLINE ADD ROW + +Add button */
.add-item-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;margin:6px 0 2px}
.add-item-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
.cl-item-inline{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--surface3);border:1px dashed var(--accent);border-radius:8px;margin:6px 0 2px;align-items:center}
.cl-item-inline .inline-input{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:7px 10px;border-radius:5px;font-size:12px;font-family:inherit}
.cl-item-inline .inline-input:focus{outline:none;border-color:var(--accent)}
.cl-item-inline .inline-label{flex:1;min-width:160px}
.cl-item-inline .inline-actions{display:flex;gap:4px;margin-left:auto;align-items:center}
.cl-item-inline .hint{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-right:4px;white-space:nowrap}
.empty-section-hint{padding:8px 10px;font-size:11px;color:var(--text2);font-style:italic;text-align:center}

.row-actions{display:flex;gap:4px}

/* PRINT MODAL — mode picker + phase radios */
.mode-pick{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.mode-card{flex:1 1 180px;padding:14px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;border-radius:10px;cursor:pointer;text-align:left;transition:all .15s;min-width:0}
.mode-card:hover{border-color:var(--accent)}
.mode-card.active{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 1px var(--accent) inset}
.mode-card-icon{font-size:24px;margin-bottom:4px}
.mode-card-title{font-size:13px;font-weight:700;margin-bottom:2px}
.mode-card-desc{font-size:11px;color:var(--text2);line-height:1.4}
.modal .radio-row{text-transform:none;letter-spacing:0;color:var(--text);font-size:13px;display:flex;align-items:center;gap:8px;margin:0 0 4px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer}
.modal .radio-row input{width:auto;margin:0}

/* UNITS */
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
.unit-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}
.unit-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(96,165,250,.1)}
.unit-card h3{font-size:15px;margin-bottom:6px}
.unit-card .progress{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:8px}
.unit-card .prog-bar{height:6px;background:var(--surface3);border-radius:3px;margin-top:4px;overflow:hidden}
.unit-card .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}

/* DEPLOY CHECKLIST */
.deploy-header{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.deploy-header h2{font-size:18px;flex:1}
.deploy-progress{width:100%;height:22px;background:var(--surface3);border-radius:6px;overflow:hidden;position:relative;margin-top:8px}
.deploy-progress .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:6px;transition:width .4s}
.deploy-progress .txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:600}
.deploy-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.deploy-section-header{padding:12px 16px;background:var(--surface2);font-weight:600;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.deploy-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.deploy-item:last-child{border-bottom:none}
.deploy-item:hover{background:var(--surface2)}
.deploy-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex-shrink:0;margin-top:2px}
.deploy-item.checked .di-label{text-decoration:line-through;color:var(--text2)}
.di-label{font-size:13px;flex:1}
.di-label .sub{display:block;font-size:11px;color:var(--text2);margin-top:2px}
.di-qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--orange);min-width:40px;text-align:right}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:340px;max-width:500px;width:90%}
.modal h3{margin-bottom:14px;font-size:16px}
.modal label{display:block;font-size:12px;color:var(--text2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:1px}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.modal textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* TOAST */
.toast-wrap{position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;color:white;animation:slideIn .3s ease}
.toast-ok{background:#059669}
.toast-err{background:#dc2626}
.toast-info{background:#2563eb}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:13px;margin-bottom:14px}

/* PRINT */
@media print{
  *{color-adjust:exact!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff;color:#111;overflow:visible!important}
  .topbar,.tabbar,.no-print,.btn,.admin-only,.add-form{display:none!important}
  .tab-panel.active{display:block!important;padding:0!important;margin:0!important}
  .tab-panel:not(.active){display:none!important}
  .deploy-section,.unit-card,.cl-section{background:#fff;border-color:#ccc;break-inside:avoid}
  .deploy-section-header{background:#f0f0f0!important}
  .deploy-item input[type=checkbox]{appearance:none;width:16px;height:16px;border:2px solid #333;border-radius:3px}
  .deploy-item.checked input[type=checkbox]::after{content:'✓';display:block;text-align:center;font-size:12px;line-height:14px}

  /* DRAWING TAB — A3 landscape, single page, aspect ratio preserved */
  #drawingTab.active{
    position:absolute;inset:0;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    background:#fff;
  }
  #drawingTab.active .drawing-area{
    border:none!important;background:#fff!important;border-radius:0!important;
    margin:0!important;
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    overflow:visible!important;
  }
  #drawingTab.active .drawing-toolbar{display:none!important}
  /* Container takes the natural aspect ratio of the image and scales to fit */
  #drawingTab.active .drawing-container{
    max-height:none!important;overflow:visible!important;
    position:relative;
    width:auto;height:auto;
    max-width:100%;max-height:100%;
    /* aspect-ratio is set inline via JS once the image loads (see print handler) */
  }
  #drawingTab.active .drawing-container img{
    display:block;
    width:100%;height:100%;
    object-fit:contain;
  }
  /* SVG keeps its viewBox-driven sizing, locked to the same box as img */
  #drawingTab.active .drawing-container svg{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
  }
}
@page{size:A3 landscape;margin:8mm}
@media(max-width:768px){
  .topbar{flex-direction:column;align-items:stretch;gap:8px}
  .topbar-right{margin-left:0;justify-content:flex-end}
  .tabbar{overflow-x:auto}
  .tab-panel{padding:12px}
}
</style>

      <button class="btn" onclick="handleLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:14px;height:14px"> Sign In</button>
    </div>
    <div id="userBadge" class="user-badge" style="display:none">
      <span id="userName"></span>
      <button class="btn btn-sm" onclick="handleLogout()" style="padding:2px 6px;font-size:10px">✕</button>

</div>

<!-- TAB BAR -->
<div class="tabbar">

  <button class="tab" data-tab="deploy" onclick="switchTab('deploy')">🚀 Deploy</button>
  <button class="tab" data-tab="drawing" onclick="switchTab('drawing')">📐 Drawings</button>
</div>

<!-- MODELS TAB -->
<div id="modelsTab" class="tab-panel active">

</div>

<!-- DEPLOY TAB -->
<div id="deployTab" class="tab-panel">

</div>

<!-- DRAWING TAB -->
<div id="drawingTab" class="tab-panel">
  <div id="drawingContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">

</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- HIDDEN FILE INPUT -->

function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============================================================
// AUTH
// ============================================================
function initAuth() {
  const stored = localStorage.getItem('deployops_token');
  if (stored) {
    try {
      const cred = JSON.parse(stored);
      setUser(cred);
    } catch(e) { localStorage.removeItem('deployops_token'); }
  }
}

function handleLogin() {
  if (typeof google === 'undefined') { toast('Google Sign-In not loaded yet','err'); return; }
  google.accounts.id.initialize({
    client_id: GIS_CLIENT_ID,
    callback: (resp) => {
      const payload = JSON.parse(atob(resp.credential.split('.')[1]));
      const cred = { email: payload.email, name: payload.name, picture: payload.picture };
      localStorage.setItem('deployops_token', JSON.stringify(cred));
      setUser(cred);
      toast('Signed in as ' + cred.name, 'ok');
    }
  });
  google.accounts.id.prompt((n) => {
    if (n.isNotDisplayed() || n.isSkippedMoment()) {
      google.accounts.id.renderButton(document.createElement('div'), { theme: 'outline' });
      google.accounts.id.prompt();
    }
  });
}

function handleLogout() {
  localStorage.removeItem('deployops_token');
  currentUser = null; isAdmin = false;
  document.getElementById('loginArea').style.display = '';
  document.getElementById('userBadge').style.display = 'none';
  document.body.classList.remove('is-admin');
  toast('Signed out','info');
}

function setUser(cred) {
  currentUser = cred;
  isAdmin = ADMIN_EMAILS.includes(cred.email);
  document.getElementById('loginArea').style.display = 'none';
  document.getElementById('userBadge').style.display = 'flex';
  document.getElementById('userName').textContent = cred.name;
  if (isAdmin) document.body.classList.add('is-admin');
  else document.body.classList.remove('is-admin');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + 'Tab').classList.add('active');
  document.body.dataset.tab = tab;
  if (tab === 'models')   renderModels();
  if (tab === 'drawing')  renderDrawing();
  if (tab === 'deploy')   { deployLoadedFor = null; renderDeploy(); } // reload — items may have changed in Models tab
}

function toast(msg, type = 'info') {
  const d = document.createElement('div');
  d.className = 'toast toast-' + type;
  d.textContent = msg;
  document.getElementById('toastWrap').appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

  document.getElementById('modalOverlay').classList.add('show');
}

async function loadDrawings() {
  const { data } = await sb.from('deployops_drawings').select('*').order('created_at', { ascending: false });
  drawings = data || [];
  const sel = document.getElementById('drawingSelect');
  sel.innerHTML = '<option value="">— Select Drawing —</option>';
  drawings.forEach(d => {
    sel.innerHTML += `<option value="${d.id}">${d.drawing_ref} — ${d.name}</option>`;
  });
  if (drawings.length === 1) { sel.value = drawings[0].id; selectDrawing(drawings[0].id); }
}

async function selectDrawing(id) {
  currentDrawing = drawings.find(d => d.id === id) || null;
  currentPage = 1;
  if (currentDrawing) {
    await loadBalloons();
  } else {
    balloons = [];
  }
  renderDrawing();
}

function triggerPDFFilePicker() {
  const input = document.getElementById('pdfInput');
  input.value = '';
  input.click();
}

function handlePDFUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const ref = file.name.replace(/\.pdf$/i, '');
  const name = ref.replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim();

  window._pendingPDF = file;

  showModal(`
    <h3>📤 Confirm Upload</h3>
    <p style="color:var(--muted);font-size:12px;margin:0 0 10px">File: <span id="upFilename"></span></p>
    <label>Drawing Reference (Part Number)</label>
    <input id="upRef">
    <label>Drawing Name</label>
    <input id="upName">
    <div class="modal-actions">
      <button class="btn" onclick="cancelPDFUpload()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmPDFUpload()">Confirm Upload</button>
    </div>
  `);
  document.getElementById('upFilename').textContent = file.name;
  document.getElementById('upRef').value = ref;
  document.getElementById('upName').value = name;
}

function cancelPDFUpload() {
  window._pendingPDF = null;
  closeModal();
}

async function confirmPDFUpload() {
  const ref = document.getElementById('upRef').value.trim();
  const name = document.getElementById('upName').value.trim();
  if (!ref || !name) { toast('Fill in both fields','err'); return; }
  const file = window._pendingPDF;
  if (!file) { toast('No file selected','err'); return; }
  window._pendingPDF = null;
  closeModal();

  toast('Converting PDF to images...','info');

  try {
    const arrayBuf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    const pageCount = pdf.numPages;

    // Create drawing record
    const { data: drawingRow, error: dbErr } = await sb.from('deployops_drawings').insert({
      drawing_ref: ref, name, page_count: pageCount,
      uploaded_by: currentUser?.email || 'unknown'
    }).select().single();
    if (dbErr) throw dbErr;

    // Convert each page to PNG and upload
    for (let i = 1; i <= pageCount; i++) {
      toast(`Processing page ${i}/${pageCount}...`,'info');
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 2.5 });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const path = `${ref}/page_${i}.png`;
      const { error: stErr } = await sb.storage.from('deployops-drawings').upload(path, blob, { contentType: 'image/png', upsert: true });
      if (stErr) throw stErr;
    }

    toast(`Drawing "${ref}" uploaded (${pageCount} pages)`,'ok');
    await loadDrawings();
    document.getElementById('drawingSelect').value = drawingRow.id;
    selectDrawing(drawingRow.id);
  } catch(e) {
    console.error(e);
    toast('Upload failed: ' + (e.message || e.statusText || JSON.stringify(e)),'err');
  }
}

function getPageURL(pageNum) {
  if (!currentDrawing) return '';
  const path = `${currentDrawing.drawing_ref}/page_${pageNum}.png`;
  const { data } = sb.storage.from('deployops-drawings').getPublicUrl(path);
  // Cache-bust after page deletion: pages get shifted in storage but the URL stays the
  // same, so the browser would serve the old image. The bumped stamp forces a fresh fetch.
  const bust = drawingCacheBust[currentDrawing.id];
  return bust ? `${data.publicUrl}?v=${bust}` : data.publicUrl;
}

const drawingCacheBust = {};

          </button>

            ${balloonMode==='add'?'CLICK TO PLACE':'SELECT MODE'}
          </div>
        <button class="btn btn-sm no-print" onclick="exportAnnotatedPNG()">📷 Export PNG</button>
        <button class="btn btn-sm no-print" id="fullscreenBtn" onclick="toggleFullscreen()">${isFullscreen?'✕ Exit Fullscreen':'⛶ Fullscreen'}</button>
        <button class="btn btn-sm no-print" onclick="window.print()">🖨️ Print</button>

function setCurrentMode(m) {
  currentMode = m;
  // Update toolbar without full re-render to preserve image state
  document.querySelectorAll('.mode-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.mode === m);
  });
  const btn = document.getElementById('balloonModeBtn');
  if (btn && balloonMode !== 'add') btn.innerHTML = '➕ Add ' + MODES[m].label;
  // Selection may point to a now-hidden balloon — clear it
  selectedBalloonId = null;
  renderBalloonsSVG();
}

function updateModePillCounts() {
  const counts = {};
  Object.keys(MODES).forEach(k => counts[k] = 0);
  balloons.filter(b => b.page === currentPage).forEach(b => {
    const m = b.mode || 'balloon';
    if (counts[m] !== undefined) counts[m]++;
  });
  document.querySelectorAll('.mode-pill').forEach(p => {
    const m = p.dataset.mode;
    if (!m || counts[m] === undefined) return;
    const labelEl = p.querySelector('.mode-label');
    if (labelEl) labelEl.textContent = `${MODES[m].label} (${counts[m]})`;
  });
}

function onDrawingLoad() {
  renderBalloonsSVG();
  const svg = document.getElementById('balloonSvg');
  if (svg && isAdmin) {
    svg.onclick = handleDrawingClick;
  }
  // Set aspect ratio on the container so print can scale it uniformly to fit the page
  const img = document.getElementById('drawingImg');
  const container = document.getElementById('drawingContainer');
  if (img && container && img.naturalWidth) {
    container.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
  }
}

function changePage(delta) {
  const np = currentPage + delta;
  if (np < 1 || np > currentDrawing.page_count) return;
  currentPage = np;
  renderDrawing();
}

function toggleBalloonMode() {
  balloonMode = balloonMode === 'add' ? 'select' : 'add';
  selectedBalloonId = null;
  renderDrawing();
}

function toggleFullscreen() {
  isFullscreen = !isFullscreen;
  const area = document.querySelector('.drawing-area');
  if (area) area.classList.toggle('fullscreen-mode', isFullscreen);
  document.body.classList.toggle('is-fullscreen', isFullscreen);
  const btn = document.getElementById('fullscreenBtn');
  if (btn) btn.innerHTML = isFullscreen ? '✕ Exit Fullscreen' : '⛶ Fullscreen';

async function handleDrawingClick(e) {
  if (isDragging) return;
  const svg = document.getElementById('balloonSvg');
  const img = document.getElementById('drawingImg');
  if (!img || !svg) return;

  // Check if click was on a balloon or its tip
  if (e.target.closest('.tip-handle')) return; // tip handles its own drag
  if (e.target.closest('.balloon-g')) {
    const g = e.target.closest('.balloon-g');
    const bid = g.dataset.id;
    if (balloonMode === 'select') {
      selectedBalloonId = selectedBalloonId === bid ? null : bid;
      renderBalloonsSVG();
      if (selectedBalloonId) showBalloonActions(bid);
    }
    return;
  }

  if (balloonMode !== 'add') { selectedBalloonId = null; renderBalloonsSVG(); return; }

  const rect = img.getBoundingClientRect();
  const tip_x = ((e.clientX - rect.left) / rect.width) * 100;
  const tip_y = ((e.clientY - rect.top) / rect.height) * 100;

  // Auto-place balloon in nearest margin (clear of drawing)
  const margin = 5; // % from edge
  const dxL = tip_x, dxR = 100 - tip_x, dyT = tip_y, dyB = 100 - tip_y;
  const minD = Math.min(dxL, dxR, dyT, dyB);
  let x_pct, y_pct;
  if (minD === dxL)      { x_pct = margin;     y_pct = tip_y; }
  else if (minD === dxR) { x_pct = 100-margin; y_pct = tip_y; }
  else if (minD === dyT) { x_pct = tip_x;      y_pct = margin; }
  else                   { x_pct = tip_x;      y_pct = 100-margin; }

  const isCable = MODES[currentMode].kind === 'tag';
  // Each mode gets independent numbering, scoped to the current page
  const sameModeOnPage = balloons.filter(b => b.page === currentPage && (b.mode||'balloon') === currentMode);
  const nextNum = sameModeOnPage.length > 0
    ? Math.max(...sameModeOnPage.map(b => b.number||0)) + 1 : 1;

  // Non-cable balloons: place directly without a modal. Number/label/color/arrow can be tweaked
  // afterward by clicking the balloon to open the edit modal.
  if (!isCable) {
    const { error } = await sb.from('deployops_balloons').insert({
      drawing_id: currentDrawing.id, page: currentPage,
      number: nextNum,
      x_pct, y_pct, tip_x_pct: tip_x, tip_y_pct: tip_y,
      label: '', color: MODES[currentMode].color, mode: currentMode,
      arrow_style: currentArrowStyle
    });
    if (error) { toast('Save failed: '+error.message,'err'); return; }
    toast(`${MODES[currentMode].label} placed`,'ok');
    await loadBalloons();
    renderBalloonsSVG();
    return;
  }

  showModal(`
    <h3>Add ${MODES[currentMode].label}</h3>
    ${isCable
      ? `<label>Tag Text</label><input id="bLabel" placeholder="e.g. CN-12, MAIN-A" autofocus>`
      : `<label>Number</label><input id="bNum" type="number" value="${nextNum}" autofocus>
         <label>Label (optional)</label><input id="bLabel" placeholder="e.g. SignalTowerASSY">`}
    <label>Color</label>
    <select id="bColor">
      <option value="${MODES[currentMode].color}">${MODES[currentMode].label} (default)</option>
      <option value="#e74c3c">🔴 Red</option>
      <option value="#2980b9">🔵 Blue</option>
      <option value="#27ae60">🟢 Green</option>
      <option value="#e67e22">🟠 Orange</option>
      <option value="#9b59b6">🟣 Purple</option>
      <option value="#fbbf24">🟡 Yellow</option>
      <option value="#22d3ee">🔷 Cyan</option>
      <option value="#111">⚫ Black</option>
    </select>
    <label>Arrow Style</label>
    <div class="arrow-style-row" id="arrowStyleRow">
      ${ARROW_STYLES.map(s => `<button type="button" class="arrow-style-btn ${s===currentArrowStyle?'active':''}" data-style="${s}" onclick="document.querySelectorAll('#arrowStyleRow .arrow-style-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">${s}</button>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBalloon(${x_pct},${y_pct},${tip_x},${tip_y})">Place</button>
    </div>
  `);
}

async function saveBalloon(x, y, tip_x, tip_y) {
  const isCable = MODES[currentMode].kind === 'tag';
  let num;
  if (isCable) {
    // Auto-increment silently for internal tracking — number is not displayed on the tag
    const cableNums = balloons.filter(b => (b.mode||'balloon') === 'cable').map(b => b.number || 0);
    num = cableNums.length ? Math.max(...cableNums) + 1 : 1;
  } else {
    num = parseInt(document.getElementById('bNum').value);
  }
  const label = document.getElementById('bLabel').value.trim();
  const color = document.getElementById('bColor').value;
  const arrowStyleEl = document.querySelector('#arrowStyleRow .arrow-style-btn.active');
  const arrow_style = arrowStyleEl ? arrowStyleEl.dataset.style : 'solid';
  currentArrowStyle = arrow_style;
  if (!isCable && isNaN(num)) { toast('Enter a number','err'); return; }
  if (isCable && !label) { toast('Enter tag text','err'); return; }
  closeModal();

  const { error } = await sb.from('deployops_balloons').insert({
    drawing_id: currentDrawing.id, page: currentPage,
    number: num, x_pct: x, y_pct: y,
    tip_x_pct: tip_x, tip_y_pct: tip_y,
    label, color, mode: currentMode, arrow_style
  });
  if (error) { toast('Save failed: '+error.message,'err'); return; }
  toast(`${MODES[currentMode].label} placed`,'ok');
  await loadBalloons();
  renderBalloonsSVG();
}

      <option value="#2980b9" ${b.color==='#2980b9'?'selected':''}>🔵 Blue</option>
      <option value="#27ae60" ${b.color==='#27ae60'?'selected':''}>🟢 Green</option>
      <option value="#e67e22" ${b.color==='#e67e22'?'selected':''}>🟠 Orange</option>
      <option value="#9b59b6" ${b.color==='#9b59b6'?'selected':''}>🟣 Purple</option>
      <option value="#fbbf24" ${b.color==='#fbbf24'?'selected':''}>🟡 Yellow</option>
      <option value="#22d3ee" ${b.color==='#22d3ee'?'selected':''}>🔷 Cyan</option>
      <option value="#111" ${b.color==='#111'?'selected':''}>⚫ Black</option>
    </select>
    <label>Arrow Style</label>
    <div class="arrow-style-row" id="arrowStyleRowEdit">
      ${ARROW_STYLES.map(s=>`<button type="button" class="arrow-style-btn ${s===curStyle?'active':''}" data-style="${s}" onclick="document.querySelectorAll('#arrowStyleRowEdit .arrow-style-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">${s}</button>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteBalloon('${bid}')">🗑️ Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateBalloon('${bid}',${isCable})">Save</button>
    </div>
  `);

async function updateBalloon(bid, isCable) {
  let num;
  if (isCable) {
    // Preserve the silently-assigned number — the field is not exposed in the edit modal
    const existing = balloons.find(x => x.id === bid);
    num = existing ? existing.number : null;
  } else {
    num = parseInt(document.getElementById('ebNum').value);
  }
  const label = document.getElementById('ebLabel').value.trim();
  const color = document.getElementById('ebColor').value;
  const styleEl = document.querySelector('#arrowStyleRowEdit .arrow-style-btn.active');
  const arrow_style = styleEl ? styleEl.dataset.style : 'solid';
  closeModal();
  await sb.from('deployops_balloons').update({ number: num, label, color, arrow_style }).eq('id', bid);
  toast('Updated','ok');
  await loadBalloons();
  renderBalloonsSVG();
}

async function deleteBalloon(bid) {
  closeModal();
  await sb.from('deployops_balloons').delete().eq('id', bid);
  toast('Balloon deleted','ok');
  selectedBalloonId = null;
  await loadBalloons();
  renderBalloonsSVG();
}

async function loadBalloons() {
  if (!currentDrawing) { balloons = []; return; }
  const { data } = await sb.from('deployops_balloons').select('*').eq('drawing_id', currentDrawing.id).order('number');
  balloons = data || [];
}

// Compute the point where the line from (cx,cy) toward (tx,ty) exits an
// axis-aligned rectangle of size w x h centered at (cx,cy). Used to clip
// cable-tag leader arrows so they meet the rectangle edge cleanly.
function rectEdgePoint(cx, cy, w, h, tx, ty) {
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return [cx, cy];
  const tX = dx !== 0 ? (w/2) / Math.abs(dx) : Infinity;
  const tY = dy !== 0 ? (h/2) / Math.abs(dy) : Infinity;
  const t = Math.min(tX, tY);
  return [cx + dx * t, cy + dy * t];
}

function renderBalloonsSVG() {
  const svg = document.getElementById('balloonSvg');
  const img = document.getElementById('drawingImg');
  if (!svg || !img) return;

  // Mode acts as a filter — only balloons of the active mode are shown
  const pageBalloons = balloons.filter(b => b.page === currentPage && (b.mode || 'balloon') === currentMode);
  updateModePillCounts();
  const r = 18; // balloon radius in SVG coords
  const imgW = img.naturalWidth || img.width;
  const imgH = img.naturalHeight || img.height;
  const vbW = 1000;
  const vbH = (imgH / imgW) * 1000;
  svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);

  // Build arrowhead defs (one per balloon color used, marker per style)
  const colors = [...new Set(pageBalloons.map(b => b.color || '#e74c3c'))];
  let defs = '<defs>';
  colors.forEach(c => {
    const id = 'ah_' + c.replace('#','');
    defs += `<marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="${c}"/></marker>`;
    defs += `<marker id="${id}_big" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="${c}"/></marker>`;
  });
  defs += '</defs>';

  let html = defs;
  pageBalloons.forEach(b => {
    const cx = b.x_pct / 100 * vbW;
    const cy = b.y_pct / 100 * vbH;
    const sel = b.id === selectedBalloonId ? ' selected' : '';
    const color = b.color || '#e74c3c';
    const isCable = (b.mode||'balloon') === 'cable';
    const style = b.arrow_style || (b.tip_x_pct!=null?'solid':'none');
    const ahId = 'ah_' + color.replace('#','');

    // Cable-tag rectangle dimensions (computed once, used for both leader trim and body)
    let tagW = 0, tagH = 0;
    if (isCable) {
      const text = b.label || '?';
      // Approx: 6.2px/char at font-size 10 + horizontal padding + indicator square + gap
      tagW = Math.max(34, text.length * 6.2 + 26);
      tagH = 18;
    }

    // Leader arrow (only if tip exists & style != none)
    if (b.tip_x_pct != null && b.tip_y_pct != null && style !== 'none') {
      const tx = b.tip_x_pct / 100 * vbW;
      const ty = b.tip_y_pct / 100 * vbH;
      // Compute line endpoint at edge of balloon shape (so arrow doesn't enter the body)
      let sx, sy;
      if (isCable) {
        [sx, sy] = rectEdgePoint(cx, cy, tagW, tagH, tx, ty);
      } else {
        const dx = tx - cx, dy = ty - cy;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        sx = cx + dx/dist * r;
        sy = cy + dy/dist * r;
      }

      let strokeW = 2, dash = '', marker = `url(#${ahId})`;
      if (style === 'dashed') { dash = '6 4'; }
      else if (style === 'thick') { strokeW = 3.5; marker = `url(#${ahId}_big)`; }
      else if (style === 'dot') { marker = ''; }

      html += `<line class="leader-line" x1="${sx}" y1="${sy}" x2="${tx}" y2="${ty}" stroke="${color}" stroke-width="${strokeW}" ${dash?`stroke-dasharray="${dash}"`:''} ${marker?`marker-end="${marker}"`:''} stroke-linecap="round"/>`;

      // dot style: filled dot at tip
      if (style === 'dot') {
        html += `<circle class="leader-line" cx="${tx}" cy="${ty}" r="4" fill="${color}"/>`;
      }

      // Tip handle (admin only, only when this balloon is selected)
      if (isAdmin && b.id === selectedBalloonId) {
        html += `<g class="tip-handle selected" data-id="${b.id}" data-role="tip">
          <circle cx="${tx}" cy="${ty}" r="6" fill="white" stroke="${color}" stroke-width="2"/>
        </g>`;
      }
    }

    // Balloon body
    html += `<g class="balloon-g${sel}" data-id="${b.id}" data-role="body">`;
    if (isCable) {
      // Rectangular tag — white background, colored border, green indicator on left
      const text = b.label || '?';
      const x0 = cx - tagW/2, y0 = cy - tagH/2;
      const indPad = 3;
      const indSize = tagH - indPad*2;
      const indX = x0 + indPad;
      const indY = y0 + indPad;
      const textX = indX + indSize + 4;
      html += `<rect class="b-main" x="${x0}" y="${y0}" width="${tagW}" height="${tagH}" rx="3" fill="white" stroke="${color}" stroke-width="1.5"/>
        <rect x="${indX}" y="${indY}" width="${indSize}" height="${indSize}" rx="1" fill="#27ae60"/>
        <text x="${textX}" y="${cy}" text-anchor="start" dominant-baseline="central" fill="#111" font-size="10" font-weight="700" font-family="DM Sans,sans-serif">${text}</text>`;
    } else {
      html += `<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="white" opacity="0.9" class="b-halo"/>
        <circle class="b-main" cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="white" stroke-width="1.5"/>
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="white"
              font-size="${r*1.1}" font-weight="700" font-family="DM Sans,sans-serif">${b.number||''}</text>`;
      if (b.label) {
        html += `<text x="${cx}" y="${cy + r + 10}" text-anchor="middle" fill="white"
                font-size="7" font-family="DM Sans,sans-serif" opacity="0.9"
                stroke="rgba(0,0,0,0.5)" stroke-width="2" paint-order="stroke">${b.label}</text>`;
      }
    }
    html += `</g>`;
  });
  svg.innerHTML = html;

  // Enable drag for admin
  if (isAdmin) {
    svg.querySelectorAll('.balloon-g').forEach(g => {
      g.addEventListener('pointerdown', startBalloonDrag);
    });
    svg.querySelectorAll('.tip-handle').forEach(g => {
      g.addEventListener('pointerdown', startTipDrag);
    });
  }
}

function startTipDrag(e) {
  e.preventDefault(); e.stopPropagation();
  isDragging = false;
  const g = e.currentTarget;
  const bid = g.dataset.id;
  const img = document.getElementById('drawingImg');
  if (!img) return;
  const svg = document.getElementById('balloonSvg');
  const vbW = 1000;
  const vbH = parseFloat(svg.getAttribute('viewBox').split(' ')[3]);

  const onMove = (ev) => {
    ev.preventDefault();
    isDragging = true;
    const rect = img.getBoundingClientRect();
    const tx_pct = Math.max(0, Math.min(100, ((ev.clientX - rect.left) / rect.width) * 100));
    const ty_pct = Math.max(0, Math.min(100, ((ev.clientY - rect.top) / rect.height) * 100));
    const tx = tx_pct/100*vbW, ty = ty_pct/100*vbH;
    g.querySelector('circle').setAttribute('cx', tx);
    g.querySelector('circle').setAttribute('cy', ty);
    // Update connected leader line in real time
    const line = svg.querySelector(`line.leader-line`);
    // Find lines belonging to this balloon — match by tip coords approx, easiest: re-render after move
    g._dragPos = { tx_pct, ty_pct };
  };

  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging && g._dragPos) {
      await sb.from('deployops_balloons').update({
        tip_x_pct: g._dragPos.tx_pct, tip_y_pct: g._dragPos.ty_pct
      }).eq('id', bid);
      await loadBalloons();
      renderBalloonsSVG();
    }
    setTimeout(() => { isDragging = false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

let isDragging = false;

function startBalloonDrag(e) {
  if (balloonMode === 'add') return;
  e.preventDefault();
  e.stopPropagation();
  isDragging = false;
  const g = e.currentTarget;
  const bid = g.dataset.id;
  const img = document.getElementById('drawingImg');
  if (!img) return;

  const onMove = (ev) => {
    ev.preventDefault();
    isDragging = true;
    const rect = img.getBoundingClientRect();
    const x_pct = Math.max(0, Math.min(100, ((ev.clientX - rect.left) / rect.width) * 100));
    const y_pct = Math.max(0, Math.min(100, ((ev.clientY - rect.top) / rect.height) * 100));
    g._dragPos = { x_pct, y_pct };
    // Update the in-memory balloon and re-render so leader follows
    const b = balloons.find(x => x.id === bid);
    if (b) { b.x_pct = x_pct; b.y_pct = y_pct; renderBalloonsSVG(); }
  };

  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging && g._dragPos) {
      await sb.from('deployops_balloons').update({ x_pct: g._dragPos.x_pct, y_pct: g._dragPos.y_pct }).eq('id', bid);
      await loadBalloons();
      renderBalloonsSVG();
    }
    setTimeout(() => { isDragging = false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// DELETE PAGE
// ============================================================
async function deleteCurrentPage() {
  if (!currentDrawing || currentDrawing.page_count <= 1) return;
  if (!confirm(`Delete page ${currentPage} permanently? Balloons on this page will be deleted, and pages after it will shift down.`)) return;

  toast(`Deleting page ${currentPage}...`,'info');
  const ref = currentDrawing.drawing_ref;
  const total = currentDrawing.page_count;
  const deletedPage = currentPage;

  try {
    // 1. Delete balloons on this page
    await sb.from('deployops_balloons').delete()
      .eq('drawing_id', currentDrawing.id).eq('page', deletedPage);

    // 2. Delete the storage file for this page
    await sb.storage.from('deployops-drawings').remove([`${ref}/page_${deletedPage}.png`]);

    // 3. Shift later pages: download page_N, upload as page_(N-1), delete page_N
    for (let p = deletedPage + 1; p <= total; p++) {
      const oldPath = `${ref}/page_${p}.png`;
      const newPath = `${ref}/page_${p-1}.png`;
      const { data: blob, error: dlErr } = await sb.storage.from('deployops-drawings').download(oldPath);
      if (dlErr) { console.error(dlErr); continue; }
      await sb.storage.from('deployops-drawings').upload(newPath, blob, { contentType:'image/png', upsert:true });
      await sb.storage.from('deployops-drawings').remove([oldPath]);
      // Shift balloon page references for this page
      await sb.from('deployops_balloons').update({ page: p-1 })
        .eq('drawing_id', currentDrawing.id).eq('page', p);
    }

    // 4. Update drawing page_count
    await sb.from('deployops_drawings').update({ page_count: total - 1 }).eq('id', currentDrawing.id);

    drawingCacheBust[currentDrawing.id] = Date.now();
    toast(`Page ${deletedPage} deleted`,'ok');
    await loadDrawings();
    currentDrawing = drawings.find(d => d.id === currentDrawing.id);
    if (currentPage > currentDrawing.page_count) currentPage = currentDrawing.page_count;
    await loadBalloons();
    renderDrawing();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e),'err');
  }
}

async function exportAnnotatedPNG() {
  const img = document.getElementById('drawingImg');
  if (!img) return;
  toast('Generating PNG...','info');

  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Export only the balloons of the currently active mode
  const pageBalloons = balloons.filter(b => b.page === currentPage && (b.mode || 'balloon') === currentMode);
  const r = Math.min(canvas.width, canvas.height) * 0.018;

  // First pass: leader arrows (under balloons)
  pageBalloons.forEach(b => {
    if (b.tip_x_pct == null || b.tip_y_pct == null) return;
    const style = b.arrow_style || 'solid';
    if (style === 'none') return;
    const cx = b.x_pct/100 * canvas.width;
    const cy = b.y_pct/100 * canvas.height;
    const tx = b.tip_x_pct/100 * canvas.width;
    const ty = b.tip_y_pct/100 * canvas.height;
    const color = b.color || '#e74c3c';
    const isCable = (b.mode||'balloon') === 'cable';

    // Trim line to start at edge of balloon body (rect for cable, circle otherwise)
    const dx = tx-cx, dy = ty-cy;
    let sx, sy;
    if (isCable) {
      const text = b.label || '?';
      ctx.font = `bold ${r*0.85}px DM Sans, sans-serif`;
      const tw = ctx.measureText(text).width;
      const indSize = r*0.9;
      const padX = r*0.35, indGap = r*0.3;
      const tagW = padX + indSize + indGap + tw + padX;
      const tagH = r*1.5;
      [sx, sy] = rectEdgePoint(cx, cy, tagW, tagH, tx, ty);
    } else {
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      sx = cx + dx/dist*r;
      sy = cy + dy/dist*r;
    }

    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineCap = 'round';
    if (style === 'dashed') { ctx.setLineDash([r*0.4, r*0.3]); ctx.lineWidth = r*0.15; }
    else if (style === 'thick') { ctx.lineWidth = r*0.25; }
    else { ctx.lineWidth = r*0.15; }
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead or dot at tip
    if (style === 'dot') {
      ctx.beginPath(); ctx.arc(tx, ty, r*0.28, 0, Math.PI*2); ctx.fill();
    } else {
      const ang = Math.atan2(dy, dx);
      const ahLen = style === 'thick' ? r*0.7 : r*0.55;
      const ahW = style === 'thick' ? r*0.35 : r*0.28;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - ahLen*Math.cos(ang) + ahW*Math.sin(ang), ty - ahLen*Math.sin(ang) - ahW*Math.cos(ang));
      ctx.lineTo(tx - ahLen*Math.cos(ang) - ahW*Math.sin(ang), ty - ahLen*Math.sin(ang) + ahW*Math.cos(ang));
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  });

  // Second pass: balloons / cable tags
  pageBalloons.forEach(b => {
    const cx = b.x_pct/100 * canvas.width;
    const cy = b.y_pct/100 * canvas.height;
    const isCable = (b.mode||'balloon') === 'cable';
    const color = b.color || '#e74c3c';

    if (isCable) {
      const text = b.label || '?';
      ctx.font = `bold ${r*0.85}px DM Sans, sans-serif`;
      const tw = ctx.measureText(text).width;
      const indSize = r*0.9;
      const padX = r*0.35, indGap = r*0.3;
      const w = padX + indSize + indGap + tw + padX, h = r*1.5;
      const rad = r*0.25;
      const x0 = cx - w/2, y0 = cy - h/2;
      // White rectangle with colored border
      ctx.fillStyle = 'white';
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1.5, r*0.08);
      ctx.beginPath();
      ctx.roundRect(x0, y0, w, h, rad);
      ctx.fill(); ctx.stroke();
      // Green indicator square on left
      ctx.fillStyle = '#27ae60';
      const indX = x0 + padX, indY = cy - indSize/2;
      ctx.beginPath();
      ctx.roundRect(indX, indY, indSize, indSize, r*0.1);
      ctx.fill();
      // Label text — left-aligned, after indicator
      ctx.fillStyle = '#111';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(text, indX + indSize + indGap, cy);
    } else {
      // White halo
      ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, Math.PI*2);
      ctx.fillStyle = 'white'; ctx.fill();
      // Color circle
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
      // Number
      ctx.fillStyle = 'white'; ctx.font = `bold ${r*1.3}px DM Sans, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(b.number||''), cx, cy);
      // Label
      if (b.label) {
        ctx.font = `${r*0.6}px DM Sans, sans-serif`;
        ctx.fillStyle = 'white';
        ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
        ctx.strokeText(b.label, cx, cy + r + r*0.7);
        ctx.fillText(b.label, cx, cy + r + r*0.7);
      }
    }
  });

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${currentDrawing.drawing_ref}_annotated_p${currentPage}.png`;
    a.click();
    toast('PNG downloaded','ok');
  }, 'image/png');
}

function formatDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString(); } catch { return iso; }
}

function phaseLabel(phase, plain) {
  const t = phase === 'assembly_qc' ? 'Assembly QC' : 'Pre-Deploy';
  return plain ? t : (phase === 'assembly_qc' ? `🔬 ${t}` : `📦 ${t}`);
}

// Group items by phase → section. Returns array of { phase, sectionName, items } in display order.
function genGroups(items, phaseFilter) {
  const phases = phaseFilter ? [phaseFilter] : ['assembly_qc','pre_deploy'];
  const groups = [];
  phases.forEach(phase => {
    const phaseItems = items.filter(i => (i.phase||'assembly_qc') === phase);
    const sections = {}; const order = [];
    phaseItems.forEach(i => {
      const sn = i.section_name || '(unsorted)';
      if (!sections[sn]) { sections[sn] = []; order.push(sn); }
      sections[sn].push(i);
    });
    order.forEach(sn => groups.push({ phase, sectionName: sn, items: sections[sn] }));
  });
  return groups;
}

}

// Single section block for Filled mode (DB state + checked_by/at column)
function renderFilledSectionBlock(group, checks, opts) {

  html += `<h2 style="font-size:14px;margin:18px 0 8px;border-bottom:2px solid #333;padding-bottom:4px">${phaseLabel(group.phase, plain)} <span style="font-size:11px;color:#555;font-weight:400">(${group.items.length} item${group.items.length===1?'':'s'})</span></h2>`;

// ============================================================
// DEPLOY (Phase 4) — model-centric
// ============================================================
let deployModelId = null;
let deployUnits = [];
let deployUnitItems = [];
let deployChecks = {};
let deployUnitId = null;
let deployCollapsed = {};
let deployLoadedFor = null;  // model id whose data is currently in memory

async function loadDeployData(modelId) {
  if (!modelId) {
    deployUnits = []; deployUnitItems = []; deployChecks = {};
    deployLoadedFor = null;
    return;
  }
  try {
    const [uRes, iRes] = await Promise.all([
      sb.from('deployops_units').select('*').eq('model_id', modelId).order('created_at', { ascending: true }),
      sb.from('deployops_checklist_items').select('*').eq('model_id', modelId).order('sort_order', { ascending: true })
    ]);
    if (uRes.error) throw uRes.error;
    if (iRes.error) throw iRes.error;
    deployUnits = uRes.data || [];
    deployUnitItems = iRes.data || [];
    deployChecks = {};
    if (deployUnits.length > 0) {
      const uIds = deployUnits.map(u => u.id);
      const cRes = await sb.from('deployops_unit_checks').select('*').in('unit_id', uIds);
      if (cRes.error) throw cRes.error;
      (cRes.data || []).forEach(c => { (deployChecks[c.unit_id] ||= []).push(c); });
    }
    deployLoadedFor = modelId;
  } catch(e) {
    console.error(e);
    toast('Failed to load deploy data: ' + (e.message || e), 'err');
  }
}

function deployProgress(unitId, phase) {
  const items = deployUnitItems.filter(i => (i.phase||'assembly_qc') === phase);
  const ck = deployChecks[unitId] || [];
  const done = items.filter(i => ck.some(c => c.item_id === i.id && c.checked)).length;
  return { done, total: items.length, pct: items.length ? Math.round(done/items.length*100) : 0 };
}

async function renderDeploy() {
  const el = document.getElementById('deployContent');

  // Pick a default model on first entry
  if (!deployModelId) {
    if (models.length === 0) {
      el.innerHTML = `<div class="empty"><div class="icon">🤖</div>
        <p>No models yet. Add one from the <b>Models</b> tab to start deploying.</p></div>`;
      return;
    }
    deployModelId = models[0].id;
  }

  if (deployLoadedFor !== deployModelId) {
    el.innerHTML = `<div class="empty"><div class="icon">⏳</div><p>Loading…</p></div>`;
    await loadDeployData(deployModelId);
  }

  if (deployUnitId) { renderDeployUnitDetail(el); return; }

  const m = modelById(deployModelId);
  let html = `
    <div class="page-header">
      <h1>🚀 Deploy</h1>
      <button class="btn btn-primary admin-only" onclick="showAddDeployUnit()">➕ Add Unit</button>
    </div>
    <div class="model-picker">
      <label>Model:</label>
      <select onchange="onDeployModelChange(this.value)">
        ${models.map(mm => `<option value="${mm.id}" ${mm.id===deployModelId?'selected':''}>${esc(mm.icon||'🤖')} ${esc(mm.name)}${mm.ref?' · '+esc(mm.ref):''}</option>`).join('')}
      </select>
    </div>
  `;

  if (!m) { el.innerHTML = html + `<div class="empty"><p>Model not found.</p></div>`; return; }

  if (deployUnits.length === 0) {
    html += `<div class="empty"><div class="icon">🤖</div>
      <p>No units yet for <b>${esc(m.name)}</b>.</p>
      <button class="btn btn-primary admin-only" onclick="showAddDeployUnit()">Add the first one</button></div>`;
    el.innerHTML = html;
    return;
  }

  html += `<div class="units-grid">`;
  deployUnits.forEach(u => {
    const qc  = deployProgress(u.id, 'assembly_qc');
    const dep = deployProgress(u.id, 'pre_deploy');
    html += `
      <div class="unit-card" onclick="openDeployUnit('${u.id}')">
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm btn-danger admin-only" onclick="deleteDeployUnit('${u.id}')" title="Delete">🗑️</button>
        </div>
        <h3>🤖 ${esc(u.unit_name||u.name||'(unnamed)')}</h3>
        ${u.notes?`<div class="unit-meta">${esc(u.notes)}</div>`:'<div class="unit-meta">&nbsp;</div>'}
        <div class="phase-prog">
          <div class="lbl"><span>🔬 Assembly QC</span><span>${qc.done}/${qc.total}</span></div>
          <div class="prog-bar"><div class="prog-fill qc" style="width:${qc.pct}%"></div></div>
        </div>
        <div class="phase-prog">
          <div class="lbl"><span>📦 Pre-Deploy</span><span>${dep.done}/${dep.total}</span></div>
          <div class="prog-bar"><div class="prog-fill dep" style="width:${dep.pct}%"></div></div>
        </div>
      </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

async function onDeployModelChange(id) {
  deployModelId = id;
  deployUnitId = null;
  deployLoadedFor = null;  // force reload
  await renderDeploy();
}

function showAddDeployUnit() {
  const m = modelById(deployModelId);
  showModal(`
    <h3>➕ Add Unit</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">For model: <b>${esc(m?.name||'')}</b></p>
    <label>Unit Name / Serial</label> <input id="uName" placeholder="e.g. CE-004">
    <label>Notes</label> <textarea id="uNotes" placeholder="Location, batch, etc."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addDeployUnit()">Add</button>
    </div>
  `);
  setTimeout(() => { const i = document.getElementById('uName'); if (i) i.focus(); }, 30);
}

async function addDeployUnit() {
  const name = document.getElementById('uName').value.trim();
  if (!name) { toast('Enter a name', 'err'); return; }
  try {
    const { data, error } = await sb.from('deployops_units').insert({
      model_id: deployModelId,
      unit_name: name,
      notes: document.getElementById('uNotes').value.trim(),
      created_by: currentUser?.email || 'unknown'
    }).select().single();
    if (error) throw error;
    deployUnits.push(data);
    deployChecks[data.id] = [];
    modelUnitCount[deployModelId] = (modelUnitCount[deployModelId] || 0) + 1;
    closeModal(); toast(`Unit "${name}" created`, 'ok');
    renderDeploy();
  } catch(e) {
    console.error(e);
    toast('Add failed: ' + (e.message || e), 'err');
  }
}

async function deleteDeployUnit(id) {
  const u = deployUnits.find(x => x.id === id);
  if (!u || !confirm(`Delete unit "${u.unit_name||u.name}" and its check data?`)) return;
  try {
    await sb.from('deployops_unit_checks').delete().eq('unit_id', id);
    const { error } = await sb.from('deployops_units').delete().eq('id', id);
    if (error) throw error;
    deployUnits = deployUnits.filter(x => x.id !== id);
    delete deployChecks[id];
    if (deployUnitId === id) deployUnitId = null;
    if (modelUnitCount[deployModelId]) modelUnitCount[deployModelId] = Math.max(0, modelUnitCount[deployModelId] - 1);
    toast('Unit deleted', 'info');
    renderDeploy();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e), 'err');
  }
}

function openDeployUnit(id) { deployUnitId = id; renderDeploy(); }
function backToDeployUnits() { deployUnitId = null; renderDeploy(); }

function renderDeployUnitDetail(el) {
  const u = deployUnits.find(x => x.id === deployUnitId);
  if (!u) { deployUnitId = null; renderDeploy(); return; }
  const m = modelById(u.model_id) || modelById(deployModelId);
  const qc  = deployProgress(u.id, 'assembly_qc');
  const dep = deployProgress(u.id, 'pre_deploy');

  let html = `
    <div class="crumbs">
      <a onclick="backToDeployUnits()">← Units</a>
      <span class="sep">/</span>
      <span>${esc(m?.name||'')}</span>
      <span class="sep">/</span>
      <span>${esc(u.unit_name||u.name||'')}</span>
    </div>
    <div class="deploy-header">
      <button class="btn btn-sm no-print" onclick="backToDeployUnits()">← Back</button>
      <h2>🤖 ${esc(u.unit_name||u.name||'')}</h2>
      <button class="btn btn-sm no-print" onclick="showPrintOptions()">🖨️ Print / PDF</button>
      <div class="submeta">${esc(m?.icon||'')} ${esc(m?.name||'')}${m?.ref?' · '+esc(m.ref):''}${u.notes?' · '+esc(u.notes):''}</div>
    </div>
  `;

  html += renderDeployPhaseBlock(u, 'assembly_qc', '🔬', 'Assembly QC', 'Was it built correctly?', qc, 'qc');
  html += renderDeployPhaseBlock(u, 'pre_deploy',  '📦', 'Pre-Deploy',  'Are all parts in the box?',  dep, 'dep');

  if (qc.total === 0 && dep.total === 0) {
    const mid = u.model_id || deployModelId;
    html += `<div class="empty"><p>No checklist items defined for this model yet.<br><a onclick="modelView='${mid}';modelPhase='assembly_qc';switchTab('models')" style="color:var(--accent);cursor:pointer">Open the Models tab</a> to add some.</p></div>`;
  }

  el.innerHTML = html;
}

function renderDeployPhaseBlock(u, phase, icon, title, subtitle, prog, klass) {
  const phaseItems = deployUnitItems.filter(i => (i.phase||'assembly_qc') === phase)
                                    .sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  if (phaseItems.length === 0) {
    return `
      <div class="phase-block" data-phase="${phase}">
        <div class="phase-block-header">
          <div class="phase-name"><span class="phase-icon">${icon}</span>${title}</div>
          <span class="phase-meta">no items defined</span>
        </div>
      </div>`;
  }

  const sections = {};
  const sectionOrder = [];
  phaseItems.forEach(i => {
    const sn = i.section_name || '(unsorted)';
    if (!sections[sn]) { sections[sn] = []; sectionOrder.push(sn); }
    sections[sn].push(i);
  });
  const ck = deployChecks[u.id] || [];

  let html = `
    <div class="phase-block" data-phase="${phase}">
      <div class="phase-block-header">
        <div class="phase-name"><span class="phase-icon">${icon}</span>${title}</div>
        <span class="phase-meta">${subtitle}</span>
        <div class="phase-progress ${klass}">
          <div class="fill" data-phase-fill="${phase}" style="width:${prog.pct}%"></div>
          <div class="txt" data-phase-txt="${phase}">${prog.done} / ${prog.total} · ${prog.pct}%</div>
        </div>
      </div>`;

  sectionOrder.forEach((secName, secIdx) => {
    const secItems = sections[secName];
    const secKey = `${u.id}|${phase}|${secIdx}`;
    const collapsed = deployCollapsed[secKey];
    const secDone = secItems.filter(i => ck.some(c => c.item_id === i.id && c.checked)).length;
    html += `
      <div class="deploy-section ${collapsed?'collapsed':''}" data-sec-key="${esc(secKey)}">
        <div class="deploy-section-header" data-sec-toggle="${esc(secKey)}" onclick="toggleDeploySection(this.dataset.secToggle)">
          <span class="chev">▼</span>
          <span>${esc(secName)}</span>
          <span class="sec-stat" data-sec-stat="${esc(secKey)}">${secDone}/${secItems.length}</span>
        </div>
        <div class="deploy-section-body">`;
    secItems.forEach(item => {
      const c = ck.find(x => x.item_id === item.id);
      const checked = !!(c && c.checked);
      html += `
        <div class="deploy-item ${checked?'checked':''}" data-item-id="${item.id}" data-sec-key="${esc(secKey)}">
          <input type="checkbox" ${checked?'checked':''} onchange="toggleDeployCheck('${u.id}','${item.id}',this.checked,this)">
          <div class="di-label">
            ${esc(item.label)}
            ${item.description?`<span class="sub">${esc(item.description)}</span>`:''}
            ${item.part_number?`<span class="sub" style="color:var(--accent)">${esc(item.part_number)}${item.tool?' · '+esc(item.tool):''}</span>`:''}
            ${checked && c?.checked_by ? `<span class="by">✓ ${esc(c.checked_by)} · ${esc(formatDate(c.checked_at))}</span>` : ''}
          </div>
          ${item.qty?`<div class="di-qty">×${item.qty}</div>`:''}
        </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;
  return html;
}

function toggleDeploySection(secKey) {
  deployCollapsed[secKey] = !deployCollapsed[secKey];
  const sec = document.querySelector(`.deploy-section[data-sec-key="${cssEsc(secKey)}"]`);
  if (sec) sec.classList.toggle('collapsed', !!deployCollapsed[secKey]);
}

function cssEsc(s) {
  return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/[\\"]/g, '\\$&');
}

async function toggleDeployCheck(unitId, itemId, checked, checkboxEl) {
  const now = new Date().toISOString();
  const by  = currentUser?.email || 'unknown';

  // Optimistic local update
  const arr = (deployChecks[unitId] ||= []);
  const existing = arr.find(c => c.item_id === itemId);
  let saved;
  if (existing) {
    existing.checked = checked;
    existing.checked_by = by;
    existing.checked_at = checked ? now : null;
    saved = existing;
  } else {
    saved = { unit_id: unitId, item_id: itemId, checked, checked_by: by, checked_at: checked ? now : null };
    arr.push(saved);
  }

  // Patch DOM in place — no full re-render
  const row = checkboxEl.closest('.deploy-item');
  if (row) {
    row.classList.toggle('checked', checked);
    const labelEl = row.querySelector('.di-label');
    let byEl = labelEl?.querySelector('.by');
    if (checked) {
      const html = `<span class="by">✓ ${esc(by)} · ${esc(formatDate(now))}</span>`;
      if (byEl) byEl.outerHTML = html;
      else if (labelEl) labelEl.insertAdjacentHTML('beforeend', html);
    } else if (byEl) byEl.remove();
  }

  // Patch phase progress + section count
  const item = deployUnitItems.find(i => i.id === itemId);
  if (item) {
    const phase = item.phase || 'assembly_qc';
    const prog = deployProgress(unitId, phase);
    const fill = document.querySelector(`[data-phase-fill="${phase}"]`);
    const txt  = document.querySelector(`[data-phase-txt="${phase}"]`);
    if (fill) fill.style.width = prog.pct + '%';
    if (txt)  txt.textContent  = `${prog.done} / ${prog.total} · ${prog.pct}%`;

    const sk = row?.dataset?.secKey;
    if (sk) {
      const stat = document.querySelector(`[data-sec-stat="${cssEsc(sk)}"]`);
      if (stat) {
        const phaseItems = deployUnitItems.filter(i => (i.phase||'assembly_qc') === phase)
                                          .sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
        const sections = {}; const order = [];
        phaseItems.forEach(i => {
          const sn = i.section_name || '(unsorted)';
          if (!sections[sn]) { sections[sn] = []; order.push(sn); }
          sections[sn].push(i);
        });
        const idxStr = sk.split('|')[2];
        const secItems = sections[order[parseInt(idxStr)]] || [];
        const secDone = secItems.filter(i => arr.some(c => c.item_id === i.id && c.checked)).length;
        stat.textContent = `${secDone}/${secItems.length}`;
      }
    }
  }

  // Persist
  const { error } = await sb.from('deployops_unit_checks').upsert({
    unit_id: unitId, item_id: itemId,
    checked, checked_by: by,
    checked_at: checked ? now : null
  }, { onConflict: 'unit_id,item_id' });

  if (error) {
    console.error(error);
    toast('Save failed — reverting', 'err');
    saved.checked = !checked;
    if (row) row.classList.toggle('checked', !checked);
    if (checkboxEl) checkboxEl.checked = !checked;
    renderDeploy();
  }
}

let _printCtx = null;

        <div class="mode-card-icon">📊</div>
        <div class="mode-card-title">Filled Status</div>
        <div class="mode-card-desc">Current DB state — for audit / review</div>
      </button>
    </div>
  `;

  showModal(`

    ${modeSection}

    <label>Phases</label>
    <div style="display:flex;gap:6px;flex-direction:column;margin-top:6px">
      <label class="radio-row"><input type="radio" name="phaseChoice" value="both" checked> All</label>
      <label class="radio-row"><input type="radio" name="phaseChoice" value="assembly_qc"> 🔬 Assembly QC only</label>
      <label class="radio-row"><input type="radio" name="phaseChoice" value="pre_deploy"> 📦 Pre-Deploy only</label>
    </div>

    <label>Layout</label>
    <div style="display:flex;gap:6px;flex-direction:column;margin-top:6px">
      <label class="radio-row"><input type="radio" name="layoutChoice" value="all" checked> All-in-one document</label>
      <label class="radio-row"><input type="radio" name="layoutChoice" value="perSection"> One sheet per section</label>
    </div>

    <label>Style</label>
    <div style="display:flex;gap:6px;flex-direction:column;margin-top:6px">
      <label class="radio-row"><input type="radio" name="styleChoice" value="branded" checked> Branded (emojis, colors)</label>
      <label class="radio-row"><input type="radio" name="styleChoice" value="plain"> Plain (black & white, no emojis)</label>
    </div>

    <p style="font-size:11px;color:var(--text2);margin-top:12px;line-height:1.5">
