// DB tier value → worksheet row class, tier-box letter, tier fallback emoji.
const WS_TIERS = {
  plain:   { cls: 'plain', letter: '',  emoji: '✅' },
  verify:  { cls: 'v',     letter: 'V', emoji: '🔍' },
  review:  { cls: 'r',     letter: 'R', emoji: '⚠' },
  witness: { cls: 'w',     letter: 'W', emoji: '⛔' },
};
function wsTier(item) { return WS_TIERS[item && item.tier] || WS_TIERS.plain; }

// Per-item action-hint icons were removed: the reference design uses no
// per-item icons. Tier icons appear only in the legend (see renderWsLegend).

function wsTodayISO() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function wsCode(modelRef, sectionName) {
  const clean = s => String(s||'').toUpperCase().replace(/[^A-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  return [clean(modelRef) || 'MODEL', clean(sectionName) || 'SECTION'].join('-');
}

// branded boolean → style string. Keeps old callers working; new default
// is 'word' (looks hand-prepared, for the shop floor).
function normalizeStyle(opts) {
  if (opts && typeof opts.style === 'string') return opts.style;
  if (opts && opts.branded === true) return 'deployops';
  if (opts && opts.branded === false) return 'plain';
  return 'word';
}

// One checklist row. idx is 1-based (resets per section when banded, per
// phase when flat) and drives both the printed number and the .row-N class
// (Word style uses it for hand-jitter on checkboxes). Tier no longer
// occupies a column — it is encoded by the row background class (.v/.r/.w)
// and by the OP/QC cell contents (locked N/A or SUP/WIT gate).
function renderWorksheetRow(item, idx, lang, style) {
  const t = wsTier(item);
  const num = String(idx).padStart(2, '0');
  const label = esc(pickField(item, 'label', lang) || '');
  const desc = esc(pickField(item, 'description', lang) || '');

  // Item cell: label only (no per-item action icon — the reference uses
  // none). For R/W rows the STOP copy is inlined via tr() so JA / EN
  // both flow through the same locale gate as the rest of the chrome.
  let itemCell = `<div class="label">${label}</div>`;
  if (t.cls === 'r') itemCell += `<div class="stop">${esc(tr(lang, 'ws_stop_review'))}</div>`;
  else if (t.cls === 'w') itemCell += `<div class="stop">${esc(tr(lang, 'ws_stop_witness'))}</div>`;

  // Notes cell: V rows carry the verification sub-step (checkbox + text);
  // everything else shows the plain description.
  let notesCell;
  if (t.cls === 'v') {
    const subTxt = esc(pickField(item, 'description', lang) || tr(lang, 'ws_verification_mark'));
    notesCell = `<div class="sub"><span class="scb"></span><span class="stxt">${subTxt}</span></div>`;
  } else {
    notesCell = `<span class="desc">${desc}</span>`;
  }

  // OP / QC cells.
  let opCell, qcCell;
  if (t.cls === 'r' || t.cls === 'w') {
    const lockCls = t.cls === 'w' ? 'c-locked-w' : 'c-locked-r';
    if (style === 'word') {
      opCell = `<div class="cell c-check c-locked">N/A</div>`;
    } else if (style === 'deployops') {
      opCell = `<div class="cell c-check c-locked ${lockCls}"><span class="lock"><span class="lock-ic">🔒</span><span class="lock-lbl">LOCKED</span></span></div>`;
    } else {
      opCell = `<div class="cell c-check c-locked ${lockCls}"><span class="lock"></span></div>`;
    }
    const gate = t.cls === 'w' ? 'WIT' : 'SUP';
    qcCell = `<div class="cell c-check c-gate"><span class="cb-gate"><span class="cb"></span><span class="gate-lbl">${gate}</span></span></div>`;
  } else {
    opCell = `<div class="cell c-check"><span class="cb"></span></div>`;
    qcCell = `<div class="cell c-check"><span class="cb"></span></div>`;
  }

  return `
      <div class="row ${t.cls} row-${idx}">
        <div class="cell c-ix">${num}</div>
        <div class="cell c-item">${itemCell}</div>
        <div class="cell c-notes">${notesCell}</div>
        ${opCell}
        ${qcCell}
      </div>`;
}

// Shared legend (4 cards, V/R/W badges). The Word style hides the badge
// box and restyles the cards via CSS — no markup change. Tier titles
// are escaped (plain text); descriptions carry raw <b> emphasis around
// SUP/WIT and must NOT be escaped.
function renderWsLegend(lang) {
  return `
  <div class="legend">
    <div class="lr plain"><div class="badge">&nbsp;</div><div><span class="tt"><span class="em">✅</span>${esc(tr(lang, 'ws_legend_plain_title'))}</span><span class="ld">${tr(lang, 'ws_legend_plain_desc')}</span></div></div>
    <div class="lr v"><div class="badge">V</div><div><span class="tt"><span class="em">🔍</span>${esc(tr(lang, 'ws_legend_verify_title'))}</span><span class="ld">${tr(lang, 'ws_legend_verify_desc')}</span></div></div>
    <div class="lr r"><div class="badge">R</div><div><span class="tt"><span class="em">⚠</span>${esc(tr(lang, 'ws_legend_review_title'))}</span><span class="ld">${tr(lang, 'ws_legend_review_desc')}</span></div></div>
    <div class="lr w"><div class="badge">W</div><div><span class="tt"><span class="em">⛔</span>${esc(tr(lang, 'ws_legend_witness_title'))}</span><span class="ld">${tr(lang, 'ws_legend_witness_desc')}</span></div></div>
  </div>`;
}

function wsHeadLeft(style) {
  if (style === 'deployops') return `<div class="brand-block">
      <div class="brand-mark">◢</div>
      <div class="brand-text">
        <div class="brand-name">DeployOps</div>
        <div class="brand-sub">QC Worksheet</div>
      </div>
    </div>`;
  if (style === 'plain') return `<div class="stamp">QC&nbsp;WORKSHEET</div>`;
  return ''; // word: title only
}

// Group items by section, preserving first-seen order (after sort_order).
// Items with no section_id (defensive — shouldn't exist after F.9 backfill)
// collected into a trailing "leftover" bucket labeled OTHER / その他.
// Returns [{ sectionName, displayName, items }] where sectionName is the
// canonical English key (also used for filesystem-safe PDF filenames) and
// displayName is the locale-aware label.
//
// F.10: groups by section_id (FK to deployops_sections) and resolves the
// display name via sectionName() against sectionsCache. Caller must
// ensure sectionsCache[modelId] is populated — printBlankWorkOrder pre-
// warms it via the lazy-load guard before calling wsBuildSectionDocs.
function wsGroupBySection(items, lang) {
  const modelId = items[0]?.model_id;
  const cache = (modelId && sectionsCache[modelId]) || [];
  const byId = {};
  cache.forEach(s => { byId[s.id] = s; });

  const realMap = {}, order = [];
  const leftover = [];
  items.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)).forEach(it => {
    const sid = it.section_id;
    if (!sid || !byId[sid]) { leftover.push(it); return; }
    if (!realMap[sid]) { realMap[sid] = []; order.push(sid); }
    realMap[sid].push(it);
  });
  const out = order.map(sid => {
    const section = byId[sid];
    return {
      sectionName: section.name,
      displayName: sectionName(section, lang),
      items: realMap[sid]
    };
  });
  if (leftover.length) {
    out.push({
      sectionName: '__leftover__',
      displayName: lang === 'ja' ? 'その他' : 'OTHER',
      items: leftover
    });
  }
  return out;
}

// Per-style display titles for phase headers. EN uses the reference casing
// ("Pre-install QC" / "Pre-test QC" — lowercase second word). JA falls back
// to whatever phaseLabel() returns (SQL-managed JA translations).
const WS_PHASE_TITLES_EN = {
  pre_install_qc: 'Pre-install QC',
  pre_test_qc:    'Pre-test QC',
  pre_deploy:     'Pre-deploy'
};

// Group items by section, then within each section by phase. Returns
// only sections that have items in at least one of the included phases.
// Each section entry carries phaseItems = { phase: [items] } with phases
// that have no items in this section omitted.
function wsBuildSectionDocs(items, includePhases, lang) {
  const groups = wsGroupBySection(items, lang);
  return groups.map(g => {
    const phaseItems = {};
    includePhases.forEach(phase => {
      const list = g.items
        .filter(i => itemInPhase(i, phase))
        .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      if (list.length > 0) phaseItems[phase] = list;
    });
    return {
      sectionName: g.sectionName,
      displayName: g.displayName,
      phaseItems
    };
  }).filter(s => Object.keys(s.phaseItems).length > 0);
}

// One section's worksheet body: title, fields, legend, one block per
// phase that has items, footer. Title is "QC Checklist - <section>" —
// model name and unit name do not appear in the body apart from the
// fields strip. Caller wraps this in a .sheet (PDF mode) or .ws-section-
// page .sheet (concatenated printer mode).
function renderSectionDoc(model, unitName, section, lang, style) {
  const titlePrefix = lang === 'ja' ? 'QCチェックリスト - ' : 'QC Checklist - ';
  const unitField = unitName
    ? `<div class="v filled">${esc(unitName)}</div>`
    : `<div class="v">&nbsp;</div>`;

  // OP/QC column headers route through the existing PRINT_I18N op/qcCol
  // keys: 'OP'/'QC' in EN, '作業'/'検査' in JA (per JA convention memory —
  // visual consistency on a JA page wins over keeping Latin abbrevs).
  // The physical-stamp badges N/A, SUP, WIT stay Latin in both locales —
  // they appear inside the OP/QC cells via renderWorksheetRow.
  const COL_HEAD = `<div class="col-head">
        <div>#</div><div class="ch-left">${esc(tr(lang, 'ws_col_item'))}</div><div class="ch-left">${esc(tr(lang, 'ws_col_notes'))}</div><div>${esc(tr(lang, 'op'))}</div><div>${esc(tr(lang, 'qcCol'))}</div>
      </div>`;

  // Phase header text. JA path resolves to PRINT_I18N.ja.preTestQC
  // ('試験前QC') / PRINT_I18N.ja.preInstallQC ('組立前QC') via
  // phaseLabel → tr — the existing keys, not a new ws_* one. EN path
  // uses WS_PHASE_TITLES_EN for the lowercase-second-word casing
  // ("Pre-install QC"). Confirming the JA override: open the
  // regenerated JA PDF and look for '試験前QC' as a phase divider.
  const phaseBlocks = Object.entries(section.phaseItems).map(([phase, list]) => {
    const phaseTxt = lang === 'ja'
      ? (phaseLabel(phase, true, lang) || (PHASE_META[phase] || {}).label || phase)
      : (WS_PHASE_TITLES_EN[phase] || (PHASE_META[phase] || {}).label || phase);
    const rows = list.map((it, i) => renderWorksheetRow(it, i + 1, lang, style)).join('');
    return `
  <div class="section-band">${esc(phaseTxt)}</div>
  <div class="rows">${COL_HEAD}${rows}</div>`;
  }).join('');

  // Form-id uses canonical English sectionName so the audit code stays
  // ASCII-meaningful (wsCode strips non-A-Z0-9; a JA displayName would
  // collapse to 'SECTION').
  const formId = style === 'deployops' ? `
  <div class="form-id">
    <span class="chip">DeployOps</span>
    <span>WS-${esc(wsCode(model?.ref, section.sectionName))} · rev A · generated ${wsTodayISO()}</span>
    <span class="note">Return signed copy to QC bin</span>
  </div>` : '';

  return `
  <div class="hdr">
    ${wsHeadLeft(style)}
    <h1>${titlePrefix}${esc(section.displayName)}</h1>
    <div class="fields">
      <div class="f"><div class="k">${esc(tr(lang, 'ws_field_unit'))}</div>${unitField}</div>
      <div class="f"><div class="k">${esc(tr(lang, 'ws_field_operator'))}</div><div class="v">&nbsp;</div></div>
      <div class="f"><div class="k">${esc(tr(lang, 'ws_field_date'))}</div><div class="v">&nbsp;</div></div>
    </div>
  </div>

  ${renderWsLegend(lang)}

  ${phaseBlocks}

  <div class="footer">
    <div class="ff"><div class="k">${esc(tr(lang, 'ws_footer_completed_by'))}</div><div class="ln"></div><div class="sub">${esc(tr(lang, 'ws_footer_print_sign'))}</div></div>
    <div class="ff"><div class="k">${esc(tr(lang, 'ws_footer_supervisor'))}</div><div class="ln"></div><div class="sub">${esc(tr(lang, 'ws_footer_print_sign'))}</div></div>
    <div class="ff"><div class="k">${esc(tr(lang, 'ws_footer_date_completed'))}</div><div class="ln"></div><div class="sub">${esc(tr(lang, 'ws_footer_date_placeholder'))}</div></div>
  </div>
  ${formId}`;
}

// All section docs concatenated into a single body for browser print.
// Each section is wrapped in .ws-section-page .sheet so the printer
// emits one page (or contiguous run of pages) per section.
function renderAllSectionsForPrint(model, unitName, sections, lang, style) {
  return sections.map(s =>
    `<div class="ws-section-page sheet">${renderSectionDoc(model, unitName, s, lang, style)}</div>`
  ).join('');
}

// Full standalone worksheet document. forPdf=true bakes the @media-print
// sheet styles in as base styles (html2pdf rasterizes screen media, so the
// @media print block never fires during PDF capture).
function buildWorksheetDoc(sheetsHtml, opts = {}) {
  const style = normalizeStyle(opts);
  const forPdf = opts.forPdf || false;
  const pdfOverride = forPdf
    ? `.sheet{margin:0;box-shadow:none;padding:0;width:auto;min-height:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}`
    : '';
  const title = style === 'deployops' ? 'QC Worksheet · DeployOps' : 'QC Worksheet';
  // Word style uses system Calibri / Times — no external font load.
  const fontLink = style === 'word'
    ? ''
    : '<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap">';
  const wrapOpen  = style === 'word' ? '<div class="ws-word">' : '';
  const wrapClose = style === 'word' ? '</div>' : '';
  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>${esc(title)}</title>
${fontLink}
<style>${WS_CSS}${WS_CSS_WORD}${pdfOverride}</style>
</head><body>
${wrapOpen}${sheetsHtml}${wrapClose}
</body></html>`;
}

// ============================================================
// DEPLOY (Phase 4) — model-centric
// ============================================================
let deployModelId = null;
let deployUnits = [];
let deployUnitItems = [];
let deployChecks = {};
let deployUnitId = null;
let deployCollapsed = {};
let deployLoadedFor = null;  // model id whose data is currently in memory

async function loadDeployData(modelId) {
  if (!modelId) {
    deployUnits = []; deployUnitItems = []; deployChecks = {};
    deployLoadedFor = null;
    return;
  }
  try {
    // F.10: pre-warm sectionsCache (idempotent) before fetching unit
    // data so renderDeployPhaseBlock's section grouping is ready on
    // first paint. Sequential — one extra round trip only on cold cache.
    if (!sectionsCache[modelId]) await loadSections(modelId);
    const [uRes, iRes] = await Promise.all([
      sb.from('deployops_units').select('*').eq('model_id', modelId).order('created_at', { ascending: true }),
      sb.from('deployops_checklist_items').select('*').eq('model_id', modelId).order('sort_order', { ascending: true })
    ]);
    if (uRes.error) throw uRes.error;
    if (iRes.error) throw iRes.error;
    deployUnits = uRes.data || [];
    deployUnitItems = iRes.data || [];
    deployChecks = {};
    if (deployUnits.length > 0) {
      const uIds = deployUnits.map(u => u.id);
      const cRes = await sb.from('deployops_unit_checks').select('*').in('unit_id', uIds);
      if (cRes.error) throw cRes.error;
      (cRes.data || []).forEach(c => { (deployChecks[c.unit_id] ||= []).push(c); });
    }
    deployLoadedFor = modelId;
  } catch(e) {
    console.error(e);
    toast('Failed to load deploy data: ' + (e.message || e), 'err');
  }
}

// Per-phase progress is independent: an item applies in a phase if that
// phase is in its phases[]; its check state for that phase is the
// unit_checks row keyed (unit_id, item_id, phase).
function deployProgress(unitId, phase) {
  const items = deployUnitItems.filter(i => i.visible !== false && itemInPhase(i, phase));
  const ck = deployChecks[unitId] || [];
  const done = items.filter(i => ck.some(c => c.item_id === i.id && c.phase === phase && c.checked)).length;
  return { done, total: items.length, pct: items.length ? Math.round(done/items.length*100) : 0 };
}

async function renderDeploy() {
  const el = document.getElementById('deployContent');

  // Pick a default model on first entry
  if (!deployModelId) {
    if (models.length === 0) {
      el.innerHTML = `<div class="empty"><div class="icon">🤖</div>
        <p>No models yet. Add one from the <b>Models</b> tab to start deploying.</p></div>`;
      return;
    }
    deployModelId = models[0].id;
  }

  if (deployLoadedFor !== deployModelId) {
    el.innerHTML = `<div class="empty"><div class="icon">⏳</div><p>Loading…</p></div>`;
    await loadDeployData(deployModelId);
  }

  if (deployUnitId) { renderDeployUnitDetail(el); return; }

  const m = modelById(deployModelId);
  const lang = getUiLang();
  let html = `
    <div class="page-header">
      <h1>🚀 Deploy</h1>
      <button class="btn btn-primary admin-only" onclick="showAddDeployUnit()">➕ Add Unit</button>
    </div>
    <div class="model-picker">
      <label>Model:</label>
      <select onchange="onDeployModelChange(this.value)">
        ${models.map(mm => `<option value="${mm.id}" ${mm.id===deployModelId?'selected':''}>${esc(mm.icon||'🤖')} ${esc(pickField(mm, 'name', lang))}${mm.ref?' · '+esc(mm.ref):''}</option>`).join('')}
      </select>
    </div>
  `;

  if (!m) { el.innerHTML = html + `<div class="empty"><p>Model not found.</p></div>`; return; }

  if (deployUnits.length === 0) {
    html += `<div class="empty"><div class="icon">🤖</div>
      <p>No units yet for <b>${esc(pickField(m, 'name', lang))}</b>.</p>
      <button class="btn btn-primary admin-only" onclick="showAddDeployUnit()">Add the first one</button></div>`;
    el.innerHTML = html;
    return;
  }

  html += `<div class="units-grid">`;
  deployUnits.forEach(u => {
    const qc1 = deployProgress(u.id, 'pre_install_qc');
    const qc2 = deployProgress(u.id, 'pre_test_qc');
    const dep = deployProgress(u.id, 'pre_deploy');
    const notes = pickField(u, 'notes', lang);
    html += `
      <div class="unit-card" onclick="openDeployUnit('${u.id}')">
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm btn-danger admin-only" onclick="deleteDeployUnit('${u.id}')" title="Delete">🗑️</button>
        </div>
        <h3>🤖 ${esc(u.unit_name||u.name||'(unnamed)')}</h3>
        ${notes?`<div class="unit-meta">${esc(notes)}</div>`:'<div class="unit-meta">&nbsp;</div>'}
        <div class="phase-prog">
          <div class="lbl"><span>🛡️ Pre-Install QC</span><span>${qc1.done}/${qc1.total}</span></div>
          <div class="prog-bar"><div class="prog-fill qc" style="width:${qc1.pct}%"></div></div>
        </div>
        <div class="phase-prog">
          <div class="lbl"><span>🧪 Pre-Test QC</span><span>${qc2.done}/${qc2.total}</span></div>
          <div class="prog-bar"><div class="prog-fill qc" style="width:${qc2.pct}%"></div></div>
        </div>
        <div class="phase-prog">
          <div class="lbl"><span>📦 Pre-Deploy</span><span>${dep.done}/${dep.total}</span></div>
          <div class="prog-bar"><div class="prog-fill dep" style="width:${dep.pct}%"></div></div>
        </div>
      </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

async function onDeployModelChange(id) {
  deployModelId = id;
  deployUnitId = null;
  deployLoadedFor = null;  // force reload
  await renderDeploy();
}

function showAddDeployUnit() {
  const m = modelById(deployModelId);
  const lang = getUiLang();
  showModal(`
    <h3>➕ Add Unit</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">For model: <b>${esc(m ? pickField(m, 'name', lang) : '')}</b></p>
    <label>Unit Name / Serial</label> <input id="uName" placeholder="e.g. CE-004">
    <label>Notes</label> <textarea id="uNotes" placeholder="Location, batch, etc."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addDeployUnit()">Add</button>
    </div>
  `);
  setTimeout(() => { const i = document.getElementById('uName'); if (i) i.focus(); }, 30);
}

async function addDeployUnit() {
  const name = document.getElementById('uName').value.trim();
  if (!name) { toast('Enter a name', 'err'); return; }
  try {
    const { data, error } = await sb.from('deployops_units').insert({
      model_id: deployModelId,
      unit_name: name,
      notes: document.getElementById('uNotes').value.trim(),
      created_by: currentUser?.email || 'unknown'
    }).select().single();
    if (error) throw error;
    deployUnits.push(data);
    deployChecks[data.id] = [];
    modelUnitCount[deployModelId] = (modelUnitCount[deployModelId] || 0) + 1;
    closeModal(); toast(`Unit "${name}" created`, 'ok');
    renderDeploy();
  } catch(e) {
    console.error(e);
    toast('Add failed: ' + (e.message || e), 'err');
  }
}

async function deleteDeployUnit(id) {
  const u = deployUnits.find(x => x.id === id);
  if (!u || !confirm(`Delete unit "${u.unit_name||u.name}" and its check data?`)) return;
  try {
    await sb.from('deployops_unit_checks').delete().eq('unit_id', id);
    const { error } = await sb.from('deployops_units').delete().eq('id', id);
    if (error) throw error;
    deployUnits = deployUnits.filter(x => x.id !== id);
    delete deployChecks[id];
    if (deployUnitId === id) deployUnitId = null;
    if (modelUnitCount[deployModelId]) modelUnitCount[deployModelId] = Math.max(0, modelUnitCount[deployModelId] - 1);
    toast('Unit deleted', 'info');
    renderDeploy();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e), 'err');
  }
}

function openDeployUnit(id) { deployUnitId = id; renderDeploy(); }
function backToDeployUnits() { deployUnitId = null; renderDeploy(); }

function renderDeployUnitDetail(el) {
  const u = deployUnits.find(x => x.id === deployUnitId);
  if (!u) { deployUnitId = null; renderDeploy(); return; }
  const m = modelById(u.model_id) || modelById(deployModelId);
  const qc1 = deployProgress(u.id, 'pre_install_qc');
  const qc2 = deployProgress(u.id, 'pre_test_qc');
  const dep = deployProgress(u.id, 'pre_deploy');
  const lang = getUiLang();
  const mName = m ? pickField(m, 'name', lang) : '';
  const uNotes = pickField(u, 'notes', lang);

  let html = `
    <div class="crumbs">
      <a onclick="backToDeployUnits()">← Units</a>
      <span class="sep">/</span>
      <span>${esc(mName)}</span>
      <span class="sep">/</span>
      <span>${esc(u.unit_name||u.name||'')}</span>
    </div>
    <div class="deploy-header">
      <button class="btn btn-sm no-print" onclick="backToDeployUnits()">← Back</button>
      <h2>🤖 ${esc(u.unit_name||u.name||'')}</h2>
      <button class="btn btn-sm no-print" onclick="showPrintOptions()">🖨️ Print / PDF</button>
      <div class="submeta">${esc(m?.icon||'')} ${esc(mName)}${m?.ref?' · '+esc(m.ref):''}${uNotes?' · '+esc(uNotes):''}</div>
    </div>
  `;

  html += renderDeployPhaseBlock(u, 'pre_install_qc', '🛡️', 'Pre-Install QC', 'Was it built correctly?',  qc1, 'qc');
  html += renderDeployPhaseBlock(u, 'pre_test_qc',    '🧪', 'Pre-Test QC',    'Ready for power-on?',      qc2, 'qc');
  html += renderDeployPhaseBlock(u, 'pre_deploy',     '📦', 'Pre-Deploy',     'Are all parts in the box?', dep, 'dep');

  if (qc1.total === 0 && qc2.total === 0 && dep.total === 0) {
    const mid = u.model_id || deployModelId;
    html += `<div class="empty"><p>No checklist items defined for this model yet.<br><a onclick="modelView='${mid}';modelPhase='pre_install_qc';switchTab('models')" style="color:var(--accent);cursor:pointer">Open the Models tab</a> to add some.</p></div>`;
  }

  el.innerHTML = html;
}

function renderDeployPhaseBlock(u, phase, icon, title, subtitle, prog, klass) {
  const phaseItems = deployUnitItems.filter(i => i.visible !== false && itemInPhase(i, phase))
                                    .sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  if (phaseItems.length === 0) {
    return `
      <div class="phase-block" data-phase="${phase}">
        <div class="phase-block-header">
          <div class="phase-name"><span class="phase-icon">${icon}</span>${title}</div>
          <span class="phase-meta">no items defined</span>
        </div>
      </div>`;
  }

  // F.10: group by section_id (was section_name). secKey ('u|phase|idx')
  // unchanged — idx is into the section ORDER array, which now holds
  // section UUIDs. Display label resolved via sectionName(section, lang).
  const lang = getUiLang();
  const cache = sectionsCache[u.model_id] || [];
  const byId = {};
  cache.forEach(s => { byId[s.id] = s; });

  const sections = {};
  const sectionOrder = [];
  phaseItems.forEach(i => {
    const sid = i.section_id;
    const key = (sid && byId[sid]) ? sid : '__unsorted__';
    if (!sections[key]) { sections[key] = []; sectionOrder.push(key); }
    sections[key].push(i);
  });
  const ck = deployChecks[u.id] || [];

  let html = `
    <div class="phase-block" data-phase="${phase}">
      <div class="phase-block-header">
        <div class="phase-name"><span class="phase-icon">${icon}</span>${title}</div>
        <span class="phase-meta">${subtitle}</span>
        <div class="phase-progress ${klass}">
          <div class="fill" data-phase-fill="${phase}" style="width:${prog.pct}%"></div>
          <div class="txt" data-phase-txt="${phase}">${prog.done} / ${prog.total} · ${prog.pct}%</div>
        </div>
      </div>`;

  sectionOrder.forEach((secSid, secIdx) => {
    const secItems = sections[secSid];
    const section = byId[secSid];
    const secDisplayName = section ? sectionName(section, lang) : (lang === 'ja' ? 'その他' : '(unsorted)');
    const secKey = `${u.id}|${phase}|${secIdx}`;
    const collapsed = deployCollapsed[secKey];
    const secDone = secItems.filter(i => ck.some(c => c.item_id === i.id && c.phase === phase && c.checked)).length;
    html += `
      <div class="deploy-section ${collapsed?'collapsed':''}" data-sec-key="${esc(secKey)}">
        <div class="deploy-section-header" data-sec-toggle="${esc(secKey)}" onclick="toggleDeploySection(this.dataset.secToggle)">
          <span class="chev">▼</span>
          <span>${esc(secDisplayName)}</span>
          <span class="sec-stat" data-sec-stat="${esc(secKey)}">${secDone}/${secItems.length}</span>
        </div>
        <div class="deploy-section-body">`;
    secItems.forEach(item => {
      const c = ck.find(x => x.item_id === item.id && x.phase === phase);
      const checked = !!(c && c.checked);
      html += `
        <div class="deploy-item ${checked?'checked':''}" data-item-id="${item.id}" data-phase="${phase}" data-sec-key="${esc(secKey)}">
          <input type="checkbox" ${checked?'checked':''} onchange="toggleDeployCheck('${u.id}','${item.id}','${phase}',this.checked,this)">
          <div class="di-label">
            ${esc(item.label)}
            ${item.description?`<span class="sub">${esc(item.description)}</span>`:''}
            ${item.part_number?`<span class="sub" style="color:var(--accent)">${esc(item.part_number)}${item.tool?' · '+esc(item.tool):''}</span>`:''}
            ${checked && c?.checked_by ? `<span class="by">✓ ${esc(c.checked_by)} · ${esc(formatDate(c.checked_at))}</span>` : ''}
          </div>
          ${item.qty?`<div class="di-qty">×${item.qty}</div>`:''}
        </div>`;
    });
    html += `</div></div>`;
  });

  html += `</div>`;
  return html;
}

function toggleDeploySection(secKey) {
  deployCollapsed[secKey] = !deployCollapsed[secKey];
  const sec = document.querySelector(`.deploy-section[data-sec-key="${cssEsc(secKey)}"]`);
  if (sec) sec.classList.toggle('collapsed', !!deployCollapsed[secKey]);
}

function cssEsc(s) {
  return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/[\\"]/g, '\\$&');
}

async function toggleDeployCheck(unitId, itemId, phase, checked, checkboxEl) {
  const now = new Date().toISOString();
  const by  = currentUser?.email || 'unknown';

  // Optimistic local update — check state is keyed per phase, so an item
  // shared across phases has independent rows.
  const arr = (deployChecks[unitId] ||= []);
  const existing = arr.find(c => c.item_id === itemId && c.phase === phase);
  let saved;
  if (existing) {
    existing.checked = checked;
    existing.checked_by = by;
    existing.checked_at = checked ? now : null;
    saved = existing;
  } else {
    saved = { unit_id: unitId, item_id: itemId, phase, checked, checked_by: by, checked_at: checked ? now : null };
    arr.push(saved);
  }

  // Patch DOM in place — no full re-render
  const row = checkboxEl.closest('.deploy-item');
  if (row) {
    row.classList.toggle('checked', checked);
    const labelEl = row.querySelector('.di-label');
    let byEl = labelEl?.querySelector('.by');
    if (checked) {
      const html = `<span class="by">✓ ${esc(by)} · ${esc(formatDate(now))}</span>`;
      if (byEl) byEl.outerHTML = html;
      else if (labelEl) labelEl.insertAdjacentHTML('beforeend', html);
    } else if (byEl) byEl.remove();
  }

  // Patch phase progress + section count (scoped to the phase that changed)
  const item = deployUnitItems.find(i => i.id === itemId);
  if (item) {
    const prog = deployProgress(unitId, phase);
    const fill = document.querySelector(`[data-phase-fill="${phase}"]`);
    const txt  = document.querySelector(`[data-phase-txt="${phase}"]`);
    if (fill) fill.style.width = prog.pct + '%';
    if (txt)  txt.textContent  = `${prog.done} / ${prog.total} · ${prog.pct}%`;

    const sk = row?.dataset?.secKey;
    if (sk) {
      const stat = document.querySelector(`[data-sec-stat="${cssEsc(sk)}"]`);
      if (stat) {
        const phaseItems = deployUnitItems.filter(i => i.visible !== false && itemInPhase(i, phase))
                                          .sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
        // F.10: group by section_id, matching renderDeployPhaseBlock's
        // ordering so the secKey idx into `order` resolves correctly.
        const u = deployUnits.find(x => x.id === unitId);
        const cache = sectionsCache[u?.model_id] || [];
        const knownIds = new Set(cache.map(s => s.id));
        const sectionMap = {}; const order = [];
        phaseItems.forEach(i => {
          const sid = i.section_id;
          const key = (sid && knownIds.has(sid)) ? sid : '__unsorted__';
          if (!sectionMap[key]) { sectionMap[key] = []; order.push(key); }
          sectionMap[key].push(i);
        });
        const idxStr = sk.split('|')[2];
        const secItems = sectionMap[order[parseInt(idxStr)]] || [];
        const secDone = secItems.filter(i => arr.some(c => c.item_id === i.id && c.phase === phase && c.checked)).length;
        stat.textContent = `${secDone}/${secItems.length}`;
      }
    }
  }

  // Persist
  const { error } = await sb.from('deployops_unit_checks').upsert({
    unit_id: unitId, item_id: itemId, phase,
    checked, checked_by: by,
    checked_at: checked ? now : null
  }, { onConflict: 'unit_id,item_id,phase' });

  if (error) {
    console.error(error);
    toast('Save failed — reverting', 'err');
    saved.checked = !checked;
    if (row) row.classList.toggle('checked', !checked);
    if (checkboxEl) checkboxEl.checked = !checked;
    renderDeploy();
  }
}

let _html2pdfPromise = null;
function loadHtml2Pdf() {
  if (window.html2pdf) return Promise.resolve(window.html2pdf);
  if (_html2pdfPromise) return _html2pdfPromise;
  _html2pdfPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.3/dist/html2pdf.bundle.min.js';
    s.onload  = () => resolve(window.html2pdf);
    s.onerror = () => { _html2pdfPromise = null; reject(new Error('Failed to load html2pdf.js from CDN')); };
    document.head.appendChild(s);
  });
  return _html2pdfPromise;
}

function pdfFilename(sectionName) {
  const safe = (sectionName || 'section')
    .replace(/[\\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '_')
    .trim() || 'section';
  return `Quality_Checklist_${safe}.pdf`;
}

function showPdfProgress(current, total) {
  let el = document.getElementById('pdfProgress');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pdfProgress';
    el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;color:#fff;padding:16px 24px;border-radius:8px;font-size:14px;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,0.4);font-family:inherit;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent = `Generating PDF… (${current}/${total})`;
}
function hidePdfProgress() {
  const el = document.getElementById('pdfProgress');
  if (el) el.remove();
}

// Shown when html2pdf throws. Offers a one-click re-run through the printer path.
function showPrinterFallback(reason, retryViaPrinter) {
  showModal(`
    <h3>⚠️ PDF generation failed</h3>
    <p style="font-size:13px;color:var(--text2);line-height:1.5;margin-top:8px">
      ${esc(reason || 'Unknown error')}.<br>
      You can fall back to the printer dialog — on desktop, choose "Save as PDF" as the destination.
    </p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="pdfFallbackBtn">🖨️ Use Printer Instead</button>
    </div>
  `);
  document.getElementById('pdfFallbackBtn').onclick = () => { closeModal(); retryViaPrinter(); };
}

// Scope the iframe's print CSS so it survives html2pdf detaching the body element
// from the iframe into the parent document. Returns scoped CSS as a string.
// Throws on CSSOM access failure — caller routes to printer fallback.
let _pdfScopeCounter = 0;
function scopePrintCss(cssText, scope) {
  const temp = document.createElement('style');
  temp.textContent = cssText;
  document.head.appendChild(temp);
  let out;
  try {
    if (!temp.sheet) throw new Error('Stylesheet not created');
    const rules = temp.sheet.cssRules;
    if (!rules) throw new Error('cssRules inaccessible');
    out = [];
    for (let i = 0; i < rules.length; i++) {
      const t = transformCssRule(rules[i], scope);
      if (t) out.push(t);
    }
  } finally {
    temp.remove();
  }
  // Preamble: redeclare parent's dark-theme custom properties with print-safe values
  // so any future `var(--text)` etc. inside print CSS resolves correctly.
  const preamble = `.${scope}{--bg:#fff;--text:#111;--text2:#555}`;
  return preamble + '\n' + out.join('\n');
}

function transformCssRule(rule, scope) {
  if (rule instanceof CSSStyleRule) {
    const selectors = rule.selectorText.split(',')
      .map(s => prefixCssSelector(s.trim(), scope))
      .filter(Boolean)
      .join(', ');
    let decls = rule.style.cssText;
    // Parent app's `body{background:var(--bg)}` would otherwise reach the clone unopposed.
    if (rule.selectorText.trim() === 'body' && !/(^|;)\s*background\s*:/i.test(decls)) {
      decls += ';background:#fff';
    }
    return `${selectors} { ${decls} }`;
  }
  // @page — drop (page-level only, no effect inside a scoped div)
  if (typeof CSSPageRule !== 'undefined' && rule instanceof CSSPageRule) return '';
  // @media — recurse, preserve condition wrapper
  if (rule instanceof CSSMediaRule) {
    const inner = Array.from(rule.cssRules).map(r => transformCssRule(r, scope)).filter(Boolean).join('\n');
    return `@media ${rule.conditionText} { ${inner} }`;
  }
  // @supports — recurse
  if (typeof CSSSupportsRule !== 'undefined' && rule instanceof CSSSupportsRule) {
    const inner = Array.from(rule.cssRules).map(r => transformCssRule(r, scope)).filter(Boolean).join('\n');
    return `@supports ${rule.conditionText} { ${inner} }`;
  }
  // @keyframes, @font-face, @import — pass through unchanged
  return rule.cssText || '';
}

function prefixCssSelector(sel, scope) {
  if (!sel) return '';
  if (sel === 'body') return `.${scope}`;
  // :root / html → the scope root itself. CSS custom properties declared
  // there still inherit to descendants (the scope class sits on <body>).
  if (sel === ':root' || sel === 'html') return `.${scope}`;
  if (sel === 'html, body' || sel === 'html,body') return `.${scope}`;
  if (sel === '*')   return `.${scope}, .${scope} *`;
  if (sel.startsWith('body ')) return `.${scope} ${sel.slice(5)}`;
  if (/^body\s*>/.test(sel)) return `.${scope} ${sel.replace(/^body\s*/, '')}`;
  return `.${scope} ${sel}`;
}

// Render groups as one PDF per section. Each section gets its print CSS scoped
// and injected into the parent doc so the styles travel with html2pdf's clone-out.
// On any error: aborts the loop, surfaces the printer-fallback modal.
async function openPdfFromGroups(groups, renderOne, buildOpts, lang, printerFallbackFn) {
  if (!groups || groups.length === 0) { toast('No content to render', 'err'); return; }

  showPdfProgress(0, groups.length);

  try {
    await loadHtml2Pdf();
  } catch (e) {
    hidePdfProgress();
    console.error(e);
    showPrinterFallback(e.message || 'Could not load PDF library', printerFallbackFn);
    return;
  }

  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:-10000px;top:0;width:794px;height:1123px;border:0';
  document.body.appendChild(iframe);

  try {
    for (let i = 0; i < groups.length; i++) {
      const g = groups[i];
      showPdfProgress(i + 1, groups.length);

      const sectionBody = renderOne(g);
      const docHtml = buildOpts.docBuilder
        ? buildOpts.docBuilder(sectionBody)
        : buildPrintHTML(
            buildOpts.title,
            buildOpts.subtitle || '',
            sectionBody,
            buildOpts
          );

      iframe.contentDocument.open();
      iframe.contentDocument.write(docHtml);
      iframe.contentDocument.close();

      // Layout + font settle. iOS Safari may need longer for first-section CJK hydration —
      // if JA tests show fallback boxes, await iframe.contentDocument.fonts.ready before rasterizing.
      await new Promise(r => setTimeout(r, 50));

      // Verify CSSOM access — failure here routes to the same fallback path as html2pdf throwing.
      const sheets = iframe.contentDocument.styleSheets;
      if (!sheets || sheets.length === 0) throw new Error('Iframe has no stylesheet');
      try { void sheets[0].cssRules; } catch (e) { throw new Error('CSSOM access failed: ' + (e.message || e)); }
      if (!sheets[0].cssRules) throw new Error('CSSOM cssRules returned null');

      const scope = `pdf-render-${++_pdfScopeCounter}`;
      const rawCss = Array.from(iframe.contentDocument.querySelectorAll('style'))
        .map(s => s.textContent).join('\n');
      let injectedStyle = null;
      try {
        const scopedCss = scopePrintCss(rawCss, scope);
        injectedStyle = document.createElement('style');
        injectedStyle.id = scope;
        injectedStyle.textContent = scopedCss;
        document.head.appendChild(injectedStyle);
        iframe.contentDocument.body.classList.add(scope);

        const filename = pdfFilename(pickSection(g, lang));
        await window.html2pdf()
          .from(iframe.contentDocument.body)
          .set({
            margin:      [10, 10, 10, 10],
            filename:    filename,
            image:       { type: 'jpeg', quality: 0.96 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:   { mode: ['css', 'legacy'] }
          })
          .save();
      } finally {
        // Cleanup the parent-doc style tag whether html2pdf succeeded or threw.
        if (injectedStyle) injectedStyle.remove();
      }
    }
  } catch (e) {
    console.error('PDF generation failed', e);
    iframe.remove();
    hidePdfProgress();
    showPrinterFallback(
      `PDF generation failed: ${e.message || e}`,
      printerFallbackFn
    );
    return;
  }

  iframe.remove();
  hidePdfProgress();
  toast(`Generated ${groups.length} PDF${groups.length === 1 ? '' : 's'}`, 'ok');
}

// Per-section PDF mode: render each section as its own complete PDF
// via the same iframe + scoped-CSS pipeline as openPdfFromGroups, but
// collect outputPdf('blob') results into a JSZip archive and trigger
// one zip download at the end. Any error routes to the printer fallback.
async function generatePerSectionPdfZip(model, unitName, sections, lang, style, printerFallback) {
  if (!sections || sections.length === 0) { toast('No content to render', 'err'); return; }

  showPdfProgress(0, sections.length);

  try {
    await loadHtml2Pdf();
  } catch (e) {
    hidePdfProgress();
    console.error(e);
    showPrinterFallback(e.message || 'Could not load PDF library', printerFallback);
    return;
  }
  if (!window.JSZip) {
    hidePdfProgress();
    showPrinterFallback('JSZip library not available (check head script tag)', printerFallback);
    return;
  }

  const zip = new window.JSZip();
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:-10000px;top:0;width:794px;height:1123px;border:0';
  document.body.appendChild(iframe);

  try {
    for (let i = 0; i < sections.length; i++) {
      const sec = sections[i];
      showPdfProgress(i + 1, sections.length);

      const bodyHtml = `<div class="sheet">${renderSectionDoc(model, unitName, sec, lang, style)}</div>`;
      const docHtml = buildWorksheetDoc(bodyHtml, { style, forPdf: true });

      iframe.contentDocument.open();
      iframe.contentDocument.write(docHtml);
      iframe.contentDocument.close();

      // Layout + font settle before rasterizing.
      await new Promise(r => setTimeout(r, 50));

      const sheets = iframe.contentDocument.styleSheets;
      if (!sheets || sheets.length === 0) throw new Error('Iframe has no stylesheet');
      try { void sheets[0].cssRules; } catch (e) { throw new Error('CSSOM access failed: ' + (e.message || e)); }
      if (!sheets[0].cssRules) throw new Error('CSSOM cssRules returned null');

      const scope = `pdf-render-${++_pdfScopeCounter}`;
      const rawCss = Array.from(iframe.contentDocument.querySelectorAll('style'))
        .map(s => s.textContent).join('\n');
      let injectedStyle = null;
      try {
        const scopedCss = scopePrintCss(rawCss, scope);
        injectedStyle = document.createElement('style');
        injectedStyle.id = scope;
        injectedStyle.textContent = scopedCss;
        document.head.appendChild(injectedStyle);
        iframe.contentDocument.body.classList.add(scope);

        const blob = await window.html2pdf()
          .from(iframe.contentDocument.body)
          .set({
            // No margin from html2pdf — CSS @page is the single source of
            // truth. html2pdf's default ~10mm stacked on top of @page
            // produced ~28mm effective gutters and roughly halved content
            // density vs the reference design.
            margin:      0,
            image:       { type: 'jpeg', quality: 0.96 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:   { mode: ['css', 'legacy'] }
          })
          .outputPdf('blob');

        // Filenames stay English regardless of lang — sectionName holds the
        // canonical English key, displayName is the locale-aware label and
        // belongs in the title only. Leftover sentinel maps to 'Other'.
        const fnameKey = sec.sectionName === '__leftover__'
          ? 'Other'
          : (sec.sectionName || sec.displayName || 'section');
        zip.file(pdfFilenameForSection(fnameKey), blob);
      } finally {
        if (injectedStyle) injectedStyle.remove();
      }
    }
  } catch (e) {
    console.error('Per-section PDF zip generation failed', e);
    iframe.remove();
    hidePdfProgress();
    showPrinterFallback(`PDF generation failed: ${e.message || e}`, printerFallback);
    return;
  }

  iframe.remove();

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  hidePdfProgress();

  const zipName = zipFilenameForModelUnit(model?.name, unitName);
  downloadBlob(zipBlob, zipName);
  toast(`Generated ${sections.length} PDF${sections.length === 1 ? '' : 's'} in ${zipName}`, 'ok');
}

async function printBlankWorkOrder(modelId, unitId, opts) {
  const { phaseFilter, plain = false, emptyRows = false, lang = 'en', dest = 'printer', wsStyle = 'word' } = opts || {};
  const m = modelById(modelId);
  if (!m) { toast('Model not found', 'err'); return; }

  // Source items: prefer in-memory if it matches context; otherwise fetch
  let items;
  if (unitId && deployLoadedFor === modelId) {
    items = deployUnitItems;
  } else if (modelView === modelId) {
    items = modelItems;
  } else {
    try {
      const { data, error } = await sb.from('deployops_checklist_items')
        .select('*').eq('model_id', modelId).order('sort_order', { ascending: true });
      if (error) throw error;
      items = data || [];
    } catch(e) {
      console.error(e);
      toast('Load failed: ' + (e.message || e), 'err');
      return;
    }
  }

  // F.10: ensure sectionsCache is hot. wsGroupBySection (worksheet PDFs)
  // and genGroups (legacy Work Order / Filled Status templates) both
  // read from it. Print can fire from Models-list cards or Deploy unit-
  // detail, neither of which calls openModel(), so the cache may be cold
  // here. Idempotent: no fetch when already populated.
  if (!sectionsCache[modelId]) await loadSections(modelId);

  // unitName is pre-printed when invoked from Deploy (a unit is selected);
  // when invoked from Models tab unitId is null and the operator writes it by hand.
  let unitName = null;
  if (unitId) {
    const u = deployUnits.find(x => x.id === unitId);
    if (u) unitName = u.unit_name || u.name || null;
  }

  // QC Worksheet (paper form) — used whenever real DB items are printed.
  // Per-section output: each section is its own self-contained document
  // (title, fields, legend, phase blocks for any phases with items in
  // this section, footer). Printer mode concatenates them with a page
  // break between; PDF mode bundles them into a single .zip download.
  // The empty-rows hand-write template (below) keeps the legacy simple-
  // table layout because it has no items/tiers to organize.
  if (!emptyRows) {
    const style = wsStyle;
    // "All" = both per-unit phases (Pre-Install QC + Pre-Test QC). These
    // are the operator + QC checks performed on a single unit. Pre-Deploy
    // is a shipment-level batch operation (different stakeholders, different
    // timing, eventually an N-column matrix per the original handoff) and
    // is intentionally excluded from "All". It stays accessible via the
    // dedicated "Pre-Deploy only" radio in the print modal.
    const includePhases = phaseFilter ? [phaseFilter] : ['pre_install_qc', 'pre_test_qc'];
    const visibleItems = items
      .filter(i => i.visible !== false)
      .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
    const sectionDocs = wsBuildSectionDocs(visibleItems, includePhases, lang);
    if (sectionDocs.length === 0) {
      toast('No items in these phases to print', 'err'); return;
    }
    const wsPrinterPath = () => {
      const body = renderAllSectionsForPrint(m, unitName, sectionDocs, lang, style);
      openPrintWindow(buildWorksheetDoc(body, { style, forPdf: false }));
    };
    if (dest === 'pdf') {
      await generatePerSectionPdfZip(m, unitName, sectionDocs, lang, style, wsPrinterPath);
    } else {
      wsPrinterPath();
    }
    return;
  }

  // Legacy hand-write template (emptyRows): blank numbered rows, one section
  // per page. Phase membership-aware grouping.
  const filtered = (phaseFilter ? items.filter(i => itemInPhase(i, phaseFilter)) : [...items])
    .sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
  if (filtered.length === 0) { toast(phaseFilter ? 'No items in this phase to print' : 'No items to print', 'err'); return; }
  const groups = genGroups(filtered, phaseFilter, lang);

  // One section per page: minimal header (title + date + field strip), section block, page break.
  const renderOne = (g) => `
    ${renderPerSectionHeader(g, { unitName, lang })}
    ${renderBlankSectionBlock(g, { emptyRows, lang })}
  `;

  const title = `${esc(m.name)} — Work Order`;
  const buildOpts = {
    customHeader: '',
    customFooter: '',
    extraCss: woStylesCss,
    style: plain ? 'plain' : 'branded',
    title
  };

  const printerPath = () => {
    const body = groups.map((g, i) =>
      `${renderOne(g)}${i === groups.length - 1 ? '' : '<div class="pagebreak"></div>'}`
    ).join('');
    openPrintWindow(buildPrintHTML(title, '', body, buildOpts));
  };

  if (dest === 'pdf') {
    await openPdfFromGroups(groups, renderOne, buildOpts, lang, printerPath);
  } else {
    printerPath();
  }
}

async function printFilledStatus(opts) {
  const { phaseFilter, sectionPerPage = false, plain = false, lang = 'en', dest = 'printer' } = opts || {};
  const u = deployUnits.find(x => x.id === deployUnitId); if (!u) return;
  const m = modelById(u.model_id) || modelById(deployModelId);
  const ck = deployChecks[u.id] || [];
  const filtered = (phaseFilter ? deployUnitItems.filter(i => itemInPhase(i, phaseFilter)) : [...deployUnitItems])
    .sort((a,b) => (a.sort_order||0)-(b.sort_order||0));

  const subParts = [];
  if (m) subParts.push(esc(m.name) + (m.ref ? ` · ${esc(m.ref)}` : ''));
  subParts.push(esc(u.unit_name||u.name||''));
  subParts.push(new Date().toLocaleDateString());
  const subtitle = subParts.join('  |  ');

  const phaseLabelText = phaseFilter
    ? phaseLabel(phaseFilter, true, lang)
    : (plain ? tr(lang,'all') : tr(lang,'bothPhases'));

  const groups = genGroups(filtered, phaseFilter, lang);
  // Totals over the rendered groups so a multi-phase item is counted once per
  // phase it appears in, matching the per-phase check state.
  const total = groups.reduce((n, g) => n + g.items.length, 0);
  const done  = groups.reduce((n, g) =>
    n + g.items.filter(it => ck.some(c => c.item_id === it.id && c.phase === g.phase && c.checked)).length, 0);
  const titleStr = plain
    ? tr(lang,'qcTitle')
    : `${esc(u.unit_name||u.name||'Unit')} — ${tr(lang,'deployChecklist')}`;

  // Per-section renderer — used both for the PDF path (one PDF per group) and
  // the printer's sectionPerPage path. Self-contained: own header + progress strip + block.
  const renderOne = (g) => {
    const secDone = g.items.filter(it => ck.some(c => c.item_id === it.id && c.phase === g.phase && c.checked)).length;
    const head = plain
      ? `<div class="print-header"><h1>${esc(titleStr)}</h1><p>${subtitle}</p></div>`
      : `<div class="print-header"><h1>⚙️ DeployOps — ${esc(u.unit_name||u.name||'Unit')} — ${tr(lang,'deployChecklist')}</h1><p>${subtitle}</p></div>`;
    return `
      ${head}
      <div style="margin-bottom:12px;font-size:12px;display:flex;gap:18px;flex-wrap:wrap">
        <span><strong>${tr(lang,'phase')}:</strong> ${phaseLabel(g.phase, plain, lang)}</span>
        <span><strong>${tr(lang,'section')}:</strong> ${esc(pickSection(g, lang))}</span>
        <span><strong>${tr(lang,'progress')}:</strong> ${secDone}/${g.items.length} ${tr(lang,'complete')}</span>
      </div>
      ${renderFilledSectionBlock(g, ck, { plain, lang })}
    `;
  };

  const pdfBuildOpts = {
    customHeader: '',  // renderOne emits its own print-header
    style: plain ? 'plain' : 'branded',
    title: titleStr,
    subtitle
  };

  const printerPath = () => {
    let body, customHeader;
    if (sectionPerPage) {
      body = groups.map((g, i) =>
        `${renderOne(g)}${i === groups.length - 1 ? '' : '<div class="pagebreak"></div>'}`
      ).join('');
      customHeader = '';
    } else {
      body = `
        <div style="margin-bottom:12px;font-size:12px;display:flex;gap:18px;flex-wrap:wrap">
          <span><strong>${tr(lang,'phase')}:</strong> ${phaseLabelText}</span>
          <span><strong>${tr(lang,'progress')}:</strong> ${done}/${total} ${tr(lang,'complete')}</span>
        </div>
        ${groups.map(g => renderFilledSectionBlock(g, ck, { plain, lang })).join('')}
      `;
      customHeader = undefined;  // default header from buildPrintHTML
    }
    openPrintWindow(buildPrintHTML(titleStr, subtitle, body, {
      customHeader,
      style: plain ? 'plain' : 'branded'
    }));
  };

  if (dest === 'pdf') {
    await openPdfFromGroups(groups, renderOne, pdfBuildOpts, lang, printerPath);
  } else {
    printerPath();
  }
}

function openPrintWindow(html) {
  const w = window.open('', '_blank');
  if (!w) { toast('Pop-up blocked. Allow pop-ups to print.', 'err'); return; }
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.print(); };
}

async function loadModels() {
  try {
    const { data, error } = await sb.from('deployops_models').select('*').order('created_at', { ascending: true });
    if (error) throw error;
    models = (data || []).filter(m => m.visible !== false);
    await loadModelStats();
  } catch(e) {
    console.error(e);
    toast('Failed to load models: ' + (e.message || e), 'err');
  }
}

async function loadModelStats() {
  modelUnitCount = {}; modelItemCount = {};
  if (models.length === 0) return;
  const ids = models.map(m => m.id);
  try {
    const [unitsRes, itemsRes] = await Promise.all([
      sb.from('deployops_units').select('id,model_id').in('model_id', ids),
      sb.from('deployops_checklist_items').select('id,model_id,phase,phases,visible').in('model_id', ids)
    ]);
    (unitsRes.data || []).forEach(u => {
      modelUnitCount[u.model_id] = (modelUnitCount[u.model_id] || 0) + 1;
    });
    (itemsRes.data || []).forEach(it => {
      if (it.visible === false) return;
      const c = (modelItemCount[it.model_id] ||= { pre_install_qc: 0, pre_test_qc: 0, pre_deploy: 0 });
      // An item counts once per phase it belongs to (unnest(phases) semantics).
      itemPhases(it).forEach(ph => { if (c[ph] !== undefined) c[ph]++; });
    });
  } catch(e) {
    console.error('stats load failed', e);
  }
}

async function renderModels() {
  const el = document.getElementById('modelsContent');
  if (modelView) { await renderModelDetail(el); return; }

  if (models.length === 0 && !window._modelsLoaded) {
    el.innerHTML = `<div class="empty"><div class="icon">⏳</div><p>Loading models…</p></div>`;
    await loadModels();
    window._modelsLoaded = true;
  }

  let html = `
    <div class="page-header">
      <h1>🤖 Models</h1>
      <button class="btn btn-primary admin-only" onclick="showAddModel()">➕ New Model</button>
    </div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:18px;line-height:1.5">
      Each robot model has its own checklist split across phases — <b>Pre-Install QC</b> (post-build),
      <b>Pre-Test QC</b> (pre power-on) and <b>Pre-Deploy</b> (pre-shipping). An item can belong to
      more than one phase. Click a model to edit its checklist.
    </p>
  `;

  if (models.length === 0) {
    html += `<div class="empty"><div class="icon">🤖</div><p>No models yet.</p>
      <button class="btn btn-primary admin-only" onclick="showAddModel()">Add your first model</button></div>`;
    el.innerHTML = html;
    return;
  }

  const lang = getUiLang();
  html += `<div class="models-grid">`;
  models.forEach(m => {
    const stats = modelItemCount[m.id] || { pre_install_qc: 0, pre_test_qc: 0, pre_deploy: 0 };
    const uN = modelUnitCount[m.id] || 0;
    html += `
      <div class="model-card" onclick="openModel('${m.id}')">
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-sm" onclick="showRenameModel('${m.id}')" title="Edit">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteModel('${m.id}')" title="Delete">🗑️</button>
        </div>
        <div class="model-icon">${m.icon || '🤖'}</div>
        <h3>${esc(pickField(m, 'name', lang))}</h3>
        <div class="ref">REF · ${esc(m.ref || '')}</div>
        <div class="desc">${esc(pickField(m, 'description', lang) || '')}</div>
        <div class="stats">
          <span><b>${uN}</b>units</span>
          <span><b>${stats.pre_install_qc + stats.pre_test_qc}</b>QC items</span>
          <span><b>${stats.pre_deploy}</b>kit items</span>
        </div>
      </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

async function openModel(id) {
  modelView = id; modelPhase = 'pre_install_qc'; inlineAddSection = null; currentEditorSection = null;
  await Promise.all([loadModelItems(id), loadSections(id)]);
  renderModels();
}
function backToModels() { modelView = null; modelItems = []; inlineAddSection = null; currentEditorSection = null; renderModels(); }
function setModelPhase(p) { modelPhase = p; inlineAddSection = null; currentEditorSection = null; brushPhase = null; renderModels(); }

// Folder-view navigation. openSectionFolder drills into a section's items;
// backToFolderGrid returns to the grid. (F.10: draft cleanup removed —
// sections persist in deployops_sections from creation; there are no
// transient drafts to clean up. Use the edit-section modal's Delete
// button to remove an empty section.)
function openSectionFolder(secName) { currentEditorSection = secName; brushPhase = null; renderModels(); }
function backToFolderGrid() {
  inlineAddSection = null;
  currentEditorSection = null;
  brushPhase = null;
  renderModels();
}

// G.2: brush-mode phase tagging. setBrushPhase toggles the active paint
// phase (independent of modelPhase — does NOT touch currentEditorSection,
// so it stays inside the open folder). setItemPhases is the shared write
// helper (also the contract owner for keeping phase = phases[0] in sync,
// :416-418). brushToggleItem flips the brush phase on a single item.
function setBrushPhase(p) {
  brushPhase = (brushPhase === p) ? null : p;
  renderModels();
}

async function setItemPhases(itemId, nextPhases) {
  const { error } = await sb.from('deployops_checklist_items')
    .update({ phases: nextPhases, phase: nextPhases[0] }).eq('id', itemId);
  if (error) throw error;
  const it = modelItems.find(i => i.id === itemId);
  if (it) { it.phases = nextPhases; it.phase = nextPhases[0]; }
  return it;
}

async function brushToggleItem(itemId) {
  if (!isAdmin || !brushPhase) return;
  const it = modelItems.find(i => i.id === itemId);
  if (!it) return;
  const cur = itemPhases(it);
  const has = cur.includes(brushPhase);
  let next;
  if (has) {
    next = cur.filter(p => p !== brushPhase);
    // Invariant: an item must keep ≥1 phase (brush-only guard; the edit
    // modal keeps its own validation untouched).
    if (next.length === 0) { toast(tr(getUiLang(), 'brushLastPhase'), 'err'); return; }
  } else {
    // Re-derive in canonical ALL_PHASES order so phases[0] stays deterministic.
    next = ALL_PHASES.filter(p => cur.includes(p) || p === brushPhase);
  }
  const prevPhases = cur.slice();
  const prevPhase = it.phase;
  // Optimistic update + re-render, revert on failure.
  it.phases = next; it.phase = next[0];
  renderModels();
  try {
    await setItemPhases(itemId, next);
    recountOpenModel();
  } catch(e) {
    console.error(e);
    it.phases = prevPhases; it.phase = prevPhase;
    renderModels();
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

async function loadModelItems(modelId) {
  try {
    const { data, error } = await sb.from('deployops_checklist_items')
      .select('*').eq('model_id', modelId).order('sort_order', { ascending: true });
    if (error) throw error;
    modelItems = data || [];
  } catch(e) {
    console.error(e);
    toast('Failed to load items: ' + (e.message || e), 'err');
    modelItems = [];
  }
}

// F.9: sections live in deployops_sections (one row per (model_id, name),
// UNIQUE constraint enforced). loadSections fetches into sectionsCache so
// the folder grid can render even when a section has zero items in the
// active phase.
async function loadSections(modelId) {
  try {
    const { data, error } = await sb.from('deployops_sections')
      .select('*').eq('model_id', modelId).order('sort_order', { ascending: true }).order('name', { ascending: true });
    if (error) throw error;
    let sections = data || [];
    // G.1: eager sort_order seed. Legacy rows from F.9/earlier shipped with
    // sort_order=0 across the board, leaving DnD with no stable baseline.
    // When every row is zero/null we assign 10, 20, 30... in current
    // (sort_order=0, name ASC) display order. Idempotent: once any row has
    // a non-zero value, this branch is skipped forever.
    if (sections.length > 1 && sections.every(s => !s.sort_order)) {
      const updates = sections.map((s, i) => ({ ...s, sort_order: (i + 1) * 10 }));
      const { error: upErr } = await sb.from('deployops_sections')
        .upsert(updates, { onConflict: 'id' });
      if (upErr) console.error('Section sort_order seed failed:', upErr);
      else sections = updates;
    }
    sectionsCache[modelId] = sections;
    return sectionsCache[modelId];
  } catch(e) {
    console.error('Failed to load sections:', e);
    sectionsCache[modelId] = [];
    return [];
  }
}

// Returns the section row for (modelId, name), creating it if missing.
// Used by inline-add (after rename-on-typo) and bulk-add's "+ New" path.
// UNIQUE(model_id, name) protects against races: on 23505 we re-fetch the
// cache and resolve the now-existing row instead of erroring.
async function ensureSection(modelId, name) {
  const cache = sectionsCache[modelId] || [];
  const found = cache.find(s => s.name === name);
  if (found) return found;
  const maxSort = Math.max(0, ...cache.map(s => s.sort_order || 0));
  const { data, error } = await sb.from('deployops_sections')
    .insert({ model_id: modelId, name, sort_order: maxSort + 1 })
    .select().single();
  if (!error) {
    (sectionsCache[modelId] ||= []).push(data);
    return data;
  }
  if (error.code === '23505') {
    await loadSections(modelId);
    return (sectionsCache[modelId] || []).find(s => s.name === name) || null;
  }
  throw error;
}

function modelById(id) { return models.find(m => m.id === id); }
function itemsForPhase(phase) {
  return modelItems.filter(i => i.visible !== false && itemInPhase(i, phase))
                   .sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
}

      <button class="btn btn-sm" onclick="printModelBlankWorkOrder('${m.id}')">🖨️ Print Blank Work Order</button>

        🧪 Pre-Test QC <span class="count">(${testN})</span>

      ${showDeployTab ? `

        📦 Pre-Deploy <span class="count">(${depN})</span>

    </div>

    <p style="color:var(--text2);font-size:12px;margin-bottom:14px;line-height:1.5">

        ? '<b>Pre-Install QC</b> — checks performed after the unit is built. Was it assembled correctly?'
        : modelPhase==='pre_test_qc'

    </p>

    <div class="phase-toolbar admin-only">
      <button class="btn btn-primary btn-sm" onclick="showNewSection()">➕ New Section</button>
      ${currentEditorSection ? `<button class="btn btn-sm" onclick="openBulkAdd()">📋 Bulk add</button>` : ''}
    </div>
  `;

  // === Editor body: folder grid (currentEditorSection===null) or single-
  // section detail view. F.9: sections are sourced from deployops_sections
  // (sectionsCache[modelId]); items reference them via section_id (FK).
  // Sections with zero items in the active phase still appear in the
  // folder grid with count 0 — the architectural win of F.9 is that
  // empty sections persist as DB rows. ===
  const allSections = sectionsCache[modelView] || [];
  const countByPhase = sec => modelItems.filter(i =>
    i.visible !== false && itemInPhase(i, modelPhase) && i.section_id === sec.id
  ).length;

  if (currentEditorSection === null) {
    // Folder grid
    if (allSections.length === 0) {
      html += `<div class="empty"><div class="icon">${PHASE_META[modelPhase]?.icon || '🛡️'}</div>
        <p>No sections yet for this phase.<br>Click <b>+ New Section</b> above to start.</p></div>`;
    } else {
      html += `<div class="folder-grid">`;
      allSections.forEach(section => {
        const count = countByPhase(section);
        const displayName = (lang === 'ja' && section.name_ja) ? section.name_ja : section.name;
        const icon = section.icon || '📁';
        // G.1: model-wide item count for delete-guard tooltip. Card badge
        // stays phase-scoped; the guard is model-wide because deleting a
        // section removes it from all three phases.
        const modelWideCount = modelItems.filter(i =>
          i.section_id === section.id && i.visible !== false
        ).length;
        const blocked = modelWideCount > 0;
        const blockedTip = lang === 'ja'
          ? `先にアイテムを移動してください (全フェーズ計${modelWideCount}件)`
          : `Move items first (${modelWideCount} item${modelWideCount===1?'':'s'} across all phases)`;
        const deleteTip = blocked ? blockedTip : (lang === 'ja' ? 'セクションを削除' : 'Delete section');
        const dragTip = lang === 'ja' ? 'ドラッグして並べ替え' : 'Drag to reorder';
        html += `
          <div class="folder-card" draggable="false" data-sec="${esc(section.id)}" onclick="openSectionFolder(this.dataset.sec)"
               ondragover="onSectionDragOver(event)" ondragleave="onSectionDragLeave(event)" ondrop="onSectionDrop(event)">
            <span class="folder-drag-handle admin-only" draggable="true"
                  ondragstart="onSectionDragStart(event, '${esc(section.id)}')" ondragend="onSectionDragEnd(event)"
                  title="${esc(dragTip)}">⠿</span>
            <button class="delete-icon-btn admin-only" data-sec="${esc(section.id)}" ${blocked?'disabled':''}
                    onclick="event.stopPropagation();deleteSection(this.dataset.sec)" title="${esc(deleteTip)}">🗑</button>
            <span class="folder-count">${count}</span>
            <button class="edit-icon-btn admin-only" data-sec="${esc(section.id)}" onclick="event.stopPropagation();showEditSection(this.dataset.sec)" title="Edit section">✏</button>
            <div class="folder-icon">${esc(icon)}</div>
            <div class="folder-name">${esc(displayName)}</div>
          </div>`;
      });
      html += `</div>`;
    }
  } else {
    // Single-section detail view
    const section = allSections.find(s => s.id === currentEditorSection);
    if (!section) {
      // Section was deleted mid-render (concurrent action) — bounce to grid.
      currentEditorSection = null;
      el.innerHTML = ''; renderModels(); return;
    }
    const secName = section.name;
    const displayName = (lang === 'ja' && section.name_ja) ? section.name_ja : section.name;
    const secIcon = section.icon || '📁';
    // G.2: brush mode suspends the modelPhase filter so items lacking the
    // brush phase are reachable (and never vanish on toggle). Normal mode
    // keeps the phase-scoped view exactly as before.
    const secItems = modelItems.filter(i =>
      i.visible !== false && i.section_id === section.id &&
      (brushPhase ? true : itemInPhase(i, modelPhase))
    ).sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
    // G.2: admin-only brush chip rail — pick a phase to paint. Independent
    // of the nav phase tabs; clicking the active chip turns the brush off.
    const brushRail = `
      <div class="brush-rail admin-only">
        <span class="brush-rail-icon">🖌️</span>
        ${ALL_PHASES.map(p =>
          `<button class="brush-chip ${p===brushPhase?'on':''}" onclick="setBrushPhase('${p}')">${PHASE_META[p].icon} ${esc(phaseLabel(p, true, lang))}</button>`
        ).join('')}
      </div>`;
    const brushBanner = brushPhase
      ? `<div class="brush-banner">🖌️ ${esc(tr(lang,'brushBanner').replace('{phase}', phaseLabel(brushPhase, true, lang)))}</div>`
      : '';
    html += `
      <button class="back-btn" onclick="backToFolderGrid()">← Back to sections</button>
      ${brushRail}
      <div class="cl-section">
        <div class="cl-section-header">
          <h3><span class="section-icon-display">${esc(secIcon)}</span> ${esc(displayName)}</h3>
          <span class="badge badge-blue">${secItems.length}</span>
        </div>
        <div class="cl-section-body">
          ${brushBanner}`;

    if (secItems.length === 0) {
      html += `<div class="empty-section-hint">Empty section — add the first item below ↓</div>`;
    }

    const inBrush = !!brushPhase;
    secItems.forEach((it, idx) => {
      const ph = itemPhases(it);
      const multi = ph.length > 1;
      // In brush mode the brush phase is the highlighted (.on) badge; in
      // normal mode it's the active nav phase. Labels via phaseLabel() so
      // chips/badges localize (decision 4 — no short JA exists).
      const activePhase = brushPhase || modelPhase;
      const pills = ALL_PHASES.filter(p => ph.includes(p)).map(p =>
        `<span class="phase-pill ${p===activePhase?'on':''}" title="${esc(phaseLabel(p, true, lang))}">${esc(phaseLabel(p, true, lang))}</span>`
      ).join('');
      const tierBadge = (it.tier && it.tier !== 'plain')
        ? `<span class="badge badge-blue" title="${esc((WS_TIERS[it.tier]||{}).cls||it.tier)}">${esc((WS_TIERS[it.tier]||{}).letter||'')}</span>`
        : '';
      const tagged = inBrush && ph.includes(brushPhase);
      // Row body is tappable only in brush mode and only for admins. Action
      // buttons below stopPropagation so edit/move/delete never toggle.
      const tap = (inBrush && isAdmin) ? ` onclick="brushToggleItem('${it.id}')"` : '';
      const tick = inBrush ? `<span class="brush-tick">${tagged?'✓':'○'}</span>` : '';
      html += `<div class="cl-item ${multi?'multi':''}${inBrush?' brush':''}${tagged?' tagged':''}"${tap}>
        ${tick}
        <span class="order">${idx+1}</span>
        <div style="flex:1;min-width:0">
          <div class="label">${esc(it.label)}</div>
          ${it.description ? `<div class="desc">${esc(it.description)}</div>` : ''}
        </div>
        <div class="phase-pills">${tierBadge}${pills}</div>
        <div class="meta">
          ${it.part_number ? `<span class="badge badge-blue">${esc(it.part_number)}</span>` : ''}
          ${it.qty         ? `<span class="badge badge-orange">×${it.qty}</span>` : ''}
          ${it.tool        ? `<span class="badge badge-green">${esc(it.tool)}</span>` : ''}
        </div>
        <div class="row-actions admin-only">
          <button class="btn btn-sm" onclick="event.stopPropagation();moveModelItem('${it.id}',-1)" title="Up">▲</button>
          <button class="btn btn-sm" onclick="event.stopPropagation();moveModelItem('${it.id}',1)"  title="Down">▼</button>
          <button class="btn btn-sm" onclick="event.stopPropagation();editModelItem('${it.id}')"    title="Edit">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteModelItem('${it.id}')" title="Delete">✕</button>
        </div>
      </div>`;
    });

    if (inlineAddSection === secName) {
      html += renderInlineAddRow();
    } else {
      html += `<button class="add-item-btn admin-only" data-sec="${esc(secName)}" onclick="openInlineAdd(this.dataset.sec)">➕ Add item</button>`;
    }

    html += `</div></div>`;
  }

  el.innerHTML = html;

  if (inlineAddSection) {
    setTimeout(() => { const i = document.getElementById('inline-label'); if (i) i.focus(); }, 20);
  }
}

function renderInlineAddRow() {
  const isKit = modelPhase === 'pre_deploy';
  return `
    <div class="cl-item-inline">
      <input id="inline-label" class="inline-input inline-label" placeholder="Item label" onkeydown="inlineKey(event)">
      ${isKit ? `
        <input id="inline-pn"   class="inline-input" placeholder="Part #"  style="flex:0 1 110px;min-width:90px"  onkeydown="inlineKey(event)">
        <input id="inline-qty"  class="inline-input" placeholder="Qty"     style="flex:0 1 70px;min-width:60px"   type="number" onkeydown="inlineKey(event)">
        <input id="inline-tool" class="inline-input" placeholder="Tool"    style="flex:0 1 100px;min-width:80px"  onkeydown="inlineKey(event)">
      ` : `
        <input id="inline-desc" class="inline-input" placeholder="Description (optional)" style="flex:1 1 200px"  onkeydown="inlineKey(event)">
      `}
      <div class="inline-actions">
        <span class="hint">↵ save · esc cancel</span>
        <button class="btn btn-sm" onclick="closeInlineAdd()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveInlineItem()">Save</button>
      </div>
    </div>
  `;
}

function inlineKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); saveInlineItem(); }
  else if (e.key === 'Escape') { e.preventDefault(); closeInlineAdd(); }
}
function openInlineAdd(secName) { inlineAddSection = secName; renderModels(); }
function closeInlineAdd() {
  // F.10: draft cleanup removed — sections persist on create, so there's
  // nothing transient to clean up when the inline-add row closes.
  inlineAddSection = null;
  renderModels();
}

async function saveInlineItem() {
  const m = modelById(modelView); if (!m) return;
  const sec = inlineAddSection; if (!sec) return;
  const labelEl = document.getElementById('inline-label'); if (!labelEl) return;
  const label = labelEl.value.trim();
  if (!label) { labelEl.focus(); return; }

  const isKit = modelPhase === 'pre_deploy';
  // Defensive ensureSection: cache-first lookup short-circuits when the
  // section already exists; only hits the DB if the section is missing
  // (concurrent-tab race, stale cache, or a future entry-point that
  // bypasses confirmNewSection). Mirrors applyBulkAdd's pattern.
  let sectionRow;
  try {
    sectionRow = await ensureSection(m.id, sec);
  } catch(e) {
    console.error(e);
    toast('Section resolve failed: ' + (e.message || e), 'err');
    return;
  }
  if (!sectionRow) { toast('Section not found', 'err'); return; }
  const maxSort = Math.max(0, ...itemsForPhase(modelPhase).map(i => i.sort_order||0));
  const row = {
    model_id: m.id,
    phase: modelPhase,            // transition: single col = phases[0]
    phases: [modelPhase],         // new items belong to exactly the current phase
    section_type: isKit ? 'screw' : 'check',  // legacy column kept consistent for old code paths
    section_id: sectionRow.id,                  // F.10: section_id is the sole section reference
    sort_order: maxSort + 1,
    label
  };
  if (isKit) {
    row.part_number = document.getElementById('inline-pn').value.trim() || null;
    const q = document.getElementById('inline-qty').value;
    row.qty = q ? (parseInt(q) || null) : null;
    row.tool = document.getElementById('inline-tool').value.trim() || null;
  } else {
    row.description = document.getElementById('inline-desc').value.trim() || null;
  }

  try {
    const { data, error } = await sb.from('deployops_checklist_items').insert(row).select().single();
    if (error) throw error;
    modelItems.push(data);
    recountOpenModel();  // refresh list-view stats so back-nav shows accurate counts
    toast('Item added', 'ok');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

function showNewSection() {
  showModal(`
    <h3>➕ New Section</h3>
    <label>Section name</label>
    <input id="newSecName" placeholder="e.g. Pillar" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewSection()}">
    <p style="font-size:11px;color:var(--text2);margin-top:6px">A new section will appear and the inline-add row will open so you can start typing items right away.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewSection()">Create</button>
    </div>
  `);
  setTimeout(() => { const i = document.getElementById('newSecName'); if (i) i.focus(); }, 30);
}
async function confirmNewSection() {
  const m = modelById(modelView); if (!m) return;
  const name = document.getElementById('newSecName').value.trim();
  if (!name) { toast('Enter a section name', 'err'); return; }
  try {
    // ensureSection handles both create and the "already exists" race via
    // UNIQUE(model_id, name) — returning the existing row in the second case
    // matches the prior "Section already exists — opening it" toast UX.
    const wasInCache = (sectionsCache[m.id] || []).some(s => s.name === name);
    const section = await ensureSection(m.id, name);
    if (!section) { toast('Section not found after create', 'err'); return; }
    if (wasInCache) toast('Section already exists — opening it', 'info');
    inlineAddSection = section.name;       // opens inline-add row in detail view
    currentEditorSection = section.id;     // auto-navigate into the new section
    closeModal();
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

// ===== Edit section (F.9 — rename / re-icon / delete) =====

function selectIcon(icon) {
