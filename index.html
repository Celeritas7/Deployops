// Shared SVG control generator (curve toggle + add-bend badge + bend handles).
function leaderControlsSVG(b, color, nodesPct, curve, vbW, vbH, toggleX, toggleY, opts){
  opts = opts || {};
  const wps = nodesPct.slice(1, -1);
  let out = '';
  if (!opts.noCurveToggle){
    out += '<g class="curve-toggle" data-id="'+b.id+'" style="cursor:pointer">'
      + '<circle cx="'+toggleX+'" cy="'+toggleY+'" r="9" fill="'+(curve?'#7c3aed':'#334155')+'" stroke="white" stroke-width="2"/>'
      + '<text x="'+toggleX+'" y="'+toggleY+'" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12" pointer-events="none">'+(curve?'↝':'→')+'</text>'
      + '<title>'+(curve?'Curved — click for straight':'Straight — click for curved')+'</title></g>';
  }
  const seg = longestSegPct(nodesPct);
  const bAx = seg.mx/100*vbW, bAy = seg.my/100*vbH;
  out += '<g class="bend-add" data-id="'+b.id+'" style="cursor:pointer">'
    + '<circle cx="'+bAx+'" cy="'+bAy+'" r="8" fill="#2563eb" stroke="white" stroke-width="2"/>'
    + '<text x="'+bAx+'" y="'+bAy+'" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12" font-weight="700" pointer-events="none">＋</text>'
    + '<title>Add a bend</title></g>';
  wps.forEach((p, i) => {
    const wx = p.x/100*vbW, wy = p.y/100*vbH;
    out += '<g class="wp-handle" data-id="'+b.id+'" data-i="'+i+'" style="cursor:grab"><circle cx="'+wx+'" cy="'+wy+'" r="7" fill="white" stroke="'+color+'" stroke-width="2.5"/></g>'
      + '<g class="wp-del" data-id="'+b.id+'" data-i="'+i+'" style="cursor:pointer"><circle cx="'+(wx+11)+'" cy="'+(wy-11)+'" r="6" fill="#dc2626" stroke="white" stroke-width="1.5"/>'
      + '<text x="'+(wx+11)+'" y="'+(wy-11)+'" text-anchor="middle" dominant-baseline="central" fill="white" font-size="9" font-weight="700" pointer-events="none">×</text></g>';
  });
  return out;
}

// Loctite leader (box -> screw tip) drawn in the SVG layer.
function renderLoctorqueLeaderSVG(b, vbW, vbH){
  const m = ltMeta(b);
  if ((m.leader||'arrow') === 'none') return '';
  const c = b.color || ltColor(m.loctite);
  const bx = (m.bx==null?b.x_pct:m.bx), by = (m.by==null?b.y_pct:m.by);
  const tipX = b.x_pct, tipY = b.y_pct;
  const nodesPct = [{x:bx,y:by}, ...(m.waypoints||[]), {x:tipX,y:tipY}];
  const pts = nodesPct.map(p => ({ x:p.x/100*vbW, y:p.y/100*vbH }));
  const ahId = 'ah_' + c.replace('#','');
  const d = leaderPathD(m.curve, pts, vbW);
  let out = '<path class="leader-line" d="'+d+'" fill="none" stroke="'+c+'" stroke-width="2.4" marker-end="url(#'+ahId+')" stroke-linecap="round" stroke-linejoin="round"/>';
  out += '<circle cx="'+(tipX/100*vbW)+'" cy="'+(tipY/100*vbH)+'" r="4.5" fill="'+c+'" stroke="#0b0e16" stroke-width="1.5"/>';
  if (isAdmin && b.id === selectedBalloonId){
    out += '<g class="tip-handle selected" data-id="'+b.id+'" data-role="tip"><circle cx="'+(tipX/100*vbW)+'" cy="'+(tipY/100*vbH)+'" r="6" fill="white" stroke="'+c+'" stroke-width="2"/></g>';
    out += leaderControlsSVG(b, c, nodesPct, m.curve, vbW, vbH, 0, 0, { noCurveToggle:true });
  }
  return out;
}

// ---- HTML overlay ----
function renderOverlay(){
  const ov = document.getElementById('dwgOverlay');
  if (!ov) return;
  const list = balloons.filter(b => b.page === currentPage && (b.mode === 'loctorque' || b.mode === 'steptable'));
  ov.innerHTML = list.map(b => b.mode === 'loctorque' ? loctorqueHTML(b) : steptableHTML(b)).join('');
  if (isAdmin) bindOverlay(ov);
}

function loctorqueHTML(b){
  const m = ltMeta(b);
  const bx = (m.bx==null?b.x_pct:m.bx), by = (m.by==null?b.y_pct:m.by);
  const c = m.color || ltColor(m.loctite);
  const sel = b.id === selectedBalloonId;
  const arrowOn = (m.leader||'arrow') !== 'none';
  const grades = ltGrades.includes(m.loctite) ? ltGrades : [m.loctite, ...ltGrades];
  const gradeUI = sel
    ? '<select class="lt-grade-sel" data-id="'+b.id+'">'+grades.map(g=>'<option value="'+g+'"'+(g===m.loctite?' selected':'')+'>'+badgeFor(g)+'</option>').join('')+'</select>'
    : '<span>'+badgeFor(m.loctite)+'</span>';
  let tools = '';
  if (sel){
    tools = '<div class="lt-tools admin-only">'
      + '<button class="lt-dup" data-id="'+b.id+'" title="Duplicate">⧉</button>'
      + (arrowOn ? '<button class="lt-curve'+(m.curve?' on':'')+'" data-id="'+b.id+'" title="Curve / straight">'+(m.curve?'↝':'→')+'</button>' : '')
      + '<button class="lt-arrow'+(arrowOn?'':' off')+'" data-id="'+b.id+'" title="Arrow on / off">➤</button>'
      + '<label class="lt-swatch-wrap" style="background:'+c+'" title="Label colour"><input class="lt-swatch" type="color" value="'+c+'" data-id="'+b.id+'"></label>'
      + '<button class="lt-del" data-id="'+b.id+'" title="Delete">×</button>'
      + '</div>';
  }
  return '<div class="lt-callout'+(sel?' sel':'')+'" data-id="'+b.id+'" style="left:'+bx+'%;top:'+by+'%;border-color:'+c+'">'
    + '<span class="lt-grip" data-id="'+b.id+'">⠿</span>'
    + '<div class="lt-body">'
    + '<div class="lt-grade"><span class="lt-dot" style="background:'+c+'"></span>'+gradeUI+'</div>'
    + '<div class="lt-torque"><span class="lt-tq" '+(sel?'contenteditable':'')+' data-id="'+b.id+'">'+esc(m.torque)+'</span><span class="lt-unit">N·m</span></div>'
    + '</div>' + tools + '</div>';
}

function steptableHTML(b){
  const m = stMeta(b);
  const sel = b.id === selectedBalloonId;
  const rows = m.rows.map((r, ri) => {
    const chip = r.skip ? '<span class="mk-cell x">✕</span>' : '<span class="mk-cell step" style="background:'+stepColor(r.n)+'">'+r.n+'</span>';
    const arrowBtn = '<button class="st-arrow-btn admin-only" data-id="'+b.id+'" data-ri="'+ri+'" style="border-color:'+(r.skip?'#dc2626':stepColor(r.n))+';color:'+(r.skip?'#dc2626':stepColor(r.n))+'" title="Drop a balloon + arrow for this step">➤</button>';
    return '<tr><td class="st-num">'+chip+'</td>'
      + '<td class="st-ins"><span class="st-ic" '+(sel?'contenteditable':'')+' data-id="'+b.id+'" data-ri="'+ri+'">'+esc(r.text)+'</span></td>'
      + '<td class="st-arrow admin-only">'+arrowBtn+'</td></tr>';
  }).join('');
  const tools = sel ? '<span class="dt-tools admin-only"><button class="st-scale" data-id="'+b.id+'" data-d="-0.1">−</button><button class="st-scale" data-id="'+b.id+'" data-d="0.1">＋</button><button class="st-tdel" data-id="'+b.id+'" title="Remove table">×</button></span>' : '';
  const addRow = sel ? '<div class="st-addrow admin-only"><button class="st-add" data-id="'+b.id+'" data-kind="step">＋ Step</button><button class="st-add" data-id="'+b.id+'" data-kind="skip">＋ ✕ Do-not-install</button></div>' : '';
  return '<div class="dwg-table step-table'+(sel?' sel':'')+'" data-id="'+b.id+'" style="left:'+b.x_pct+'%;top:'+b.y_pct+'%;transform:scale('+(m.scale||0.9)+')">'
    + '<div class="dt-bar" data-id="'+b.id+'"><span class="dt-grip-ico">⠿</span><span class="dt-title">'+esc(m.title)+'</span>'+tools+'</div>'
    + '<table class="dt-table"><thead><tr><th>Step</th><th>Assembly instruction</th><th class="admin-only">Arrow</th></tr></thead><tbody>'+rows+'</tbody></table>'
    + addRow + '</div>';
}

function bindOverlay(ov){
  const stop = e => e.stopPropagation();
  ov.querySelectorAll('.lt-callout, .step-table').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('button, select, input, [contenteditable], .dt-bar, .lt-grip, .st-arrow-btn')) return;
      const id = el.dataset.id;
      selectedBalloonId = (selectedBalloonId === id) ? null : id;
      paintAnnotations();
    });
  });
  ov.querySelectorAll('.lt-grip').forEach(g => g.addEventListener('pointerdown', startLTBoxDrag));
  ov.querySelectorAll('.dt-bar').forEach(g => g.addEventListener('pointerdown', startStepTableDrag));
  ov.querySelectorAll('.lt-grade-sel').forEach(el => el.addEventListener('change', (e)=>{ stop(e); ltSetGrade(el.dataset.id, el.value); }));
  ov.querySelectorAll('.lt-tq').forEach(el => el.addEventListener('blur', ()=> ltSetTorque(el.dataset.id, el.textContent.trim())));
  ov.querySelectorAll('.lt-swatch').forEach(el => el.addEventListener('input', (e)=>{ stop(e); ltSetColor(el.dataset.id, el.value); }));
  ov.querySelectorAll('.lt-curve').forEach(el => el.addEventListener('click', (e)=>{ stop(e); toggleLeaderCurve(el.dataset.id); }));
  ov.querySelectorAll('.lt-arrow').forEach(el => el.addEventListener('click', (e)=>{ stop(e); ltToggleArrow(el.dataset.id); }));
  ov.querySelectorAll('.lt-dup').forEach(el => el.addEventListener('click', (e)=>{ stop(e); dupLT(el.dataset.id); }));
  ov.querySelectorAll('.lt-del, .st-tdel').forEach(el => el.addEventListener('click', (e)=>{ stop(e); deleteAnnotation(el.dataset.id); }));
  ov.querySelectorAll('.st-ic').forEach(el => el.addEventListener('blur', ()=> stCommit(el.dataset.id, +el.dataset.ri, el.textContent.trim())));
  ov.querySelectorAll('.st-arrow-btn').forEach(el => el.addEventListener('click', (e)=>{ stop(e); spawnFromStep(el.dataset.id, +el.dataset.ri); }));
  ov.querySelectorAll('.st-scale').forEach(el => el.addEventListener('click', (e)=>{ stop(e); stScale(el.dataset.id, +el.dataset.d); }));
  ov.querySelectorAll('.st-add').forEach(el => el.addEventListener('click', (e)=>{ stop(e); stAddRow(el.dataset.id, el.dataset.kind); }));
}

// ---- widget persistence ----
async function ltUpdate(b, m){
  b.label = ltSerialize(m); b.color = m.color || ltColor(m.loctite);
  paintAnnotations();
  try { await sb.from('deployops_balloons').update({ label:b.label, color:b.color }).eq('id', b.id); } catch(e){ console.error(e); }
}
function ltSetGrade(id, val){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=ltMeta(b); m.loctite=val; delete m.color; ltUpdate(b,m); }
function ltSetColor(id, c){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=ltMeta(b); m.color=c; ltUpdate(b,m); }
function ltSetTorque(id, val){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=ltMeta(b); if((m.torque||'')===val)return; m.torque=val; ltUpdate(b,m); }
function ltToggleArrow(id){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=ltMeta(b); m.leader=(m.leader||'arrow')==='none'?'arrow':'none'; ltUpdate(b,m); }
async function dupLT(id){
  const b=balloons.find(x=>x.id===id); if(!b)return; const m=ltMeta(b);
  const nm=Object.assign({},m); nm.bx=Math.min(95,(m.bx==null?b.x_pct:m.bx)+4); nm.by=Math.min(95,(m.by==null?b.y_pct:m.by)+4);
  try {
    const { data, error } = await sb.from('deployops_balloons').insert({ drawing_id:currentDrawing.id, page:currentPage, number:0, x_pct:Math.min(97,b.x_pct+4), y_pct:Math.min(97,b.y_pct+4), label:ltSerialize(nm), color:nm.color||ltColor(nm.loctite), mode:'loctorque', arrow_style:'none' }).select().single();
    if (error) throw error;
    await loadBalloons(); selectedBalloonId = data ? data.id : null; paintAnnotations();
  } catch(e){ console.error(e); toast('Duplicate failed','err'); }
}
function stSerialize(m){ return JSON.stringify({ title:m.title, scale:m.scale, rows:m.rows }); }
async function stUpdate(b, m){ b.label = stSerialize(m); renderOverlay(); try { await sb.from('deployops_balloons').update({ label:b.label }).eq('id', b.id); } catch(e){ console.error(e); } }
function stCommit(id, ri, val){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=stMeta(b); if(!m.rows[ri]||(m.rows[ri].text||'')===val)return; m.rows[ri].text=val; stUpdate(b,m); }
function stScale(id, d){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=stMeta(b); m.scale=Math.max(0.6,Math.min(1.8,+((m.scale||0.9)+d).toFixed(2))); stUpdate(b,m); }
function stAddRow(id, kind){ const b=balloons.find(x=>x.id===id); if(!b)return; const m=stMeta(b); if(kind==='skip') m.rows.push({skip:true,text:''}); else { const n=m.rows.filter(x=>!x.skip).length+1; m.rows.push({n,text:''}); } stUpdate(b,m); }

async function deleteAnnotation(id){
  const b=balloons.find(x=>x.id===id); if(!b)return;
  try { await sb.from('deployops_balloons').delete().eq('id', id); } catch(e){ console.error(e); toast('Delete failed','err'); return; }
  selectedBalloonId=null; await loadBalloons(); paintAnnotations();
}

// From a steps-table row: drop (or re-select) a Step/✗ balloon with a leader arrow.
async function spawnFromStep(tableId, ri){
  const tbl=balloons.find(x=>x.id===tableId); if(!tbl)return; const m=stMeta(tbl); const r=m.rows[ri]; if(!r)return;
  const isX=!!r.skip;
  const existing=balloons.find(x=>{ if((x.mode)!==(isX?'x':'step'))return false; try{ const o=JSON.parse(x.label||'{}'); return o&&o.ft===tableId&&o.fr===ri; }catch{return false;} });
  if(existing){ selectedBalloonId=existing.id; paintAnnotations(); if(typeof showBalloonActions==='function') showBalloonActions(existing.id); return; }
  const bx=Math.min(92,(tbl.x_pct||0)+24), by=Math.min(86,(tbl.y_pct||0)+8+(((r.n||1)%5)*4));
  const tx=Math.max(2,Math.min(98,bx+11)), ty=Math.max(2,Math.min(98,by+7));
  const label=JSON.stringify({ t:'', c:defaultArrowCurve(), w:[], ft:tableId, fr:ri });
  try {

function renderBalloonsSVG() {
  const svg = document.getElementById('balloonSvg');
  const img = document.getElementById('drawingImg');
  if (!svg || !img) return;

  // Multi-layer visibility: show every layer whose eye is on. Tables always
  // show; legacy hidden modes (cable/balloon) stay hidden (no toggle for them).
  const pageBalloons = balloons.filter(b => {
    if (b.page !== currentPage) return false;
    const m = b.mode || 'balloon';
    if (m === 'table' || m === 'loctorque' || m === 'steptable') return true;
    if (MODES[m] && MODES[m].hidden) return false;
    return layerVis[m] !== false;
  });
  updateModePillCounts();
  const r = 18 * markerSize; // balloon radius in SVG coords (× user size)
  const imgW = img.naturalWidth || img.width;
  const imgH = img.naturalHeight || img.height;
  const vbW = 1000;
  const vbH = (imgH / imgW) * 1000;
  svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);

  // Build arrowhead defs (one per balloon color used, marker per style)
  const colors = [...new Set(pageBalloons.map(b => b.color || '#e74c3c'))];
  let defs = '<defs>';
  colors.forEach(c => {
    const id = 'ah_' + c.replace('#','');
    defs += `<marker id="${id}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="${c}"/></marker>`;
    defs += `<marker id="${id}_big" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="${c}"/></marker>`;
  });
  defs += '</defs>';

  let html = defs;
  pageBalloons.forEach(b => {
    const cx = b.x_pct / 100 * vbW;
    const cy = b.y_pct / 100 * vbH;
    const bmode = b.mode || 'balloon';

    // Placed reference table — drawn as a draggable card, independent of layers.
    if (bmode === 'table') { html += renderTableCardSVG(b, cx, cy, vbW); return; }
    if (bmode === 'steptable') return;                                   // §8 — HTML overlay only
    if (bmode === 'loctorque') { html += renderLoctorqueLeaderSVG(b, vbW, vbH); return; }  // §7 leader

    const sel = b.id === selectedBalloonId ? ' selected' : '';
    const color = b.color || '#e74c3c';
    const isCable = bmode === 'cable';
    const shape = (MODES[bmode] && MODES[bmode].shape) || (isCable ? 'note' : 'circle');
    const isTag = isCable || shape === 'note' || shape === 'caution';
    const isCaution = shape === 'caution';
    const style = b.arrow_style || (b.tip_x_pct!=null?'solid':'none');
    const ahId = 'ah_' + color.replace('#','');

    // Tag (cable / note / caution) box dimensions (used for both leader trim and body)
    let tagW = 0, tagH = 0;
    if (isTag) {
      const text = balloonText(b) || (shape === 'note' ? 'Note' : isCaution ? 'Caution' : '?');
      const glyphPad = isCaution ? 10 : 0; // room for ⚠ glyph
      tagW = Math.max(34 * markerSize, (text.length * 6.2 + 26 + glyphPad) * markerSize);
      tagH = 18 * markerSize;
    }

    // Leader (only if tip exists & style != none). Straight legacy leaders keep
    // the exact <line> render; curved / multi-bend leaders become an SVG <path>.
    if (b.tip_x_pct != null && b.tip_y_pct != null && style !== 'none') {
      const tx = b.tip_x_pct / 100 * vbW;
      const ty = b.tip_y_pct / 100 * vbH;
      const meta = balloonMeta(b);
      const hasRoute = meta.curve || (meta.waypoints && meta.waypoints.length);

      let strokeW = 2, dash = '', marker = `url(#${ahId})`;
      if (style === 'dashed') { dash = '6 4'; }
      else if (style === 'thick') { strokeW = 3.5; marker = `url(#${ahId}_big)`; }
      else if (style === 'dot') { marker = ''; }

      if (!hasRoute) {
        // Edge-trimmed straight line — unchanged behaviour.
        let sx, sy;
        if (isTag) {
          [sx, sy] = rectEdgePoint(cx, cy, tagW, tagH, tx, ty);
        } else {
          const dx = tx - cx, dy = ty - cy;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          sx = cx + dx/dist * r;
          sy = cy + dy/dist * r;
        }
        html += `<line class="leader-line" x1="${sx}" y1="${sy}" x2="${tx}" y2="${ty}" stroke="${color}" stroke-width="${strokeW}" ${dash?`stroke-dasharray="${dash}"`:''} ${marker?`marker-end="${marker}"`:''} stroke-linecap="round"/>`;
      } else {
        // Routed / curved leader: path from body centre → bends → tip, drawn
        // under the body so the centre stub is hidden.
        const pts = leaderNodesPct(b, meta).map(p => ({ x: p.x/100*vbW, y: p.y/100*vbH }));
        const d = leaderPathD(meta.curve, pts, vbW);
        html += `<path class="leader-line" d="${d}" fill="none" stroke="${color}" stroke-width="${strokeW}" ${dash?`stroke-dasharray="${dash}"`:''} ${marker?`marker-end="${marker}"`:''} stroke-linecap="round" stroke-linejoin="round"/>`;
      }

      // dot style: filled dot at tip
      if (style === 'dot') {
        html += `<circle class="leader-line" cx="${tx}" cy="${ty}" r="4" fill="${color}"/>`;
      }

      // Tip handle (admin only, only when this balloon is selected)
      if (isAdmin && b.id === selectedBalloonId) {
        html += `<g class="tip-handle selected" data-id="${b.id}" data-role="tip">
          <circle cx="${tx}" cy="${ty}" r="6" fill="white" stroke="${color}" stroke-width="2"/>
        </g>`;
      }
    }

    // Balloon body
    html += `<g class="balloon-g${sel}" data-id="${b.id}" data-role="body">`;
    if (isTag) {
      // Box tag — white background, coloured border. Cable/note show a chip on
      // the left; caution shows a ⚠ glyph before amber-bordered text.
      const text = esc(balloonText(b) || (shape === 'note' ? 'Note' : isCaution ? 'Caution' : '?'));
      const x0 = cx - tagW/2, y0 = cy - tagH/2;
      const indPad = 3 * markerSize;
      const indSize = tagH - indPad*2;
      const indX = x0 + indPad;
      const indY = y0 + indPad;
      const textX = indX + indSize + 4*markerSize;
      const fs = 10 * markerSize;
      if (isCaution) {
        html += `<rect class="b-main" x="${x0}" y="${y0}" width="${tagW}" height="${tagH}" rx="3" fill="#fff7ed" stroke="${color}" stroke-width="${1.5*markerSize}"/>
          <text x="${indX}" y="${cy}" text-anchor="start" dominant-baseline="central" font-size="${fs}" font-family="DM Sans,sans-serif">⚠</text>
          <text x="${textX}" y="${cy}" text-anchor="start" dominant-baseline="central" fill="#7c2d12" font-size="${fs}" font-weight="700" font-family="DM Sans,sans-serif">${text}</text>`;
      } else {
        const chip = shape === 'note' ? color : '#27ae60';
        html += `<rect class="b-main" x="${x0}" y="${y0}" width="${tagW}" height="${tagH}" rx="3" fill="white" stroke="${color}" stroke-width="${1.5*markerSize}"/>
          <rect x="${indX}" y="${indY}" width="${indSize}" height="${indSize}" rx="1" fill="${chip}"/>
          <text x="${textX}" y="${cy}" text-anchor="start" dominant-baseline="central" fill="#111" font-size="${fs}" font-weight="700" font-family="DM Sans,sans-serif">${text}</text>`;
      }
    } else if (shape === 'x') {
      // No-install — filled red circle, white ✕, no number.
      html += `<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="white" opacity="0.9" class="b-halo"/>
        <circle class="b-main" cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="white" stroke-width="1.5"/>
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="${r*1.3}" font-weight="700" font-family="DM Sans,sans-serif">✕</text>`;
      { const _c = balloonText(b); if (_c) html += labelTag(cx, cy + r + 10*markerSize, esc(_c)); }
    } else if (shape === 'square') {
      const s = r * 1.8, x0 = cx - s/2, y0 = cy - s/2;
      html += `<rect x="${x0-3}" y="${y0-3}" width="${s+6}" height="${s+6}" rx="5" fill="white" opacity="0.9" class="b-halo"/>
        <rect class="b-main" x="${x0}" y="${y0}" width="${s}" height="${s}" rx="4" fill="${color}" stroke="white" stroke-width="1.5"/>
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="${r*1.1}" font-weight="700" font-family="DM Sans,sans-serif">${b.number||''}</text>`;
      { const _c = balloonText(b); if (_c) html += labelTag(cx, cy + r + 10, esc(_c)); }
    } else if (shape === 'triangle') {
      const h = r * 2.1, w = r * 2.3;
      const p1 = `${cx},${cy - h*0.6}`, p2 = `${cx + w/2},${cy + h*0.4}`, p3 = `${cx - w/2},${cy + h*0.4}`;
      html += `<polygon points="${cx},${cy-h*0.6-3} ${cx+w/2+3},${cy+h*0.4+3} ${cx-w/2-3},${cy+h*0.4+3}" fill="white" opacity="0.9" class="b-halo"/>
        <polygon class="b-main" points="${p1} ${p2} ${p3}" fill="${color}" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        <text x="${cx}" y="${cy + h*0.08}" text-anchor="middle" dominant-baseline="central" fill="#111" font-size="${r*0.95}" font-weight="700" font-family="DM Sans,sans-serif">${b.number||''}</text>`;
      { const _c = balloonText(b); if (_c) html += labelTag(cx, cy + h*0.4 + 12, esc(_c)); }
    } else {
      html += `<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="white" opacity="0.9" class="b-halo"/>
        <circle class="b-main" cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="white" stroke-width="1.5"/>
        <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="white"
              font-size="${r*1.1}" font-weight="700" font-family="DM Sans,sans-serif">${b.number||''}</text>`;
      { const _c = balloonText(b); if (_c) html += labelTag(cx, cy + r + 10, esc(_c)); }
    }
    html += `</g>`;

    // Per-leader routing controls (admin + selected + has leader): curve toggle,
    // add-bend badge on the longest segment, and draggable bend handles (shared).
    if (isAdmin && b.id === selectedBalloonId && bmode !== 'table' &&
        b.tip_x_pct != null && b.tip_y_pct != null) {
      const meta = balloonMeta(b);
      const ctX = Math.max(14, cx - (isTag ? tagW/2 : r) - 16);
      const ctY = Math.min(vbH - 14, cy + (isTag ? tagH/2 : r) + 16);
      html += leaderControlsSVG(b, color, leaderNodesPct(b, meta), meta.curve, vbW, vbH, ctX, ctY);
    }

    // "Add leader" affordance — only on the selected marker when it has no leader yet.
    // Clicking it seeds a tip (rendered as the draggable handle) so a leader can be
    // dragged out on demand. Tables are excluded.
    if (isAdmin && b.id === selectedBalloonId && bmode !== 'table' &&
        (b.tip_x_pct == null || b.tip_y_pct == null)) {
      const off = (isTag ? tagW/2 : r) + 22;
      const ax = Math.min(vbW - 12, cx + off);
      const ay = Math.max(12, cy - off);
      html += `<g class="add-leader" data-id="${b.id}" data-role="add-leader" style="cursor:pointer">
        <circle cx="${ax}" cy="${ay}" r="9" fill="#2563eb" stroke="white" stroke-width="2"/>
        <text x="${ax}" y="${ay}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="13" font-weight="700" font-family="DM Sans,sans-serif" pointer-events="none">+</text>
        <title>Add leader arrow</title>
      </g>`;
    }
  });
  svg.innerHTML = html;

  // Enable drag for admin
  if (isAdmin) {
    svg.querySelectorAll('.balloon-g').forEach(g => {
      g.addEventListener('pointerdown', startBalloonDrag);
    });
    svg.querySelectorAll('.tip-handle').forEach(g => {
      g.addEventListener('pointerdown', startTipDrag);
    });
    svg.querySelectorAll('.add-leader').forEach(g => {
      g.addEventListener('click', (e) => { e.stopPropagation(); addLeader(g.dataset.id); });
    });
    svg.querySelectorAll('.table-drag').forEach(g => {
      g.addEventListener('pointerdown', startTableDrag);
    });
    svg.querySelectorAll('.curve-toggle').forEach(g => {
      g.addEventListener('click', (e) => { e.stopPropagation(); toggleLeaderCurve(g.dataset.id); });
    });
    svg.querySelectorAll('.bend-add').forEach(g => {
      g.addEventListener('click', (e) => { e.stopPropagation(); addLeaderBend(g.dataset.id); });
    });
    svg.querySelectorAll('.wp-handle').forEach(g => {
      g.addEventListener('pointerdown', startWaypointDrag);
    });
    svg.querySelectorAll('.wp-del').forEach(g => {
      g.addEventListener('click', (e) => { e.stopPropagation(); deleteLeaderBend(g.dataset.id, +g.dataset.i); });
    });
  }
}

// Drag a placed reference table by its header bar (top-left tracks the pointer,
// preserving the grab offset so the card doesn't jump).
function startTableDrag(e) {
  if (e.button !== 0 || dwgSpaceHeld) return; // let middle-mouse / Space-drag pan instead
  e.preventDefault(); e.stopPropagation();
  isDragging = false;
  const bid = e.currentTarget.dataset.id;
  const b = balloons.find(x => x.id === bid);
  const img = document.getElementById('drawingImg');
  if (!b || !img) return;
  const rect0 = img.getBoundingClientRect();
  const grabX = ((e.clientX - rect0.left) / rect0.width) * 100 - b.x_pct;
  const grabY = ((e.clientY - rect0.top) / rect0.height) * 100 - b.y_pct;

  const onMove = (ev) => {
    ev.preventDefault();
    isDragging = true;
    const rect = img.getBoundingClientRect();
    b.x_pct = Math.max(0, Math.min(98, ((ev.clientX - rect.left) / rect.width) * 100 - grabX));
    b.y_pct = Math.max(0, Math.min(98, ((ev.clientY - rect.top) / rect.height) * 100 - grabY));
    renderBalloonsSVG();
  };
  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging) {
      try { await sb.from('deployops_balloons').update({ x_pct: b.x_pct, y_pct: b.y_pct }).eq('id', bid); }
      catch(err) { console.error(err); }
    }
    setTimeout(() => { isDragging = false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// Seed a leader on the selected marker: drop a tip a short offset from the body and
// give it a default style. The tip handle then renders so it can be dragged into place.
async function addLeader(bid) {
  const b = balloons.find(x => x.id === bid);
  if (!b) return;
  const tx = Math.min(100, Math.max(0, (b.x_pct || 0) + 8));
  const ty = Math.min(100, Math.max(0, (b.y_pct || 0) - 8));
  const patch = { tip_x_pct: tx, tip_y_pct: ty, arrow_style: 'solid' };
  if (defaultArrowCurve()) { const meta = balloonMeta(b); patch.label = serializeBalloonLabel(meta.text, true, meta.waypoints); }
  const { error } = await sb.from('deployops_balloons').update(patch).eq('id', bid);
  if (error) { toast('Could not add leader: ' + error.message, 'err'); return; }
  await loadBalloons();
  renderBalloonsSVG();
  toast('Leader added — drag the handle to position it', 'ok');
}

function startTipDrag(e) {
  if (e.button !== 0 || dwgSpaceHeld) return; // let middle-mouse / Space-drag pan instead
  e.preventDefault(); e.stopPropagation();
  isDragging = false;
  const g = e.currentTarget, bid = g.dataset.id;
  const b = balloons.find(x => x.id === bid); if (!b) return;
  const isLoc = b.mode === 'loctorque';   // loctorque tip lives in x_pct/y_pct
  const img = document.getElementById('drawingImg'); if (!img) return;
  let pos = null;
  const onMove = (ev) => {
    ev.preventDefault(); isDragging = true;
    const rect = img.getBoundingClientRect();
    const xp = Math.max(0, Math.min(100, ((ev.clientX - rect.left) / rect.width) * 100));
    const yp = Math.max(0, Math.min(100, ((ev.clientY - rect.top) / rect.height) * 100));
    pos = { xp, yp };
    if (isLoc) { b.x_pct = xp; b.y_pct = yp; } else { b.tip_x_pct = xp; b.tip_y_pct = yp; }
    renderBalloonsSVG();   // leader follows live (fixes the old non-live tip drag)
  };
  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging && pos) {
      const patch = isLoc ? { x_pct: pos.xp, y_pct: pos.yp } : { tip_x_pct: pos.xp, tip_y_pct: pos.yp };
      try { await sb.from('deployops_balloons').update(patch).eq('id', bid); } catch(err){ console.error(err); }
      await loadBalloons(); paintAnnotations();
    }
    setTimeout(() => { isDragging = false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

let isDragging = false;

function startBalloonDrag(e) {
  if (balloonMode === 'add') return;
  if (e.button !== 0 || dwgSpaceHeld) return; // let middle-mouse / Space-drag pan instead
  e.preventDefault();
  e.stopPropagation();
  isDragging = false;
  const g = e.currentTarget;
  const bid = g.dataset.id;
  const img = document.getElementById('drawingImg');
  if (!img) return;

  const onMove = (ev) => {
    ev.preventDefault();
    isDragging = true;
    const rect = img.getBoundingClientRect();
    const x_pct = Math.max(0, Math.min(100, ((ev.clientX - rect.left) / rect.width) * 100));
    const y_pct = Math.max(0, Math.min(100, ((ev.clientY - rect.top) / rect.height) * 100));
    g._dragPos = { x_pct, y_pct };
    // Update the in-memory balloon and re-render so leader follows
    const b = balloons.find(x => x.id === bid);
    if (b) { b.x_pct = x_pct; b.y_pct = y_pct; renderBalloonsSVG(); }
  };

  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging && g._dragPos) {
      await sb.from('deployops_balloons').update({ x_pct: g._dragPos.x_pct, y_pct: g._dragPos.y_pct }).eq('id', bid);
      await loadBalloons();
      renderBalloonsSVG();
    }
    setTimeout(() => { isDragging = false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// ============================================================
// DELETE PAGE
// ============================================================
async function deleteCurrentPage() {
  if (!currentDrawing || currentDrawing.page_count <= 1) return;
  if (!confirm(`Delete page ${currentPage} permanently? Balloons on this page will be deleted, and pages after it will shift down.`)) return;

  toast(`Deleting page ${currentPage}...`,'info');
  const ref = currentDrawing.drawing_ref;
  const total = currentDrawing.page_count;
  const deletedPage = currentPage;

  try {
    // 1. Delete balloons on this page
    await sb.from('deployops_balloons').delete()
      .eq('drawing_id', currentDrawing.id).eq('page', deletedPage);

    // 2. Delete the storage file for this page
    await sb.storage.from('deployops-drawings').remove([`${ref}/page_${deletedPage}.png`]);

    // 3. Shift later pages: download page_N, upload as page_(N-1), delete page_N
    for (let p = deletedPage + 1; p <= total; p++) {
      const oldPath = `${ref}/page_${p}.png`;
      const newPath = `${ref}/page_${p-1}.png`;
      const { data: blob, error: dlErr } = await sb.storage.from('deployops-drawings').download(oldPath);
      if (dlErr) { console.error(dlErr); continue; }
      await sb.storage.from('deployops-drawings').upload(newPath, blob, { contentType:'image/png', upsert:true });
      await sb.storage.from('deployops-drawings').remove([oldPath]);
      // Shift balloon page references for this page
      await sb.from('deployops_balloons').update({ page: p-1 })
        .eq('drawing_id', currentDrawing.id).eq('page', p);
    }

    // 4. Update drawing page_count
    await sb.from('deployops_drawings').update({ page_count: total - 1 }).eq('id', currentDrawing.id);

    drawingCacheBust[currentDrawing.id] = Date.now();
    toast(`Page ${deletedPage} deleted`,'ok');
    await loadDrawings();
    currentDrawing = drawings.find(d => d.id === currentDrawing.id);
    if (currentPage > currentDrawing.page_count) currentPage = currentDrawing.page_count;
    await loadBalloons();
    renderDrawing();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e),'err');
  }
}

// §7 Loctite label → export canvas (leader + dark callout box).
function drawLoctorqueCanvas(ctx, b, canvas){
  const m=ltMeta(b), c=b.color||ltColor(m.loctite);
  const W=canvas.width, H=canvas.height, u=Math.min(W,H);
  const bx=(m.bx==null?b.x_pct:m.bx)/100*W, by=(m.by==null?b.y_pct:m.by)/100*H;
  const tipX=b.x_pct/100*W, tipY=b.y_pct/100*H;
  if((m.leader||'arrow')!=='none'){
    ctx.save(); ctx.strokeStyle=c; ctx.fillStyle=c; ctx.lineWidth=u*0.003; ctx.lineCap='round'; ctx.lineJoin='round';
    const pts=[{x:bx,y:by}, ...(m.waypoints||[]).map(p=>({x:p.x/100*W,y:p.y/100*H})), {x:tipX,y:tipY}];
    ctx.beginPath();
    if(!m.curve){ ctx.moveTo(pts[0].x,pts[0].y); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y); }
    else if(pts.length===2){ const a=pts[0],b2=pts[1],mx=(a.x+b2.x)/2,my=(a.y+b2.y)/2,dx=b2.x-a.x,dy=b2.y-a.y,len=Math.hypot(dx,dy)||1,off=Math.min(len*0.3,W*0.2); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx-dy/len*off,my+dx/len*off,b2.x,b2.y); }
    else { ctx.moveTo(pts[0].x,pts[0].y); for(let i=0;i<pts.length-1;i++){ const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1]; ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6,p1.y+(p2.y-p0.y)/6,p2.x-(p3.x-p1.x)/6,p2.y-(p3.y-p1.y)/6,p2.x,p2.y); } }
    ctx.stroke();
    const lw=(m.waypoints||[]), last=lw.length?{x:lw[lw.length-1].x/100*W,y:lw[lw.length-1].y/100*H}:{x:bx,y:by};
    const ang=Math.atan2(tipY-last.y,tipX-last.x), ah=u*0.012;
    ctx.beginPath(); ctx.moveTo(tipX,tipY);
    ctx.lineTo(tipX-ah*Math.cos(ang)+ah*0.5*Math.sin(ang), tipY-ah*Math.sin(ang)-ah*0.5*Math.cos(ang));
    ctx.lineTo(tipX-ah*Math.cos(ang)-ah*0.5*Math.sin(ang), tipY-ah*Math.sin(ang)+ah*0.5*Math.cos(ang));
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(tipX,tipY,u*0.006,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  const fs=u*0.013, pad=fs*0.7, grade=badgeFor(m.loctite), torque=((m.torque||'—')+' N·m');
  ctx.save(); ctx.font='700 '+fs+"px 'DM Sans',sans-serif";
  const w=Math.max(ctx.measureText(grade).width, ctx.measureText(torque).width)+pad*2+fs;
  const h=fs*3.4, x0=bx-w/2, y0=by-h/2;
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.strokeStyle='rgba(20,30,45,0.55)'; ctx.lineWidth=u*0.0016;
  ctx.beginPath(); ctx.roundRect(x0,y0,w,h,fs*0.5); ctx.fill(); ctx.stroke();
  // status dot with grayscale-safe dark ring
  ctx.beginPath(); ctx.arc(x0+pad+fs*0.3,y0+h*0.33,fs*0.34,0,Math.PI*2); ctx.fillStyle='rgba(20,30,45,0.5)'; ctx.fill();
  ctx.beginPath(); ctx.arc(x0+pad+fs*0.3,y0+h*0.33,fs*0.26,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillStyle='#1d2733'; ctx.fillText(grade, x0+pad+fs*0.9, y0+h*0.33);
  ctx.fillStyle='#0b0e16'; ctx.fillText(torque, x0+pad, y0+h*0.7);
  ctx.restore();
}
// §8 Assembly-steps table → export canvas (light card).
function drawStepTableCanvas(ctx, b, canvas){
  const m=stMeta(b), W=canvas.width, H=canvas.height, u=Math.min(W,H), scale=m.scale||0.9;
  const x0=b.x_pct/100*W, y0=b.y_pct/100*H;
  const fs=u*0.012*scale, barH=fs*1.9, rh=fs*2.3, numW=fs*3, insW=u*0.17*scale, W2=numW+insW;
  ctx.save(); ctx.textBaseline='middle';
  ctx.fillStyle='#dbe5f3'; ctx.fillRect(x0,y0,W2,barH);
  ctx.fillStyle='#1d3a63'; ctx.font='700 '+fs+"px 'DM Sans',sans-serif"; ctx.textAlign='left';
  ctx.fillText('⠿ '+m.title, x0+fs*0.5, y0+barH/2);
  let yy=y0+barH;
  m.rows.forEach(r=>{
    ctx.strokeStyle='#b9c2d0'; ctx.lineWidth=1;
    ctx.fillStyle='#fff'; ctx.fillRect(x0,yy,W2,rh);
    ctx.strokeRect(x0,yy,numW,rh); ctx.strokeRect(x0+numW,yy,insW,rh);
    const cs=fs*1.5, ccx=x0+numW/2, ccy=yy+rh/2;
    ctx.fillStyle=r.skip?'#dc2626':stepColor(r.n);
    ctx.beginPath();
    if(r.skip) ctx.arc(ccx,ccy,cs/2,0,Math.PI*2); else ctx.roundRect(ccx-cs/2,ccy-cs/2,cs,cs,cs*0.2);
    ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='800 '+(fs*0.9)+"px 'JetBrains Mono',monospace"; ctx.textAlign='center';
    ctx.fillText(r.skip?'✕':String(r.n), ccx, ccy);
    ctx.fillStyle='#14171c'; ctx.font='600 '+fs+"px 'DM Sans',sans-serif"; ctx.textAlign='left';
    ctx.save(); ctx.beginPath(); ctx.rect(x0+numW,yy,insW,rh); ctx.clip();
    ctx.fillText(r.text||'', x0+numW+fs*0.5, ccy); ctx.restore();
    yy+=rh;
  });
  ctx.strokeStyle='#b9c2d0'; ctx.lineWidth=1.5; ctx.strokeRect(x0,y0,W2,barH+rh*m.rows.length);
  ctx.restore();
}

// Draw a placed reference table onto the export canvas. (x0,y0) = top-left px.
function drawTableCanvas(ctx, b, x0, y0, canvas) {
  let meta = {};
  try { meta = JSON.parse(b.label || '{}'); } catch {}
  const title = meta.title || 'Table';
  const rows = Array.isArray(meta.rows) ? meta.rows : [];
  const scale = (+meta.scale) || 1;
  const u = (canvas.width / 1000) * scale; // viewBox→px unit, × table scale
  const colW = [70*u, 55*u, 70*u];
  const W = colW[0]+colW[1]+colW[2];
  const rh = 15*u, barH = 16*u, fs = 9*u;
  const x1 = x0 + colW[0], x2 = x1 + colW[1];
  const hA = y0 + barH, hB = hA + rh, dataTop = hB + rh;
  const H = barH + rh*2 + rows.length*rh;
  ctx.save();
  ctx.textBaseline = 'middle';
  // card
  ctx.fillStyle = 'white'; ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = Math.max(1, u);
  ctx.beginPath(); ctx.roundRect(x0, y0, W, H, 3*u); ctx.fill(); ctx.stroke();
  // drag/title bar
  ctx.fillStyle = '#e2e8f0';
  ctx.beginPath(); ctx.roundRect(x0, y0, W, barH, [3*u,3*u,0,0]); ctx.fill();
  ctx.fillStyle = '#475569'; ctx.font = `${fs}px DM Sans, sans-serif`; ctx.textAlign = 'left';
  ctx.fillText(title, x0 + 5*u, y0 + barH/2);
  // header fill
  ctx.fillStyle = '#f1f5f9'; ctx.fillRect(x0, hA, W, rh*2);
  const cell = (x,y,w,h,t,opt={}) => {
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = Math.max(0.6, 0.8*u);
    ctx.strokeRect(x, y, w, h);
    if (t == null || t === '') return;
    ctx.fillStyle = opt.fill || '#111';
    ctx.font = `${opt.bold?'bold ':''}${fs}px DM Sans, sans-serif`;
    if (opt.center) { ctx.textAlign = 'center'; ctx.fillText(t, x + w/2, y + h/2); }
    else { ctx.textAlign = 'left'; ctx.fillText(t, x + 4*u, y + h/2); }
  };
  cell(x0, hA, colW[0], rh*2, 'Hex bit', {center:true, bold:true});
  cell(x1, hA, colW[1]+colW[2], rh, title, {center:true, bold:true});
  cell(x1, hB, colW[1], rh, 'Screw', {center:true, bold:true});
  cell(x2, hB, colW[2], rh, 'Torque N·m', {center:true, bold:true});
  rows.forEach((row, i) => {
    const ry = dataTop + i*rh;
    cell(x0, ry, colW[0], rh, String(row[0]||''));
    cell(x1, ry, colW[1], rh, String(row[1]||''));
    cell(x2, ry, colW[2], rh, String(row[2]||''), {center:true, bold:true});
  });
  ctx.restore();
}

async function exportAnnotatedPNG() {
  const img = document.getElementById('drawingImg');
  if (!img) return;
  toast('Generating PNG...','info');

  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Export every visible layer (matches the on-screen multi-layer view).
  const pageBalloons = balloons.filter(b => {
    if (b.page !== currentPage) return false;
    const m = b.mode || 'balloon';
    if (m === 'table' || m === 'loctorque' || m === 'steptable') return true;
    if (MODES[m] && MODES[m].hidden) return false;
    return layerVis[m] !== false;
  });
  const r = Math.min(canvas.width, canvas.height) * 0.018 * markerSize;
  const shapeOf = (b) => {
    const m = b.mode || 'balloon';
    return (MODES[m] && MODES[m].shape) || (m === 'cable' ? 'note' : 'circle');
  };
  const isTagShape = (sh) => sh === 'note' || sh === 'caution';

  // First pass: leader arrows (under balloons)
  pageBalloons.forEach(b => {
    if (b.tip_x_pct == null || b.tip_y_pct == null) return;
    if ((b.mode||'') === 'table') return;
    const style = b.arrow_style || 'solid';
    if (style === 'none') return;
    const cx = b.x_pct/100 * canvas.width;
    const cy = b.y_pct/100 * canvas.height;
    const tx = b.tip_x_pct/100 * canvas.width;
    const ty = b.tip_y_pct/100 * canvas.height;
    const color = b.color || '#e74c3c';
    const sh = shapeOf(b);
    const isCable = (b.mode||'balloon') === 'cable';
    const isTag = isCable || isTagShape(sh);

    // Trim line to start at edge of balloon body (rect for tags, circle otherwise)
    const dx = tx-cx, dy = ty-cy;
    const _meta = balloonMeta(b);
    const _hasRoute = _meta.curve || (_meta.waypoints && _meta.waypoints.length);
    let ahAng = Math.atan2(dy, dx);
    let sx, sy;
    if (isTag) {
      const text = balloonText(b) || '?';
      ctx.font = `bold ${r*0.85}px DM Sans, sans-serif`;
      const tw = ctx.measureText(text).width;
      const indSize = r*0.9;
      const padX = r*0.35, indGap = r*0.3;
      const tagW = padX + indSize + indGap + tw + padX;
      const tagH = r*1.5;
      [sx, sy] = rectEdgePoint(cx, cy, tagW, tagH, tx, ty);
    } else {
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      sx = cx + dx/dist*r;
      sy = cy + dy/dist*r;
    }

    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineCap = 'round';
    if (style === 'dashed') { ctx.setLineDash([r*0.4, r*0.3]); ctx.lineWidth = r*0.15; }
    else if (style === 'thick') { ctx.lineWidth = r*0.25; }
    else { ctx.lineWidth = r*0.15; }
    if (!_hasRoute) {
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(tx, ty); ctx.stroke();
    } else {
      const W = canvas.width, H = canvas.height;
      const pts = [{x:cx,y:cy}, ...(_meta.waypoints||[]).map(p=>({x:p.x/100*W,y:p.y/100*H})), {x:tx,y:ty}];
      ctx.beginPath();
      if (!_meta.curve) {
        ctx.moveTo(pts[0].x,pts[0].y); for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      } else if (pts.length===2) {
        const a=pts[0], b2=pts[1], mx=(a.x+b2.x)/2, my=(a.y+b2.y)/2, ddx=b2.x-a.x, ddy=b2.y-a.y, len=Math.hypot(ddx,ddy)||1, off=Math.min(len*0.3, W*0.2);
        ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx-ddy/len*off, my+ddx/len*off, b2.x, b2.y);
      } else {
        ctx.moveTo(pts[0].x,pts[0].y);
        for (let i=0;i<pts.length-1;i++){ const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1];
          ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6,p1.y+(p2.y-p0.y)/6,p2.x-(p3.x-p1.x)/6,p2.y-(p3.y-p1.y)/6,p2.x,p2.y); }
      }
      ctx.stroke();
      const lw = (_meta.waypoints||[]); const last = lw.length ? lw[lw.length-1] : null;
      ahAng = Math.atan2(ty - (last?last.y/100*H:cy), tx - (last?last.x/100*W:cx));
    }
    ctx.setLineDash([]);

    // Arrowhead or dot at tip
    if (style === 'dot') {
      ctx.beginPath(); ctx.arc(tx, ty, r*0.28, 0, Math.PI*2); ctx.fill();
    } else {
      const ang = ahAng;
      const ahLen = style === 'thick' ? r*0.7 : r*0.55;
      const ahW = style === 'thick' ? r*0.35 : r*0.28;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - ahLen*Math.cos(ang) + ahW*Math.sin(ang), ty - ahLen*Math.sin(ang) - ahW*Math.cos(ang));
      ctx.lineTo(tx - ahLen*Math.cos(ang) - ahW*Math.sin(ang), ty - ahLen*Math.sin(ang) + ahW*Math.cos(ang));
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  });

  // Second pass: balloons / tags / no-install / tables
  pageBalloons.forEach(b => {
    const cx = b.x_pct/100 * canvas.width;
    const cy = b.y_pct/100 * canvas.height;
    const color = b.color || '#e74c3c';
    const bmode = b.mode || 'balloon';
    const sh = shapeOf(b);
    const isCable = bmode === 'cable';
    const isCaution = sh === 'caution';

    if (bmode === 'table') {
      drawTableCanvas(ctx, b, cx, cy, canvas);
    } else if (bmode === 'loctorque') {
      drawLoctorqueCanvas(ctx, b, canvas);
    } else if (bmode === 'steptable') {
      drawStepTableCanvas(ctx, b, canvas);
    } else if (isCable || sh === 'note' || isCaution) {
      const text = balloonText(b) || (sh === 'note' ? 'Note' : isCaution ? 'Caution' : '?');
      ctx.font = `bold ${r*0.85}px DM Sans, sans-serif`;
      const glyph = isCaution ? '⚠ ' : '';
      const tw = ctx.measureText(glyph + text).width;
      const indSize = r*0.9;
      const padX = r*0.35, indGap = r*0.3;
      // caution has no chip square — just glyph + text
      const w = isCaution ? (padX + tw + padX) : (padX + indSize + indGap + tw + padX);
      const h = r*1.5, rad = r*0.25;
      const x0 = cx - w/2, y0 = cy - h/2;
      ctx.fillStyle = isCaution ? '#fff7ed' : 'white';
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1.5, r*0.08);
      ctx.beginPath(); ctx.roundRect(x0, y0, w, h, rad); ctx.fill(); ctx.stroke();
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      if (isCaution) {
        ctx.fillStyle = '#7c2d12';
        ctx.fillText(glyph + text, x0 + padX, cy);
      } else {
        ctx.fillStyle = sh === 'note' ? color : '#27ae60';
        const indX = x0 + padX, indY = cy - indSize/2;
        ctx.beginPath(); ctx.roundRect(indX, indY, indSize, indSize, r*0.1); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.fillText(text, indX + indSize + indGap, cy);
      }
    } else if (sh === 'x') {
      // No-install — red circle with white ✕, no number
      ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, Math.PI*2); ctx.fillStyle = 'white'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = 'white'; ctx.font = `bold ${r*1.5}px DM Sans, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✕', cx, cy + r*0.05);
      if (balloonText(b)) {
        ctx.font = `${r*0.6}px DM Sans, sans-serif`;
        ctx.fillStyle = 'white'; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
        ctx.strokeText(balloonText(b), cx, cy + r + r*0.7);
        ctx.fillText(balloonText(b), cx, cy + r + r*0.7);
      }
    } else {
      // White halo
      ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, Math.PI*2);
      ctx.fillStyle = 'white'; ctx.fill();
      // Color circle
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
      // Number
      ctx.fillStyle = 'white'; ctx.font = `bold ${r*1.3}px DM Sans, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(String(b.number||''), cx, cy);
      // Label
      if (balloonText(b)) {
        ctx.font = `${r*0.6}px DM Sans, sans-serif`;
        ctx.fillStyle = 'white';
        ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
        ctx.strokeText(balloonText(b), cx, cy + r + r*0.7);
        ctx.fillText(balloonText(b), cx, cy + r + r*0.7);
      }
    }
  });

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${currentDrawing.drawing_ref}_annotated_p${currentPage}.png`;
    a.click();
    toast('PNG downloaded','ok');
  }, 'image/png');
}

    : `<div class="print-header"><h1>⚙️ DeployOps — ${esc(title)}</h1>${subtitle?`<p>${subtitle}</p>`:''}</div>`;
  const header = customHeader !== undefined ? customHeader : defaultHeader;

  return `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${esc(docTitle)}</title>
  <style>
    @page{margin:14mm 12mm}
    *{box-sizing:border-box;margin:0;padding:0}

function tr(lang, key) { return (PRINT_I18N[lang] || PRINT_I18N.en)[key] ?? PRINT_I18N.en[key] ?? ''; }
function pickField(item, base, lang) {
  if (lang === 'ja') {
    const v = item[base + '_ja'];
    if (v != null && v !== '') return v;
  }
  return item[base];
}
// F.10: locale-aware section display name. `section` is a row from
// sectionsCache (deployops_sections). Used everywhere a worksheet, legacy
// print template, or Deploy-tab UI renders a section header.
function sectionName(section, lang) {
  if (!section) return '(unknown)';
  return (lang === 'ja' && section.name_ja) ? section.name_ja : section.name;
}
// Backward-compat shim: callers pass a group with {items, sectionName}.
// We look up the section row via the first item's section_id and route
// through sectionName(). If cache is cold, fall back to group.sectionName
// (the canonical English string callers always pass). F.10 guards in
// printBlankWorkOrder + loadDeployData ensure cache is hot at render
// time, so the fallback should not normally fire.
function pickSection(group, lang) {
  if (!group) return '';
  const sid = group.items?.[0]?.section_id;
  const modelId = group.items?.[0]?.model_id;
  if (sid && modelId && sectionsCache[modelId]) {
    const section = sectionsCache[modelId].find(s => s.id === sid);
    if (section) return sectionName(section, lang);
  }
  return group.sectionName || '';
}

// UI locale (Models / Drawings / Deploy tabs)
// ============================================================
// Separate from the print modal's transient langChoice radio: this is the
// app-wide locale state that drives live UI rendering. Persisted in
// localStorage so the operator's choice survives reloads. The print modal
// keeps its own langChoice for backwards-compat — print jobs are not
// auto-coupled to the UI locale (an EN-browsing operator may still want to
// print a JA worksheet for a JA-speaking colleague).
const UI_LANG_KEY = 'deployops_ui_lang';
function getUiLang() {
  const v = (() => { try { return localStorage.getItem(UI_LANG_KEY); } catch(e) { return null; } })();
  return v === 'ja' ? 'ja' : 'en';
}
function setUiLangButton() {
  const btn = document.getElementById('uiLangToggle');
  if (btn) btn.textContent = getUiLang() === 'ja' ? '🌐 日本語' : '🌐 EN';
}
function toggleUiLang() {
  const next = getUiLang() === 'ja' ? 'en' : 'ja';
  try { localStorage.setItem(UI_LANG_KEY, next); } catch(e) {}
  setUiLangButton();
  rerenderForLangChange();
}
function rerenderForLangChange() {
  // Topbar drawings dropdown is visible from every tab — re-render
  // independently of the active tab's content.
  renderDrawingsSelect();
  const tab = document.querySelector('.tab.active')?.dataset?.tab;
  if (tab === 'models') renderModels();
  else if (tab === 'deploy') renderDeploy();
  // 'drawing' tab content is the PDF viewer; no localized text in the
  // viewer body, so no further re-render needed.
}
// Rebuilds the topbar drawing-selector <option>s from in-memory `drawings`.
// Extracted from loadDrawings so toggleUiLang can repaint without re-
// fetching. Caller invariant: `drawings` must be populated (loadDrawings
// runs first at boot).
function renderDrawingsSelect() {
  const sel = document.getElementById('drawingSelect');
  if (!sel || !Array.isArray(drawings)) return;
  const currentVal = sel.value;
  const lang = getUiLang();
  sel.innerHTML = '<option value="">— Select Drawing —</option>';
  drawings.forEach(d => {
    sel.innerHTML += `<option value="${d.id}">${esc(d.drawing_ref)} — ${esc(pickField(d, 'name', lang))}</option>`;
  });
  if (currentVal) sel.value = currentVal;
}

function phaseLabel(phase, plain, lang = 'en') {
  const map = {
    pre_install_qc: { key: 'preInstallQC', icon: '🛡️' },
    pre_test_qc:    { key: 'preTestQC',    icon: '🧪' },
    pre_deploy:     { key: 'preDeploy',    icon: '📦' },
  };
  const m = map[phase];
  if (!m) return phase || '';
  const t = tr(lang, m.key);
  return plain ? t : `${m.icon} ${t}`;
}

// Group items by phase → section. Returns array of { phase, sectionName,
// displayName, items } in display order. F.10: groups by section_id (FK)
// instead of legacy section_name string; displayName populated via
// sectionName(section, lang) so callers can render locale-aware without
// a separate pickSection step. Items lacking section_id (defensive —
// shouldn't exist after F.9 backfill) bucket to '__unsorted__'.
function genGroups(items, phaseFilter, lang = 'en') {
  const phases = phaseFilter ? [phaseFilter] : ['pre_install_qc','pre_test_qc','pre_deploy'];
  const modelId = items[0]?.model_id;
  const cache = (modelId && sectionsCache[modelId]) || [];
  const byId = {};
  cache.forEach(s => { byId[s.id] = s; });
  const groups = [];
  phases.forEach(phase => {
    const phaseItems = items.filter(i => itemInPhase(i, phase));
    const sectionMap = {}; const order = [];
    phaseItems.forEach(i => {
      const sid = i.section_id;
      const key = (sid && byId[sid]) ? sid : '__unsorted__';
      if (!sectionMap[key]) { sectionMap[key] = []; order.push(key); }
      sectionMap[key].push(i);
    });
    order.forEach(key => {
      const section = byId[key];
      groups.push({
        phase,
        sectionName: section ? section.name : '(unsorted)',
        displayName: section ? sectionName(section, lang) : (lang === 'ja' ? 'その他' : '(unsorted)'),
        items: sectionMap[key]
      });
    });
  });
  return groups;
}

const EMPTY_ROWS_PER_SECTION = 17;  // calibrated for ~80% A4 portrait fill at current row metrics
function renderBlankSectionBlock(group, opts = {}) {

          <td></td>
          <td></td>
          <td></td>
          <td style="text-align:center"><span class="cb"></span></td>

          <td>${esc(pickField(item,'label',lang)||'')}</td>

          <td class="meta">${esc(item.tool||'—')}</td>
          <td style="text-align:center"><span class="cb"></span></td>

      });

  } else {
    html += `<table><tr><th style="width:30px">${tr(lang,'hash')}</th><th>${tr(lang,'item')}</th><th>${tr(lang,'description')}</th><th style="width:${opW}px;text-align:center">${tr(lang,'op')}</th><th style="width:${opW}px;text-align:center">${tr(lang,'qcCol')}</th></tr>`;
    if (emptyRows) {
      for (let i = 1; i <= EMPTY_ROWS_PER_SECTION; i++) {
        html += `<tr>
          <td>${i}</td>
          <td></td>
          <td></td>
          <td style="text-align:center"><span class="cb"></span></td>
          <td style="text-align:center"><span class="cb"></span></td>

          <td class="meta">${esc(pickField(item,'description',lang)||'')}</td>
          <td style="text-align:center"><span class="cb"></span></td>
          <td style="text-align:center"><span class="cb"></span></td>
        </tr>`;
      });
    }
  }
  html += `</table></div>`;
  return html;
}

// Single section block for Filled mode (DB state + checked_by/at column)
function renderFilledSectionBlock(group, checks, opts) {
  const { plain, lang = 'en' } = opts;
  const isKit = group.phase === 'pre_deploy';
  let html = '';

  html += `<h2 style="font-size:14px;margin:18px 0 8px;border-bottom:2px solid #333;padding-bottom:4px">${phaseLabel(group.phase, plain, lang)} <span style="font-size:11px;color:#555;font-weight:400">(${group.items.length} item${group.items.length===1?'':'s'})</span></h2>`;

  html += `<div class="section"><div class="section-title">${esc(pickSection(group, lang))}</div>`;

  if (isKit) {
    html += `<table><tr><th style="width:28px">✓</th><th style="width:96px">${tr(lang,'partNumber')}</th><th>${tr(lang,'description')}</th><th style="width:48px">${tr(lang,'qty')}</th><th style="width:80px">${tr(lang,'tool')}</th><th style="width:140px">${tr(lang,'checkedByAt')}</th></tr>`;
    group.items.forEach(item => {
      const c = checks.find(x => x.item_id === item.id && x.phase === group.phase && x.checked);
      const ck = !!c;
      const by = c ? `${esc(c.checked_by||'')}${c.checked_at?'<br>'+esc(formatDate(c.checked_at)):''}` : '';
      html += `<tr>
        <td><span class="cb ${ck?'done':''}"></span></td>

    html += `<table><tr><th style="width:28px">✓</th><th style="width:28px">${tr(lang,'hash')}</th><th>${tr(lang,'item')}</th><th>${tr(lang,'description')}</th><th style="width:140px">${tr(lang,'checkedByAt')}</th></tr>`;
    group.items.forEach((item, i) => {
      const c = checks.find(x => x.item_id === item.id && x.phase === group.phase && x.checked);
      const ck = !!c;
      const by = c ? `${esc(c.checked_by||'')}${c.checked_at?'<br>'+esc(formatDate(c.checked_at)):''}` : '';
      html += `<tr>
