<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployOps</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#07090f;--surface:#0f1219;--surface2:#161c28;--surface3:#1e2538;--border:#2a3350;--text:#e2e8f0;--text2:#94a3b8;--accent:#60a5fa;--accent2:#818cf8;--red:#f87171;--green:#34d399;--orange:#fbbf24;--pink:#f472b6;--cyan:#22d3ee}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.logo{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.topbar select{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:4px 10px;border-radius:6px;font-size:12px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--accent);background:var(--surface3)}
.btn-primary{background:var(--accent);color:#000;font-weight:600;border-color:var(--accent)}
.btn-primary:hover{opacity:.9}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-green{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
.admin-only{display:none}
.is-admin .admin-only{display:inline-flex}
.is-admin .add-form.admin-only{display:flex}
.is-admin div.mode-indicator.admin-only{display:inline-block}
body[data-tab="models"] #drawingSelect,
body[data-tab="models"] #uploadPdfBtn,
body[data-tab="deploy"] #drawingSelect,
body[data-tab="deploy"] #uploadPdfBtn{display:none!important}

/* TABS */
.tabbar{display:flex;gap:2px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;background:none;border:none;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-panel{display:none;padding:20px}
.tab-panel.active{display:block}

/* DRAWING VIEWER */
.drawing-area{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:10px}
.drawing-area.fullscreen-mode{position:fixed;inset:0;z-index:999;background:var(--bg);margin:0;border:none;border-radius:0}
.drawing-area.fullscreen-mode .drawing-container{max-height:calc(100vh - 50px)}
body.is-fullscreen .topbar,body.is-fullscreen .tabbar{display:none!important}
.drawing-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.drawing-container{position:relative;overflow:auto;max-height:calc(100vh - 220px)}
/* Zoom/pan wrapper — img + svg transform together so balloons stay anchored. */
.dwg-zoom-wrap{position:relative;width:100%;transform-origin:0 0;will-change:transform}
.drawing-container.pan-ready{cursor:grab}
.drawing-container.panning{cursor:grabbing}
.drawing-container img{display:block;width:100%;user-select:none;-webkit-user-drag:none}
.drawing-container svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.drawing-container svg.interactive{pointer-events:all;touch-action:none}
.dwg-zoom-ctrls{display:flex;align-items:center;gap:4px}
.dwg-zoom-ctrls .zoom-level{font-size:11px;color:var(--text2);min-width:38px;text-align:center;font-family:'JetBrains Mono',monospace}
.balloon-g{cursor:pointer;pointer-events:all}
.balloon-g:hover circle.b-main,.balloon-g:hover rect.b-main,.balloon-g:hover polygon.b-main{stroke-width:3}
.balloon-g.selected circle.b-main,.balloon-g.selected rect.b-main,.balloon-g.selected polygon.b-main{stroke:var(--cyan);stroke-width:4;filter:drop-shadow(0 0 6px rgba(34,211,238,.5))}
.tip-handle{cursor:move;pointer-events:all}
.tip-handle:hover circle{stroke-width:3}
.tip-handle.selected circle{stroke:var(--cyan);stroke-width:3}
.leader-line{pointer-events:none}

/* MODE PILLS */
.mode-pills{display:inline-flex;gap:4px;background:#000;border-radius:999px;padding:3px;align-items:center}
.mode-pill{padding:5px 12px;border-radius:999px;border:none;background:transparent;color:#aaa;font-size:11px;font-family:inherit;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.mode-pill.active{background:var(--surface3);color:#fff}
.mode-pill .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.arrow-style-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.arrow-style-btn{padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-family:inherit;cursor:pointer}
.arrow-style-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;color:var(--text2)}
.upload-area .icon{font-size:48px}
.page-nav{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.mode-indicator{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.mode-indicator.add-mode{background:rgba(248,113,113,.15);color:var(--red);animation:pulse 1.5s infinite}
.mode-indicator.select-mode{background:rgba(96,165,250,.1);color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* DRAWING SIDEBAR (layers · marker size · note templates · torque ref) */
.drawing-layout{display:flex;gap:14px;align-items:flex-start;margin-top:10px}
.drawing-layout .drawing-area{flex:1;min-width:0;margin-top:0}
.drawing-sidebar{width:264px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.armed-hint{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 14px;background:rgba(96,165,250,.12);border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
.dwg-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
.is-admin .dwg-card.admin-only{display:block}
.dwg-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.dwg-empty{color:var(--text2);font-size:12px}
.leader-seg{display:flex;gap:4px}
.leader-seg button{flex:1;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:6px 4px;font-size:12px;font-family:inherit;cursor:pointer}
.leader-seg button.on{background:#2563eb;color:#fff;border-color:transparent;font-weight:700}
.wp-handle{cursor:grab}.wp-handle:active{cursor:grabbing}
/* ===== §7/§8 on-drawing widgets (HTML overlay above the SVG) ===== */
.dwg-overlay{position:absolute;inset:0;pointer-events:none;z-index:5}
.dwg-overlay>*{pointer-events:auto}
/* Loctite chip — Option C: paper / inverted light (flat, see-through, print-safe) */
.lt-callout{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:stretch;background:rgba(255,255,255,.88);border:1px solid rgba(20,30,45,.38);border-radius:6px;overflow:hidden;box-shadow:none;font-family:'DM Sans',sans-serif;user-select:none}
.lt-callout.sel{box-shadow:0 0 0 2px #0e7490}
.lt-grip{width:15px;flex-shrink:0;cursor:grab;background:rgba(20,30,45,.06);display:grid;place-items:center;color:#64748b;font-size:10px;touch-action:none}
.lt-grip:active{cursor:grabbing}
.lt-body{display:flex;flex-direction:column;min-width:0}
.lt-grade{display:flex;align-items:center;gap:6px;padding:5px 10px 4px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.4px;color:#1d2733;border-bottom:1px solid rgba(20,30,45,.16);white-space:nowrap;text-shadow:0 0 2px rgba(255,255,255,.95)}
.lt-grade .lt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 1.5px #fff,0 0 0 2.5px rgba(20,30,45,.5)}
.lt-grade select{background:#fff;color:#1d2733;border:1px solid rgba(20,30,45,.3);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 4px;cursor:pointer}
.lt-torque{display:flex;align-items:center;gap:5px;padding:4px 10px 6px;font-size:12px;color:#0b0e16;text-shadow:0 0 2px rgba(255,255,255,.95)}
.lt-torque .lt-ico{color:#64748b}
.lt-torque .lt-tq{min-width:14px;outline:none;font-weight:800;font-family:'JetBrains Mono',monospace;color:#0b0e16}
.lt-torque .lt-tq[contenteditable]:empty::before{content:'—';color:#94a3b8}
.lt-torque .lt-unit{color:#5b6b7e;font-size:11px}
.lt-tools{display:flex;align-items:center;gap:2px;padding:3px 4px;background:rgba(20,30,45,.05);border-left:1px solid rgba(20,30,45,.16)}
.lt-tools button,.lt-tools .lt-swatch-wrap{width:20px;height:20px;border:none;border-radius:5px;background:rgba(20,30,45,.06);color:#1d2733;font-size:12px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0;position:relative;overflow:hidden}
.lt-tools button:hover{background:rgba(20,30,45,.14)}
.lt-tools .lt-curve.on{color:#0e7490}
.lt-tools .lt-arrow.off{color:#94a3b8;text-decoration:line-through}
.lt-tools .lt-del{color:#dc2626}
.lt-tools .lt-swatch{position:absolute;inset:0;opacity:0;cursor:pointer}
.dwg-table{position:absolute;transform-origin:top left;background:#fff;border:1px solid #b9c2d0;border-radius:6px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.5);user-select:none;font-family:'DM Sans',sans-serif}
.dwg-table.sel{box-shadow:0 0 0 2px #22d3ee,0 6px 22px rgba(0,0,0,.55)}
.dwg-table .dt-bar{display:flex;align-items:center;gap:6px;padding:4px 7px;background:#dbe5f3;border-bottom:1px solid #b9c2d0;cursor:grab;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#1d3a63;touch-action:none}
.dwg-table .dt-bar:active{cursor:grabbing}
.dwg-table .dt-grip-ico{color:#5b7aa8}
.dwg-table .dt-title{flex:1;white-space:nowrap}
.dwg-table .dt-tools{display:flex;gap:4px}
.dwg-table .dt-tools button{width:18px;height:18px;border:1px solid #9fb0c9;background:#fff;border-radius:4px;color:#1d3a63;font-size:11px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0}
.dwg-table .dt-tools .st-tdel{color:#c0392b;border-color:#e3a9a1}
.dwg-table .dt-table{border-collapse:collapse}
.dwg-table .dt-table th,.dwg-table .dt-table td{border:1px solid #b9c2d0;padding:4px 9px;text-align:left;color:#14171c;font-size:12px}
.dwg-table .dt-table thead th{background:#dbe5f3;font-weight:700}
.step-table .st-num{text-align:center;width:46px;vertical-align:middle}
.step-table .st-ins{min-width:160px;max-width:240px}
.step-table .st-ic{outline:none;cursor:text;font-weight:600;color:#14171c;display:block;min-width:40px}
.step-table .st-ic:empty::before{content:'instruction…';color:#aeb4bd;font-style:italic;font-weight:400}
.step-table .st-arrow{text-align:center;width:42px}
.mk-cell{display:inline-grid;place-items:center;width:22px;height:22px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:#fff;line-height:1}
.mk-cell.step{border-radius:4px}
.mk-cell.x{background:#dc2626;border-radius:50%}
.st-arrow-btn{width:24px;height:24px;border-radius:6px;background:#fff;border:1.6px solid;font-size:12px;font-weight:800;line-height:1;cursor:pointer;display:inline-grid;place-items:center}
.st-arrow-btn:hover{filter:brightness(.94)}
.st-addrow{display:flex;gap:6px;padding:5px 7px;background:#dbe5f3;border-top:1px solid #b9c2d0}
.st-addrow button{flex:1;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:#1d3a63;background:#fff;border:1px solid #9fb0c9;border-radius:5px;padding:5px;cursor:pointer}
.st-addrow button:hover{background:#eef4fb}
.lt-cfg{display:flex;flex-direction:column;gap:6px}
.lt-cfg-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.lt-cfg-row span{width:50px}
.lt-cfg-row select,.lt-cfg-row input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 8px;font-family:inherit}
.lt-pal-head{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;font-weight:700;color:var(--text);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px}
.lt-pal-head span{font-size:9px;font-weight:500;color:var(--text2);text-transform:none;letter-spacing:0}
.lt-pal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:8px}
.lt-pal-sw{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.lt-pal-chip{width:100%;height:22px;border-radius:5px;cursor:pointer;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.lt-pal-chip input{position:absolute;inset:0;opacity:0;cursor:pointer;border:none;padding:0}
.lt-pal-name{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.lt-pal-del{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;border:none;background:#dc2626;color:#fff;font-size:10px;line-height:1;cursor:pointer;display:grid;place-items:center}
.lt-pal-add{display:flex;gap:6px;margin-top:8px}
.lt-pal-add input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 8px;font-family:inherit}
.lt-pal-add button{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 8px;cursor:pointer;white-space:nowrap}
.lt-pal-reset{width:100%;margin-top:8px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;padding:6px;cursor:pointer}
.step-pal{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.step-pal .sp-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.sp-swatches{display:flex;flex-wrap:wrap;gap:4px}
.sp-sw{position:relative;width:26px;height:22px;border-radius:5px;cursor:pointer;display:grid;place-items:center;border:1px solid rgba(255,255,255,.15)}
.sp-sw span{font-size:10px;font-weight:700;color:rgba(0,0,0,.55);font-family:'JetBrains Mono',monospace}
.sp-sw input{position:absolute;inset:0;opacity:0;cursor:pointer;border:none;padding:0}
.dwg-card input{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:6px 8px;border-radius:6px;font-size:12px;font-family:inherit;width:100%}
/* layers */
.layer-list{display:flex;flex-direction:column;gap:2px}
.layer-row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px}
.layer-row.focused{background:var(--surface3)}
.layer-row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eye{border:none;background:transparent;cursor:pointer;font-size:14px;padding:0;line-height:1;width:20px;text-align:center}
.eye.off{opacity:.5;filter:grayscale(1)}
.layer-name{border:none;background:transparent;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;padding:0;text-align:left;flex:1}
.layer-name:hover{color:var(--accent)}
.layer-count{color:var(--text2);font-size:11px;font-family:'JetBrains Mono',monospace}
/* marker size */
.marker-size-slider{width:100%;accent-color:var(--accent);cursor:pointer}
.marker-size-val{color:var(--text2);font-size:11px;font-family:'JetBrains Mono',monospace}
/* note templates */
.tpl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tpl-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface3);border:1px solid var(--border);border-radius:999px;padding:3px 4px 3px 10px;font-size:11px}
.tpl-chip.armed{border-color:var(--accent);background:rgba(96,165,250,.18)}
.tpl-chip-text{border:none;background:transparent;color:var(--text);font-family:inherit;font-size:11px;cursor:pointer;padding:0}
.tpl-chip-del{border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:11px;padding:0 2px;line-height:1}
.tpl-chip-del:hover{color:var(--red)}
.tpl-add{display:flex;gap:6px}
.tpl-add input{flex:1}
/* torque reference */
.torque-tbl{width:100%;border-collapse:collapse;font-size:11px}
.torque-tbl th,.torque-tbl td{border:1px solid var(--border);padding:4px 6px;text-align:left}
.torque-tbl thead th{background:var(--surface3);color:var(--text);font-weight:700;font-size:10px}
.torque-tbl tbody tr{cursor:pointer}
.torque-tbl tbody tr:hover{background:var(--surface3)}
.torque-tbl td.t-num,.torque-tbl th:last-child{text-align:right;font-family:'JetBrains Mono',monospace}

/* CHECKLIST BUILDER */
.cl-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;overflow:hidden}
.cl-section-header{position:relative;padding:11px 14px 11px 28px;background:linear-gradient(180deg,var(--surface2),var(--surface3));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.cl-section-header::before{content:'';position:absolute;left:12px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent),inset 0 0 1px rgba(255,255,255,.4)}
.cl-section-header::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--accent);opacity:.25}
.cl-section-header h3{flex:1;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text)}
.cl-section-header .badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);padding:3px 7px;background:#000;border:1px solid var(--surface3);border-radius:3px;letter-spacing:.5px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.cl-section-body{padding:12px 16px}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 14px;border-radius:6px;border:1px solid transparent;background:var(--surface);transition:background .15s,border-color .15s;margin:4px 0;position:relative}
.cl-item::before{content:'';position:absolute;left:4px;top:8px;bottom:8px;width:3px;border-radius:2px;background:var(--surface3);transition:background .15s,box-shadow .15s}
.cl-item:hover{background:var(--surface2);border-color:var(--accent)}
.cl-item:hover::before{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.cl-item .order{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);min-width:30px;padding:3px 7px;background:#000;border:1px solid var(--surface3);border-radius:3px;text-align:center;letter-spacing:.5px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.cl-item:hover .order{border-color:var(--accent);text-shadow:0 0 4px var(--accent)}
.cl-item .label{flex:1;font-size:13px;line-height:1.35}
.cl-item .desc{font-size:11px;color:var(--text2);margin-top:2px}
.cl-item .meta{display:flex;gap:6px;flex-shrink:0}
.cl-item.multi{border-color:rgba(96,165,250,.32);background:rgba(96,165,250,.05)}
.cl-item.multi::before{background:var(--accent)}
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:16px}
.folder-card{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:24px 16px 18px;cursor:pointer;transition:border-color .15s,transform .15s,background .15s;display:flex;flex-direction:column;align-items:flex-start;gap:8px;min-height:120px}
.folder-card:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--surface3)}
.folder-card .folder-icon{font-size:32px;line-height:1}

.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}

.add-form input,.add-form select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:12px;font-family:inherit}
.add-form input{flex:1;min-width:120px}
.sub-tabs{display:flex;gap:2px;margin-bottom:12px}
.sub-tab{padding:6px 14px;border-radius:6px;border:none;background:var(--surface2);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}

/* MODELS TAB */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}

.crumbs a{color:var(--accent);cursor:pointer;text-decoration:none}

.crumbs .sep{opacity:.4}
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.model-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative}

.model-card .model-icon{font-size:28px;margin-bottom:6px}
.model-card h3{font-size:16px;margin-bottom:2px}
.model-card .ref{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);margin-bottom:8px}
.model-card .desc{font-size:12px;color:var(--text2);margin-bottom:12px;min-height:30px;line-height:1.4}
.model-card .stats{display:flex;gap:14px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border);padding-top:10px}
.model-card .stats span{display:flex;flex-direction:column;gap:2px}
.model-card .stats b{color:var(--text);font-size:14px}

.phase-tab.active{background:var(--accent);color:#000}
.phase-tab .count{font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.7}

/* PHASE TOOLBAR (above sections) */
.phase-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}

/* INLINE ADD ROW + +Add button */
.add-item-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;margin:6px 0 2px}
.add-item-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2)}
.cl-item-inline{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--surface3);border:1px dashed var(--accent);border-radius:8px;margin:6px 0 2px;align-items:center}

.empty-section-hint{padding:8px 10px;font-size:11px;color:var(--text2);font-style:italic;text-align:center}

.row-actions{display:flex;gap:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}

.row-actions .btn:last-child{border-right:none}
.row-actions .btn:hover{background:var(--surface3)}
.row-actions .btn-danger:hover{background:rgba(248,113,113,.12);color:var(--red)}

/* PRINT MODAL — mode picker + phase radios */
.mode-pick{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.mode-card{flex:1 1 180px;padding:14px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:inherit;border-radius:10px;cursor:pointer;text-align:left;transition:all .15s;min-width:0}
.mode-card:hover{border-color:var(--accent)}
.mode-card.active{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 1px var(--accent) inset}

/* DEPLOY CHECKLIST */
.deploy-header{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.deploy-header h2{font-size:18px;flex:1}

.deploy-progress .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:6px;transition:width .4s}
.deploy-progress .txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:600}
.deploy-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.deploy-section-header{padding:12px 16px;background:var(--surface2);font-weight:600;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.deploy-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.deploy-item:last-child{border-bottom:none}
.deploy-item:hover{background:var(--surface2)}
.deploy-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex-shrink:0;margin-top:2px}
.deploy-item.checked .di-label{text-decoration:line-through;color:var(--text2)}

.di-label .sub{display:block;font-size:11px;color:var(--text2);margin-top:2px}
.di-qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--orange);min-width:40px;text-align:right}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}

@media print{
  *{color-adjust:exact!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff;color:#111;overflow:visible!important}
  .topbar,.tabbar,.no-print,.btn,.admin-only,.add-form{display:none!important}
  .tab-panel.active{display:block!important;padding:0!important;margin:0!important}
  .tab-panel:not(.active){display:none!important}
  .deploy-section,.unit-card,.cl-section{background:#fff;border-color:#ccc;break-inside:avoid}
  .deploy-section-header{background:#f0f0f0!important}
  .deploy-item input[type=checkbox]{appearance:none;width:16px;height:16px;border:2px solid #333;border-radius:3px}
  .deploy-item.checked input[type=checkbox]::after{content:'✓';display:block;text-align:center;font-size:12px;line-height:14px}

  /* DRAWING TAB — A3 landscape, single page, aspect ratio preserved */
  #drawingTab.active{
    position:absolute;inset:0;width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    background:#fff;
  }
  #drawingTab.active .drawing-area{
    border:none!important;background:#fff!important;border-radius:0!important;
    margin:0!important;
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    overflow:visible!important;
  }
  #drawingTab.active .drawing-layout{display:block;width:100%;height:100%;margin:0}
  #drawingTab.active .drawing-toolbar{display:none!important}
  #drawingTab.active .armed-hint{display:none!important}
  /* Container takes the natural aspect ratio of the image and scales to fit */
  #drawingTab.active .drawing-container{
    max-height:none!important;overflow:visible!important;
    position:relative;
    width:auto;height:auto;
    max-width:100%;max-height:100%;
    /* aspect-ratio is set inline via JS once the image loads (see print handler) */
  }
  /* Neutralise any on-screen zoom/pan so print always renders the full drawing. */
  #drawingTab.active .dwg-zoom-wrap{
    transform:none!important;
    width:100%;height:100%;
  }
  #drawingTab.active .drawing-container img{
    display:block;
    width:100%;height:100%;
    object-fit:contain;
  }
  /* SVG keeps its viewBox-driven sizing, locked to the same box as img */
  #drawingTab.active .drawing-container svg{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
  }
}

  .tabbar{overflow-x:auto}
  .tab-panel{padding:12px}

}

// ── Section 6: curved + multi-bend leaders (shared plumbing) ────────────────
// A leader's curve(bool) + waypoints([{x,y}] in %) ride INSIDE the balloon's
// existing `label` column as JSON. To stay 100% backward-compatible, a balloon
// only switches to JSON once it actually has a curve/bend — legacy plain-text
// labels (notes / cautions / cable tags) render exactly as before.
function balloonMeta(b){
  const raw = b && b.label;
  if (typeof raw === 'string' && raw.charCodeAt(0) === 123 /* "{" */){
    try { const o = JSON.parse(raw);
      if (o && typeof o === 'object' && ('t' in o || 'c' in o || 'w' in o)) {
        const { t, c, w, ...extra } = o;
        return { text: t || '', curve: !!c, waypoints: Array.isArray(w) ? w : [], _extra: extra };
      }
    } catch {}
  }
  return { text: raw || '', curve: false, waypoints: [], _extra: {} };
}
function balloonText(b){ return balloonMeta(b).text; }
function serializeBalloonLabel(text, curve, waypoints, extra){
  const wps = Array.isArray(waypoints) ? waypoints : [];
  const hasExtra = extra && Object.keys(extra).length;
  if (!curve && !wps.length && !hasExtra) return text || '';
  return JSON.stringify(Object.assign({}, extra || {}, { t: text || '', c: !!curve, w: wps }));
}
function leaderRouteOf(b){
  if (b.mode === 'loctorque'){
    const m = ltMeta(b);
    return { curve:m.curve, waypoints:m.waypoints||[], start:{x:(m.bx==null?b.x_pct:m.bx), y:(m.by==null?b.y_pct:m.by)}, tip:{x:b.x_pct, y:b.y_pct} };
  }
  const meta = balloonMeta(b);
  return { curve:meta.curve, waypoints:meta.waypoints||[], start:{x:b.x_pct, y:b.y_pct}, tip:{x:b.tip_x_pct, y:b.tip_y_pct} };
}

// Admin smoke test for §7/§8 — exercises the real insert/spawn/dedupe DB paths
// on the OPEN drawing, then deletes everything it created. Safe + non-destructive.
async function runAnnotationSelfTest(){
  if (!isAdmin){ console.warn('Self-test is admin-only.'); return; }
  if (!currentDrawing){ toast('Open a drawing first','err'); return; }
  const results=[], made=[];
  const ok=(name,cond)=>results.push((cond?'✓ ':'✗ ')+name);
  const rowKey=(b,tid,ri)=>{ try{ const o=JSON.parse(b.label||'{}'); return o.ft===tid&&o.fr===ri; }catch{ return false; } };
  try {
    // 1) place a Loctite + Torque label
    const ltm={ loctite:'243', torque:'8', leader:'arrow', curve:true, waypoints:[{x:50,y:50}], bx:60, by:40 };
    const r1=await sb.from('deployops_balloons').insert({ drawing_id:currentDrawing.id, page:currentPage, number:0, x_pct:55, y_pct:55, label:ltSerialize(ltm), color:ltColor('243'), mode:'loctorque', arrow_style:'none' }).select().single();
    ok('place Loctite label', !r1.error && r1.data); if (r1.data) made.push(r1.data.id);
    const back=r1.data?ltMeta(r1.data):{}; ok('Loctite payload round-trips', back.loctite==='243' && back.torque==='8' && back.curve===true && (back.waypoints||[]).length===1);
    // 2) place a steps table
    const r2=await sb.from('deployops_balloons').insert({ drawing_id:currentDrawing.id, page:currentPage, number:0, x_pct:20, y_pct:20, label:JSON.stringify({title:'Self-test',scale:0.9,rows:DEFAULT_STEP_ROWS}), color:'#0e7490', mode:'steptable', arrow_style:'none' }).select().single();
    ok('place steps table', !r2.error && r2.data); if (r2.data) made.push(r2.data.id);
    const sm=r2.data?stMeta(r2.data):{rows:[]}; ok('steps payload round-trips', sm.rows.length===DEFAULT_STEP_ROWS.length);
    // 3) spawn a balloon from a step row
    if (r2.data){
      await loadBalloons();
      await spawnFromStep(r2.data.id, 0);
      const spawned=balloons.find(b=>rowKey(b,r2.data.id,0));
      ok('spawn balloon from step row', !!spawned);
      ok('spawned balloon has a leader', !!spawned && spawned.tip_x_pct!=null);
      if (spawned) made.push(spawned.id);
      // 4) dedupe — spawning the same row again must NOT create a second balloon
      const n0=balloons.filter(b=>rowKey(b,r2.data.id,0)).length;
      await spawnFromStep(r2.data.id, 0); await loadBalloons();
      const n1=balloons.filter(b=>rowKey(b,r2.data.id,0)).length;
      ok('spawn dedupe (one balloon per row)', n1===n0);
    }
  } catch(err){ results.push('✗ exception: '+(err.message||err)); }
  // cleanup everything created
  let cleaned=0;
  for (const id of made){ try { await sb.from('deployops_balloons').delete().eq('id', id); cleaned++; } catch(e){} }
  await loadBalloons(); paintAnnotations();
  const pass=results.every(r=>r[0]==='✓');
  console.log('%cDeployOps annotation self-test — '+(pass?'ALL PASS':'FAILURES')+'\n'+results.join('\n')+'\nCleaned up '+cleaned+' test row(s).', 'font-family:monospace;font-size:12px');
  toast(pass?('Self-test passed ✓ ('+results.length+' checks)'):'Self-test FAILED — see console', pass?'ok':'err');
  return { pass, results };
}

// Leader geometry. Nodes are passed already in the caller's drawing space.
function clampPct(v){ return Math.max(1, Math.min(99, +(+v).toFixed(1))); }
function _splinePathD(p){
  if (p.length < 2) return '';
  if (p.length === 2) return 'M '+p[0].x+' '+p[0].y+' L '+p[1].x+' '+p[1].y;
  let d = 'M '+p[0].x+' '+p[0].y;
  for (let i=0;i<p.length-1;i++){
    const p0=p[i-1]||p[i], p1=p[i], p2=p[i+1], p3=p[i+2]||p[i+1];
    d += ' C '+(p1.x+(p2.x-p0.x)/6)+' '+(p1.y+(p2.y-p0.y)/6)+' '+(p2.x-(p3.x-p1.x)/6)+' '+(p2.y-(p3.y-p1.y)/6)+' '+p2.x+' '+p2.y;
  }
  return d;
}
function _bowPathD(a, b, capW){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
  const off=Math.min(len*0.3, (capW||1000)*0.2);
  return 'M '+a.x+' '+a.y+' Q '+(mx-dy/len*off)+' '+(my+dx/len*off)+' '+b.x+' '+b.y;
}
function leaderPathD(curve, pts, capW){
  if (!curve) return 'M '+pts.map(p=>p.x+' '+p.y).join(' L ');
  if (pts.length === 2) return _bowPathD(pts[0], pts[1], capW);
  return _splinePathD(pts);
}
// nodes in % (balloon centre → waypoints → tip) for bend insertion / hit math.
function leaderNodesPct(b, meta){
  return [{x:b.x_pct, y:b.y_pct}, ...((meta&&meta.waypoints)||[]), {x:b.tip_x_pct, y:b.tip_y_pct}];
}
function longestSegPct(nodes){
  let bi=0, best=-1;
  for (let i=0;i<nodes.length-1;i++){
    const d=Math.hypot(nodes[i+1].x-nodes[i].x, nodes[i+1].y-nodes[i].y);
    if (d>best){ best=d; bi=i; }
  }
  const a=nodes[bi], b=nodes[bi+1];
  return { bi, a, b, mx:(a.x+b.x)/2, my:(a.y+b.y)/2, len:best };
}
async function persistLeaderRoute(b, curve, waypoints){
  if (b.mode === 'loctorque'){
    const m = ltMeta(b); m.curve = curve; m.waypoints = waypoints; b.label = ltSerialize(m);
    paintAnnotations();
    try { await sb.from('deployops_balloons').update({ label: b.label }).eq('id', b.id); }
    catch(e){ console.error(e); toast('Save failed','err'); }
    return;
  }
  const meta = balloonMeta(b);
  b.label = serializeBalloonLabel(meta.text, curve, waypoints, meta._extra);
  renderBalloonsSVG();
  try { await sb.from('deployops_balloons').update({ label: b.label }).eq('id', b.id); }
  catch(e){ console.error(e); toast('Save failed','err'); }
}
async function toggleLeaderCurve(bid){
  const b = balloons.find(x=>x.id===bid); if (!b) return;
  const rt = leaderRouteOf(b);
  await persistLeaderRoute(b, !rt.curve, rt.waypoints);
}
async function addLeaderBend(bid){
  const b = balloons.find(x=>x.id===bid); if (!b) return;
  const rt = leaderRouteOf(b); if (rt.tip.x==null) return;
  const { bi, a, b:bb, mx, my, len } = longestSegPct([rt.start, ...rt.waypoints, rt.tip]);
  const dx=bb.x-a.x, dy=bb.y-a.y, L=len||1, off=Math.min(14, L*0.28);
  const wps = rt.waypoints.slice();
  wps.splice(bi, 0, { x: clampPct(mx - dy/L*off), y: clampPct(my + dx/L*off) });
  await persistLeaderRoute(b, true, wps);
}
async function deleteLeaderBend(bid, i){
  const b = balloons.find(x=>x.id===bid); if (!b) return;
  const rt = leaderRouteOf(b);
  await persistLeaderRoute(b, rt.curve, rt.waypoints.filter((_,k)=>k!==i));
}
function startWaypointDrag(e){
  if (e.button !== 0 || dwgSpaceHeld) return;
  e.preventDefault(); e.stopPropagation();
  isDragging = false;
  const g = e.currentTarget, bid = g.dataset.id, i = +g.dataset.i;
  const b = balloons.find(x=>x.id===bid); if (!b) return;
  const img = document.getElementById('drawingImg'); if (!img) return;
  const onMove = (ev) => {
    ev.preventDefault(); isDragging = true;
    const rect = img.getBoundingClientRect();
    const x = clampPct(((ev.clientX-rect.left)/rect.width)*100);
    const y = clampPct(((ev.clientY-rect.top)/rect.height)*100);
    if (b.mode === 'loctorque'){ const m = ltMeta(b); const wps=(m.waypoints||[]).slice(); wps[i]={x,y}; m.curve=true; m.waypoints=wps; b.label=ltSerialize(m); }
    else { const meta = balloonMeta(b); const wps=(meta.waypoints||[]).slice(); wps[i]={x,y}; b.label=serializeBalloonLabel(meta.text, true, wps, meta._extra); }
    g._dirty = true;
    renderBalloonsSVG();
  };
  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging && g._dirty){
      try { await sb.from('deployops_balloons').update({ label: b.label }).eq('id', bid); }
      catch(err){ console.error(err); }
    }
    setTimeout(()=>{ isDragging=false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

  pre_test_qc:    { icon: '🧪', label: 'Pre-Test QC',    short: 'Pre-Test' },
  pre_deploy:     { icon: '📦', label: 'Pre-Deploy',     short: 'Pre-Deploy' },
};
// Normalised phase list for an item (array col preferred, single-col fallback).
function itemPhases(it) {
  const p = it && it.phases;
  if (Array.isArray(p) && p.length) return p;
  return [(it && it.phase) || 'pre_install_qc'];
}
function itemInPhase(it, phase) { return itemPhases(it).includes(phase); }

// AUTH

function initAuth() {
  const stored = localStorage.getItem('deployops_token');
  if (stored) {
    try {
      const cred = JSON.parse(stored);
      if (!cred.expMs || cred.expMs <= Date.now()) {
        localStorage.removeItem('deployops_token');
      } else {
        setUser(cred);
      }
    } catch(e) { localStorage.removeItem('deployops_token'); }
  }
}

function handleLogin() {
  if (typeof google === 'undefined') { toast('Google Sign-In not loaded yet','err'); return; }
  google.accounts.id.initialize({
    client_id: GIS_CLIENT_ID,
    callback: (resp) => {
      const payload = JSON.parse(atob(resp.credential.split('.')[1]));
      const SESSION_HOURS = 12;
      const cred = { email: payload.email, name: payload.name, picture: payload.picture,
                     expMs: Date.now() + SESSION_HOURS * 3600 * 1000 };
      localStorage.setItem('deployops_token', JSON.stringify(cred));
      setUser(cred);
      toast('Signed in as ' + cred.name, 'ok');
    }
  });
  google.accounts.id.prompt((n) => {
    if (n.isNotDisplayed() || n.isSkippedMoment()) {
      google.accounts.id.renderButton(document.createElement('div'), { theme: 'outline' });
      google.accounts.id.prompt();
    }
  });
}

function handleLogout() {
  localStorage.removeItem('deployops_token');
  currentUser = null; isAdmin = false;
  document.getElementById('loginArea').style.display = '';
  document.getElementById('userBadge').style.display = 'none';
  document.body.classList.remove('is-admin');
  toast('Signed out','info');
}

function setUser(cred) {
  currentUser = cred;
  isAdmin = ADMIN_EMAILS.includes(cred.email);
  document.getElementById('loginArea').style.display = 'none';
  document.getElementById('userBadge').style.display = 'flex';
  document.getElementById('userName').textContent = cred.name;
  if (isAdmin) document.body.classList.add('is-admin');
  else document.body.classList.remove('is-admin');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + 'Tab').classList.add('active');
  document.body.dataset.tab = tab;
  if (tab === 'models')   renderModels();
  if (tab === 'drawing')  renderDrawing();
  if (tab === 'deploy')   { deployLoadedFor = null; renderDeploy(); } // reload — items may have changed in Models tab
}

const DRAWING_UNCATEGORIZED = 'Uncategorized';

// Display label for a drawing's folder (NULL/blank → "Uncategorized").
function drawingFolderName(d) {
  return (d.folder && d.folder.trim()) ? d.folder.trim() : DRAWING_UNCATEGORIZED;
}

// Folder autocomplete suggestions for the upload / edit dialogs: the union of
// existing drawing-folder names and model names (English canonical — folders
// align to models by a one-tap pick). Suggestion-only — the input stays free
// text, so brand-new folder names still work. Trimmed, deduped, blanks and the
// "Uncategorized" sentinel excluded, sorted.
function folderSuggestions() {
  const fromDrawings = drawings.map(d => d.folder && d.folder.trim()).filter(Boolean);
  const fromModels = models.map(m => m.name && m.name.trim()).filter(Boolean);
  return [...new Set([...fromDrawings, ...fromModels])]
    .filter(n => n && n !== DRAWING_UNCATEGORIZED)
    .sort((a, b) => a.localeCompare(b));
}

// Renders either the folder grid (drawingFolder === null) or the list of
// drawings inside one folder. Mirrors the checklist-section folder grid so
// it looks native and works on mobile.
function renderDrawingFolderView(el) {
  const lang = getUiLang();
  const groups = {};
  drawings.forEach(d => {
    const f = drawingFolderName(d);
    (groups[f] = groups[f] || []).push(d);
  });
  // Real folders first (alpha), Uncategorized last.
  const folderNames = Object.keys(groups).sort((a, b) => {
    if (a === DRAWING_UNCATEGORIZED) return 1;
    if (b === DRAWING_UNCATEGORIZED) return -1;
    return a.localeCompare(b);
  });

  if (drawingFolder === null) {
    let html = `<div class="cl-section-header" style="margin-bottom:16px">
        <h2 style="font-size:18px;flex:1">📐 Drawings</h2>
      </div>`;
    html += `<div class="folder-grid">`;
    folderNames.forEach(f => {
      html += `
        <div class="folder-card" data-folder="${esc(f)}" onclick="openDrawingFolder(this.dataset.folder)">
          <span class="folder-count">${groups[f].length}</span>
          <div class="folder-icon">📁</div>
          <div class="folder-name">${esc(f)}</div>
        </div>`;
    });
    // Admin-only contextual upload entry point — reuses the topbar upload flow
    // (no default folder). Hidden for non-admins via .admin-only (RLS also gates).
    html += `
        <div class="folder-card upload-card admin-only" onclick="triggerPDFFilePicker()" title="${esc(tr(lang, 'dwUploadPdf'))}">
          <div class="folder-icon">＋</div>
          <div class="folder-name">${esc(tr(lang, 'dwUploadPdf'))}</div>
        </div>`;
    html += `</div>`;
    if (folderNames.length === 0) {
      html += `<p style="color:var(--text2);font-size:13px;margin-top:14px">No drawings yet. Use <b>📤 Upload PDF</b> to add one.</p>`;
    }
    el.innerHTML = html;
    return;
  }

  // Inside a folder: list its drawings as cards.
  const list = groups[drawingFolder] || [];
  let html = `<button class="back-btn" onclick="backToDrawingFolders()">← Folders</button>
    <div class="cl-section-header" style="margin-bottom:16px">
      <h2 style="font-size:18px;flex:1">📁 ${esc(drawingFolder)}</h2>
      <button class="btn btn-primary btn-sm admin-only" onclick="uploadToCurrentFolder()" title="${esc(tr(lang, 'dwUploadToFolder'))}">＋ ${esc(tr(lang, 'dwUploadToFolder'))}</button>
      <span class="badge badge-blue">${list.length}</span>
    </div>`;
  if (list.length === 0) {
    html += `<div class="empty"><div class="icon">📐</div><p>This folder is empty.</p></div>`;
  } else {
    html += `<div class="folder-grid">`;
    list.forEach(d => {
      const pc = d.page_count || 0;
      html += `
        <div class="folder-card" data-id="${esc(d.id)}" onclick="selectDrawing(this.dataset.id)">
          <span class="folder-count">${pc}p</span>
          <button class="edit-icon-btn admin-only" data-id="${esc(d.id)}" onclick="event.stopPropagation();showEditDrawing(this.dataset.id)" title="Edit drawing">✏</button>
          <div class="folder-icon">📄</div>
          <div class="folder-name">${esc(d.drawing_ref)}</div>
          <div style="font-size:11px;color:var(--text2);text-transform:none;letter-spacing:0;font-weight:400">${esc(pickField(d, 'name', lang))}</div>
        </div>`;
    });
    html += `</div>`;
  }
  el.innerHTML = html;
}

async function saveEditDrawing(id) {
  const name = document.getElementById('edDrawingName').value.trim();
  const folderRaw = document.getElementById('edDrawingFolder').value.trim();
  if (!name) { toast('Drawing name is required', 'err'); return; }
  const folder = folderRaw || null;
  try {
    const { error } = await sb.from('deployops_drawings').update({ name, folder }).eq('id', id);
    if (error) throw error;
    closeModal();
    toast('Drawing updated', 'ok');
    await loadDrawings();
    // Keep the open viewer / current folder in sync with the edit.
    if (currentDrawing && currentDrawing.id === id) currentDrawing = drawings.find(d => d.id === id) || null;
    renderDrawing();
  } catch (e) {
    console.error(e);
    toast('Update failed: ' + (e.message || e.statusText || JSON.stringify(e)), 'err');
  }
}

function triggerPDFFilePicker(defaultFolder = null) {
  // Carry an optional default folder through the native file-picker dialog to
  // handlePDFUpload. The "Uncategorized" sentinel is not a real folder, so it
  // never becomes a default.
  pendingUploadFolder = (defaultFolder && defaultFolder !== DRAWING_UNCATEGORIZED) ? defaultFolder : null;
  const input = document.getElementById('pdfInput');
  input.value = '';
  input.click();
}

// "Upload to this folder" — opens the upload modal pre-filled to the folder
// currently being browsed (still editable in the modal).
function uploadToCurrentFolder() { triggerPDFFilePicker(drawingFolder); }

function handlePDFUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const ref = file.name.replace(/\.pdf$/i, '');
  const name = ref.replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim();

  window._pendingPDF = file;

  showModal(`
    <h3>📤 Confirm Upload</h3>
    <p style="color:var(--muted);font-size:12px;margin:0 0 10px">File: <span id="upFilename"></span></p>
    <label>Drawing Reference (Part Number)</label>
    <input id="upRef">
    <label>Drawing Name</label>
    <input id="upName">
    <label>Folder (optional — leave blank for Uncategorized)</label>
    <input id="upFolder" list="upFolderOptions" placeholder="Uncategorized">
    <datalist id="upFolderOptions">${folderSuggestions().map(f => `<option value="${esc(f)}">`).join('')}</datalist>
    <div class="modal-actions">
      <button class="btn" onclick="cancelPDFUpload()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmPDFUpload()">Confirm Upload</button>
    </div>
  `);
  document.getElementById('upFilename').textContent = file.name;
  document.getElementById('upRef').value = ref;
  document.getElementById('upName').value = name;
  // Pre-fill from the explicit per-invocation default (set by triggerPDFFilePicker).
  // Topbar upload passes none, so it never defaults a folder.
  if (pendingUploadFolder) document.getElementById('upFolder').value = pendingUploadFolder;
}

function cancelPDFUpload() {
  window._pendingPDF = null;
  closeModal();
}

async function confirmPDFUpload() {
  const ref = document.getElementById('upRef').value.trim();
  const name = document.getElementById('upName').value.trim();
  const folder = document.getElementById('upFolder').value.trim() || null;
  if (!ref || !name) { toast('Fill in both fields','err'); return; }
  const file = window._pendingPDF;
  if (!file) { toast('No file selected','err'); return; }
  window._pendingPDF = null;
  closeModal();

  toast('Converting PDF to images...','info');

  try {
    const arrayBuf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    const pageCount = pdf.numPages;

    // Create drawing record
    const { data: drawingRow, error: dbErr } = await sb.from('deployops_drawings').insert({
      drawing_ref: ref, name, page_count: pageCount, folder,
      uploaded_by: currentUser?.email || 'unknown'
    }).select().single();
    if (dbErr) throw dbErr;

    // Convert each page to PNG and upload
    for (let i = 1; i <= pageCount; i++) {
      toast(`Processing page ${i}/${pageCount}...`,'info');
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 2.5 });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const path = `${ref}/page_${i}.png`;
      const { error: stErr } = await sb.storage.from('deployops-drawings').upload(path, blob, { contentType: 'image/png', upsert: true });
      if (stErr) throw stErr;
    }

    toast(`Drawing "${ref}" uploaded (${pageCount} pages)`,'ok');
    await loadDrawings();
    document.getElementById('drawingSelect').value = drawingRow.id;
    selectDrawing(drawingRow.id); // open the freshly uploaded drawing in the viewer
  } catch(e) {
    console.error(e);
    toast('Upload failed: ' + (e.message || e.statusText || JSON.stringify(e)),'err');
  }
}

function getPageURL(pageNum) {
  if (!currentDrawing) return '';
  const path = `${currentDrawing.drawing_ref}/page_${pageNum}.png`;
  const { data } = sb.storage.from('deployops-drawings').getPublicUrl(path);
  // Cache-bust after page deletion: pages get shifted in storage but the URL stays the
  // same, so the browser would serve the old image. The bumped stamp forces a fresh fetch.
  const bust = drawingCacheBust[currentDrawing.id];
  return bust ? `${data.publicUrl}?v=${bust}` : data.publicUrl;
}

// Toolbar pill / layer name → focus: make this the active tool AND isolate the
// visible-set to just this layer (+ its companions) for clean placing.
function setCurrentMode(m) { focusLayer(m); }

function focusLayer(m) {
  currentMode = m;
  const show = new Set([m, ...(COMPANION[m] || [])]);
  VISIBLE_LAYERS.forEach(k => { layerVis[k] = show.has(k); });
  saveLayerVis();
  selectedBalloonId = null;
  refreshDrawingChrome();
}

// Independent eye toggle — flips one layer without changing the active tool.
function toggleLayer(m) {
  layerVis[m] = layerVis[m] === false ? true : false;
  saveLayerVis();
  refreshDrawingChrome();
}

function showAllLayers() {
  VISIBLE_LAYERS.forEach(m => { layerVis[m] = true; });
  saveLayerVis();
  refreshDrawingChrome();
}

// Re-paint toolbar/sidebar/SVG in place (preserves the loaded drawing image).
function refreshDrawingChrome() {
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.toggle('active', p.dataset.mode === currentMode));
  const btn = document.getElementById('balloonModeBtn');
  if (btn && balloonMode !== 'add') btn.innerHTML = '➕ Add ' + MODES[currentMode].label;
  const hint = document.getElementById('armedHint');
  if (hint) {
    if (armedNote) { hint.style.display = ''; hint.innerHTML = `📌 Armed note: <b>${esc(armedNote)}</b> — click the drawing to drop it. <button class="btn btn-sm" onclick="disarmNote()">Cancel</button>`; }
    else hint.style.display = 'none';
  }
  const side = document.querySelector('.drawing-sidebar');
  if (side) side.innerHTML = renderDrawingSidebar();
  paintAnnotations();
}

function setMarkerSize(v) {
  markerSize = parseFloat(v) || 1;
  localStorage.setItem('deployops_balloon_size', String(markerSize));
  const val = document.getElementById('markerSizeVal');
  if (val) val.textContent = Math.round(markerSize * 100) + '%';
  renderBalloonsSVG();
}

// ── Note templates ──
function armNoteText(t) {
  if (!isAdmin) return; // arming only matters for placement (admin)
  armedNote = t;
  currentMode = 'note';
  balloonMode = 'add';
  if (layerVis.note === false) { layerVis.note = true; saveLayerVis(); }
  toast('Note armed — click the drawing to place','info');
  renderDrawing(); // balloonMode changed → rebuild toolbar chrome
}
function armNoteTemplate(i) {
  const tpls = loadNoteTemplates();
  if (tpls[i] != null) armNoteText(tpls[i]);
}
function disarmNote() { armedNote = null; renderDrawing(); }
function addNoteTemplate() {
  const inp = document.getElementById('tplInput');
  const t = (inp && inp.value || '').trim();
  if (!t) { toast('Enter template text','err'); return; }
  const tpls = loadNoteTemplates();
  if (!tpls.includes(t)) tpls.push(t);
  saveNoteTemplates(tpls);
  refreshDrawingChrome();
  toast('Template saved','ok');
}
function deleteNoteTemplate(i) {
  const tpls = loadNoteTemplates();
  const removed = tpls[i];
  tpls.splice(i, 1);
  saveNoteTemplates(tpls);
  if (armedNote === removed) armedNote = null;
  refreshDrawingChrome();
}
function saveLabelAsTemplate(text) {
  const t = (text || '').trim();
  if (!t) { toast('Nothing to save','err'); return; }
  const tpls = loadNoteTemplates();
  if (!tpls.includes(t)) { tpls.push(t); saveNoteTemplates(tpls); toast('Saved as template','ok'); }
  else toast('Already a template','info');
}

function updateModePillCounts() {
  const counts = {};
  Object.keys(MODES).forEach(k => counts[k] = 0);
  balloons.filter(b => b.page === currentPage).forEach(b => {

function onDrawingLoad() {
  paintAnnotations();
  const svg = document.getElementById('balloonSvg');
  if (svg && isAdmin) {
    svg.onclick = handleDrawingClick;
  }
  // Set aspect ratio on the container so print can scale it uniformly to fit the page
  const img = document.getElementById('drawingImg');
  const container = document.getElementById('drawingContainer');

    container.style.aspectRatio = `${img.naturalWidth} / ${img.naturalHeight}`;
  }
  initDrawingZoom();

// ============================================================
// ZOOM + PAN  (CSS transform on the wrapper holding img + svg, so balloons
// stay anchored. getBoundingClientRect on the img already reflects the
// transform, so click-to-place math needs no change — see handleDrawingClick.)
// ============================================================
let dwgZoom = 1, dwgPanX = 0, dwgPanY = 0;
let dwgSpaceHeld = false, dwgPanning = false;
const DWG_ZOOM_MIN = 1, DWG_ZOOM_MAX = 8;

function dwgEls() {
  return {
    wrap: document.getElementById('dwgZoomWrap'),
    container: document.getElementById('drawingContainer'),
  };
}

function applyDwgTransform() {
  const { wrap, container } = dwgEls();
  if (!wrap || !container) return;
  const identity = dwgZoom === 1 && dwgPanX === 0 && dwgPanY === 0;
  // At identity, keep native scrolling (overflow:auto) so tall images still scroll
  // exactly as before. Once zoomed/panned, switch to transform-driven view.
  container.style.overflow = identity ? 'auto' : 'hidden';
  wrap.style.transform = `translate(${dwgPanX}px, ${dwgPanY}px) scale(${dwgZoom})`;
  container.classList.toggle('pan-ready', dwgSpaceHeld && !dwgPanning);
  const lvl = document.getElementById('zoomLevel');
  if (lvl) lvl.textContent = Math.round(dwgZoom * 100) + '%';
}

function clampDwgPan() {
  const { wrap, container } = dwgEls();
  if (!wrap || !container) return;
  const contW = container.clientWidth, contH = container.clientHeight;
  const dispW = wrap.offsetWidth * dwgZoom, dispH = wrap.offsetHeight * dwgZoom;
  dwgPanX = dispW <= contW ? (contW - dispW) / 2 : Math.min(0, Math.max(contW - dispW, dwgPanX));
  dwgPanY = dispH <= contH ? (contH - dispH) / 2 : Math.min(0, Math.max(contH - dispH, dwgPanY));
}

// Zoom toward a point given in viewport client coords, keeping that point fixed.
function dwgZoomAt(clientX, clientY, factor) {
  const { container } = dwgEls();
  if (!container) return;
  const newZoom = Math.min(DWG_ZOOM_MAX, Math.max(DWG_ZOOM_MIN, dwgZoom * factor));
  if (newZoom === dwgZoom) return;
  const rect = container.getBoundingClientRect();
  const cx = clientX - rect.left, cy = clientY - rect.top;
  const f = newZoom / dwgZoom;
  dwgPanX = cx - f * (cx - dwgPanX);
  dwgPanY = cy - f * (cy - dwgPanY);
  dwgZoom = newZoom;
  clampDwgPan();
  applyDwgTransform();
}

// Toolbar +/− : zoom about the container centre.
function zoomBy(factor) {
  const { container } = dwgEls();
  if (!container) return;
  const rect = container.getBoundingClientRect();
  dwgZoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, factor);
}

function resetZoom() {
  dwgZoom = 1; dwgPanX = 0; dwgPanY = 0;
  applyDwgTransform();
}

function initDrawingZoom() {
  dwgZoom = 1; dwgPanX = 0; dwgPanY = 0; dwgPanning = false;
  const { wrap, container } = dwgEls();
  if (!container || !wrap) return;
  applyDwgTransform();

  // Wheel = zoom at cursor. At min zoom, let a downward wheel scroll the
  // container natively (so tall images still scroll as before).
  container.onwheel = (e) => {
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    if (factor < 1 && dwgZoom <= DWG_ZOOM_MIN) return;
    e.preventDefault();
    dwgZoomAt(e.clientX, e.clientY, factor);
  };

  // Pan with middle-mouse, or Space + left-drag, so a normal click still places/selects.
  container.onpointerdown = (e) => {
    const panBtn = e.button === 1 || (e.button === 0 && dwgSpaceHeld);
    if (!panBtn) return;
    e.preventDefault();
    dwgPanning = true;
    container.classList.add('panning');
    let lastX = e.clientX, lastY = e.clientY;
    const onMove = (ev) => {
      ev.preventDefault();
      dwgPanX += ev.clientX - lastX;
      dwgPanY += ev.clientY - lastY;
      lastX = ev.clientX; lastY = ev.clientY;
      clampDwgPan();
      applyDwgTransform();
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      container.classList.remove('panning');
      // Defer clearing so the synthetic click after a Space-drag doesn't place a marker.
      setTimeout(() => { dwgPanning = false; }, 0);
      applyDwgTransform();
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  };
}

// Space toggles pan-ready (global, bound once). Ignored while typing in a field.
function dwgKeyHandler() {
  document.addEventListener('keydown', (e) => {
    if (e.code !== 'Space' || dwgSpaceHeld) return;
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (!document.getElementById('dwgZoomWrap')) return;
    dwgSpaceHeld = true;
    e.preventDefault(); // stop page scroll while arming pan
    applyDwgTransform();
  });
  document.addEventListener('keyup', (e) => {
    if (e.code !== 'Space') return;
    dwgSpaceHeld = false;
    applyDwgTransform();
  });
}
dwgKeyHandler();

function changePage(delta) {
  const np = currentPage + delta;
  if (np < 1 || np > currentDrawing.page_count) return;
  currentPage = np;
  renderDrawing();
}

function toggleBalloonMode() {
  balloonMode = balloonMode === 'add' ? 'select' : 'add';
  selectedBalloonId = null;
  renderDrawing();
}

function toggleFullscreen() {
  isFullscreen = !isFullscreen;
  const area = document.querySelector('.drawing-area');
  if (area) area.classList.toggle('fullscreen-mode', isFullscreen);
  document.body.classList.toggle('is-fullscreen', isFullscreen);
  const btn = document.getElementById('fullscreenBtn');
  if (btn) btn.innerHTML = isFullscreen ? '✕ Exit Fullscreen' : '⛶ Fullscreen';
}

async function handleDrawingClick(e) {
  if (isDragging || dwgPanning) return;
  const svg = document.getElementById('balloonSvg');
  const img = document.getElementById('drawingImg');
  if (!img || !svg) return;

  // Check if click was on a balloon or its tip
  if (e.target.closest('.tip-handle')) return; // tip handles its own drag
  if (e.target.closest('.add-leader')) return; // "+" affordance handles its own click
  if (e.target.closest('.dwg-table-g')) return; // table cards drag / button themselves
  if (e.target.closest('.balloon-g')) {
    const g = e.target.closest('.balloon-g');
    const bid = g.dataset.id;
    if (balloonMode === 'select') {
      selectedBalloonId = selectedBalloonId === bid ? null : bid;
      paintAnnotations();
      if (selectedBalloonId) showBalloonActions(bid);
    }
    return;
  }

  // Armed on-drawing widgets (Loctite label / steps table) — place at click.
  if (armedLT || armedSteps) {
    const rect = img.getBoundingClientRect();
    const x_pct = ((e.clientX - rect.left) / rect.width) * 100;
    const y_pct = ((e.clientY - rect.top) / rect.height) * 100;
    if (armedLT) { armedLT = false; await placeLoctite(x_pct, y_pct); }
    else { armedSteps = false; await placeStepsTable(x_pct, y_pct); }
    refreshDrawingChrome();
    return;
  }

  if (balloonMode !== 'add') { selectedBalloonId = null; paintAnnotations(); return; }

  // Marker lands exactly where the user clicks. No auto-margin callout and no
  // leader by default — a leader is opt-in afterward (the "+" affordance on the
  // selected marker seeds a tip, then it's dragged into place). getBoundingClientRect
  // already reflects any zoom/pan transform, so this stays accurate at every zoom.
  const rect = img.getBoundingClientRect();
  const x_pct = ((e.clientX - rect.left) / rect.width) * 100;
  const y_pct = ((e.clientY - rect.top) / rect.height) * 100;

  const isCable = MODES[currentMode].kind === 'tag';
  // Each mode gets independent numbering, scoped to the current page
  const sameModeOnPage = balloons.filter(b => b.page === currentPage && (b.mode||'balloon') === currentMode);
  const nextNum = sameModeOnPage.length > 0
    ? Math.max(...sameModeOnPage.map(b => b.number||0)) + 1 : 1;

  // Armed note template — drop a note prefilled with the armed text, no modal.
  if (armedNote != null) {
    const text = armedNote;
    armedNote = null;
    const { error } = await sb.from('deployops_balloons').insert({
      drawing_id: currentDrawing.id, page: currentPage, number: nextNum,
      x_pct, y_pct,
      label: text, color: markerColor('note', nextNum), mode: 'note', arrow_style: 'none'
    });
    if (error) { toast('Save failed: '+error.message,'err'); armedNote = text; return; }
    toast('Note placed','ok');
    await loadBalloons();
    renderDrawing(); // refresh the armed-hint + sidebar chip state
    return;
  }

  // Non-cable balloons: place directly without a modal. Number/label/color/arrow can be tweaked
  // afterward by clicking the balloon to open the edit modal.
  if (!isCable) {
    const { error } = await sb.from('deployops_balloons').insert({
      drawing_id: currentDrawing.id, page: currentPage,
      number: nextNum,
      x_pct, y_pct,
      label: '', color: markerColor(currentMode, nextNum), mode: currentMode,
      arrow_style: 'none'
    });
    if (error) { toast('Save failed: '+error.message,'err'); return; }
    toast(`${MODES[currentMode].label} placed`,'ok');
    await loadBalloons();
    renderBalloonsSVG();
    return;
  }

  showModal(`
    <h3>Add ${MODES[currentMode].label}</h3>
    ${isCable
      ? `<label>Tag Text</label><input id="bLabel" placeholder="e.g. CN-12, MAIN-A" autofocus>`
      : `<label>Number</label><input id="bNum" type="number" value="${nextNum}" autofocus>
         <label>Label (optional)</label><input id="bLabel" placeholder="e.g. SignalTowerASSY">`}
    <label>Color</label>
    <select id="bColor">
      <option value="${MODES[currentMode].color}">${MODES[currentMode].label} (default)</option>
      <option value="#e74c3c">🔴 Red</option>
      <option value="#2980b9">🔵 Blue</option>
      <option value="#27ae60">🟢 Green</option>
      <option value="#e67e22">🟠 Orange</option>
      <option value="#9b59b6">🟣 Purple</option>
      <option value="#fbbf24">🟡 Yellow</option>
      <option value="#22d3ee">🔷 Cyan</option>
      <option value="#111">⚫ Black</option>
    </select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBalloon(${x_pct},${y_pct})">Place</button>
    </div>
  `);
}

async function saveBalloon(x, y) {
  const isCable = MODES[currentMode].kind === 'tag';
  let num;
  if (isCable) {
    // Auto-increment silently for internal tracking — number is not displayed on the tag
    const cableNums = balloons.filter(b => (b.mode||'balloon') === 'cable').map(b => b.number || 0);
    num = cableNums.length ? Math.max(...cableNums) + 1 : 1;
  } else {
    num = parseInt(document.getElementById('bNum').value);
  }
  const label = document.getElementById('bLabel').value.trim();
  const color = document.getElementById('bColor').value;
  if (!isCable && isNaN(num)) { toast('Enter a number','err'); return; }
  if (isCable && !label) { toast('Enter tag text','err'); return; }
  closeModal();

  // No leader by default — added on demand afterward via the "+" affordance.
  const { error } = await sb.from('deployops_balloons').insert({
    drawing_id: currentDrawing.id, page: currentPage,
    number: num, x_pct: x, y_pct: y,
    label, color, mode: currentMode, arrow_style: 'none'
  });
  if (error) { toast('Save failed: '+error.message,'err'); return; }
  toast(`${MODES[currentMode].label} placed`,'ok');
  await loadBalloons();
  renderBalloonsSVG();
}

function showBalloonActions(bid) {
  const b = balloons.find(x => x.id === bid);
  if (!b) return;
  const isCable = (b.mode||'balloon') === 'cable';
  const curStyle = b.arrow_style || (b.tip_x_pct!=null?'solid':'none');
  showModal(`
    <h3>Edit ${MODES[b.mode||'balloon']?.label || 'Balloon'}</h3>
    ${isCable
      ? `<label>Tag Text</label><input id="ebLabel" value="${esc(balloonText(b))}">`
      : `<label>Number</label><input id="ebNum" type="number" value="${b.number||''}">
         <label>Label</label><input id="ebLabel" value="${esc(balloonText(b))}">`}
    <label>Color</label>
    <select id="ebColor">
      <option value="#e74c3c" ${b.color==='#e74c3c'?'selected':''}>🔴 Red</option>
      <option value="#2980b9" ${b.color==='#2980b9'?'selected':''}>🔵 Blue</option>
      <option value="#27ae60" ${b.color==='#27ae60'?'selected':''}>🟢 Green</option>
      <option value="#e67e22" ${b.color==='#e67e22'?'selected':''}>🟠 Orange</option>
      <option value="#9b59b6" ${b.color==='#9b59b6'?'selected':''}>🟣 Purple</option>
      <option value="#fbbf24" ${b.color==='#fbbf24'?'selected':''}>🟡 Yellow</option>
      <option value="#22d3ee" ${b.color==='#22d3ee'?'selected':''}>🔷 Cyan</option>
      <option value="#111" ${b.color==='#111'?'selected':''}>⚫ Black</option>
    </select>
    ${(b.tip_x_pct != null && b.tip_y_pct != null) ? `
    <label>Leader Arrow <span style="text-transform:none;letter-spacing:0;color:var(--text2);font-weight:400">(pick “none” to remove)</span></label>
    <div class="arrow-style-row" id="arrowStyleRowEdit">
      ${ARROW_STYLES.map(s=>`<button type="button" class="arrow-style-btn ${s===curStyle?'active':''}" data-style="${s}" onclick="document.querySelectorAll('#arrowStyleRowEdit .arrow-style-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">${s}</button>`).join('')}
    </div>` : `
    <label>Leader Arrow</label>
    <button type="button" class="btn btn-sm" onclick="closeModal();addLeader('${bid}')">➕ Add leader arrow</button>`}
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteBalloon('${bid}')">🗑️ Delete</button>
      ${(b.mode==='note'||b.mode==='caution') ? `<button class="btn btn-sm" onclick="saveLabelAsTemplate(document.getElementById('ebLabel').value)" title="Save this text as a reusable note template">⭐ Save as template</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateBalloon('${bid}',${isCable})">Save</button>
    </div>
  `);
}

async function updateBalloon(bid, isCable) {
  let num;
  if (isCable) {
    // Preserve the silently-assigned number — the field is not exposed in the edit modal
    const existing = balloons.find(x => x.id === bid);
    num = existing ? existing.number : null;
  } else {
    num = parseInt(document.getElementById('ebNum').value);
  }
  const labelText = document.getElementById('ebLabel').value.trim();
  const color = document.getElementById('ebColor').value;
  const styleEl = document.querySelector('#arrowStyleRowEdit .arrow-style-btn.active');
  const arrow_style = styleEl ? styleEl.dataset.style : 'none';
  closeModal();
  const _b = balloons.find(x => x.id === bid);
  const _meta = _b ? balloonMeta(_b) : { curve:false, waypoints:[] };
  const label = serializeBalloonLabel(labelText, _meta.curve, _meta.waypoints);
  const patch = { number: num, label, color, arrow_style };
  // Removing the leader (style → none) also clears the tip so no orphan coords linger.
  if (arrow_style === 'none') { patch.tip_x_pct = null; patch.tip_y_pct = null; }
  await sb.from('deployops_balloons').update(patch).eq('id', bid);
  toast('Updated','ok');
  await loadBalloons();
  renderBalloonsSVG();
}

async function deleteBalloon(bid) {
  closeModal();
  await sb.from('deployops_balloons').delete().eq('id', bid);
  toast('Balloon deleted','ok');
  selectedBalloonId = null;
  await loadBalloons();
  renderBalloonsSVG();
}

async function loadBalloons() {
  if (!currentDrawing) { balloons = []; return; }
  const { data } = await sb.from('deployops_balloons').select('*').eq('drawing_id', currentDrawing.id).order('number');
  balloons = data || [];
}

// Compute the point where the line from (cx,cy) toward (tx,ty) exits an
// axis-aligned rectangle of size w x h centered at (cx,cy). Used to clip
// cable-tag leader arrows so they meet the rectangle edge cleanly.
function rectEdgePoint(cx, cy, w, h, tx, ty) {
  const dx = tx - cx, dy = ty - cy;
  if (dx === 0 && dy === 0) return [cx, cy];
  const tX = dx !== 0 ? (w/2) / Math.abs(dx) : Infinity;
  const tY = dy !== 0 ? (h/2) / Math.abs(dy) : Infinity;
  const t = Math.min(tX, tY);
  return [cx + dx * t, cy + dy * t];
}

function labelTag(x, y, label){
  return `<text x="${x}" y="${y}" text-anchor="middle" fill="white" font-size="7" font-family="DM Sans,sans-serif" opacity="0.9" stroke="rgba(0,0,0,0.5)" stroke-width="2" paint-order="stroke">${label}</text>`;
}

// Render a placed reference table as a draggable SVG card. (x0,y0) = top-left.
function renderTableCardSVG(b, x0, y0, vbW) {
  let meta = {};
  try { meta = JSON.parse(b.label || '{}'); } catch {}
  const title = esc(meta.title || 'Table');
  const rows = Array.isArray(meta.rows) ? meta.rows : [];
  const scale = (+meta.scale) || 1;
  const colW = [70 * scale, 55 * scale, 70 * scale]; // Hex bit | Screw | Torque
  const W = colW[0] + colW[1] + colW[2];
  const rh = 15 * scale, barH = 16 * scale, fs = 9 * scale;
  const x1 = x0 + colW[0], x2 = x1 + colW[1];
  const hA = y0 + barH;          // header row A top
  const hB = hA + rh;            // header row B top
  const dataTop = hB + rh;       // data rows top
  const H = barH + rh * 2 + rows.length * rh;
  let s = `<g class="dwg-table-g" data-id="${b.id}">`;
  // card + outer border
  s += `<rect x="${x0}" y="${y0}" width="${W}" height="${H}" rx="${3*scale}" fill="white" stroke="#94a3b8" stroke-width="${1*scale}"/>`;
  // drag bar
  s += `<g class="table-drag" data-id="${b.id}"><rect x="${x0}" y="${y0}" width="${W}" height="${barH}" rx="${3*scale}" fill="#e2e8f0"/>
    <text x="${x0 + 5*scale}" y="${y0 + barH/2}" dominant-baseline="central" font-size="${fs}" fill="#475569" font-family="DM Sans,sans-serif">⠿ ${title}</text></g>`;
  // admin controls (scale − / ＋ / delete) on the bar's right
  if (isAdmin) {
    const bw = barH; // square buttons
    const bx3 = x0 + W - bw, bx2 = bx3 - bw, bx1 = bx2 - bw;
    const tcy = y0 + barH/2;
    s += `<g class="table-btn" onclick="scaleTable('${b.id}',-1)"><rect x="${bx1}" y="${y0}" width="${bw}" height="${barH}" fill="transparent"/><text x="${bx1+bw/2}" y="${tcy}" text-anchor="middle" dominant-baseline="central" font-size="${fs*1.2}" fill="#475569" font-weight="700">−</text></g>`;
    s += `<g class="table-btn" onclick="scaleTable('${b.id}',1)"><rect x="${bx2}" y="${y0}" width="${bw}" height="${barH}" fill="transparent"/><text x="${bx2+bw/2}" y="${tcy}" text-anchor="middle" dominant-baseline="central" font-size="${fs*1.2}" fill="#475569" font-weight="700">＋</text></g>`;
    s += `<g class="table-btn" onclick="deleteTable('${b.id}')"><rect x="${bx3}" y="${y0}" width="${bw}" height="${barH}" fill="transparent"/><text x="${bx3+bw/2}" y="${tcy}" text-anchor="middle" dominant-baseline="central" font-size="${fs*1.1}" fill="#dc2626" font-weight="700">✕</text></g>`;
  }
  const cellTxt = (x, y, w, t, opt={}) => {
    const anchor = opt.center ? 'middle' : 'start';
    const px = opt.center ? x + w/2 : x + 4*scale;
    return `<text x="${px}" y="${y}" text-anchor="${anchor}" dominant-baseline="central" font-size="${fs}" fill="${opt.fill||'#111'}" font-weight="${opt.bold?700:400}" font-family="DM Sans,sans-serif">${t}</text>`;
  };
  const border = (x,y,w,h) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${'none'}" stroke="#cbd5e1" stroke-width="${0.8*scale}"/>`;
  // two-level header
  s += `<rect x="${x0}" y="${hA}" width="${W}" height="${rh*2}" fill="#f1f5f9"/>`;
  s += border(x0, hA, colW[0], rh*2) + cellTxt(x0, hA + rh, colW[0], 'Hex bit', {center:true, bold:true});
  s += border(x1, hA, colW[1]+colW[2], rh) + cellTxt(x1, hA + rh/2, colW[1]+colW[2], title, {center:true, bold:true});
  s += border(x1, hB, colW[1], rh) + cellTxt(x1, hB + rh/2, colW[1], 'Screw', {center:true, bold:true});
  s += border(x2, hB, colW[2], rh) + cellTxt(x2, hB + rh/2, colW[2], 'Torque N·m', {center:true, bold:true});
  // data rows
  rows.forEach((r, i) => {
    const ry = dataTop + i*rh, rcy = ry + rh/2;
    s += border(x0, ry, colW[0], rh) + cellTxt(x0, rcy, colW[0], esc(r[0]||''));
    s += border(x1, ry, colW[1], rh) + cellTxt(x1, rcy, colW[1], esc(r[1]||''));
    s += border(x2, ry, colW[2], rh) + cellTxt(x2, rcy, colW[2], esc(r[2]||''), {center:true, bold:true});
  });
  s += `</g>`;
  return s;
}

async function scaleTable(bid, dir) {
  const b = balloons.find(x => x.id === bid); if (!b) return;
  let meta = {}; try { meta = JSON.parse(b.label || '{}'); } catch {}
  const cur = (+meta.scale) || 1;
  meta.scale = Math.max(0.5, Math.min(3, +(cur + dir*0.2).toFixed(2)));
  b.label = JSON.stringify(meta);
  renderBalloonsSVG();
  try { await sb.from('deployops_balloons').update({ label: b.label }).eq('id', bid); }
  catch(e) { console.error(e); toast('Resize failed','err'); }
}

async function deleteTable(bid) {
  if (!confirm('Remove this reference table from the drawing?')) return;
  try {
    await sb.from('deployops_balloons').delete().eq('id', bid);
    toast('Table removed','ok');
    await loadBalloons();
    renderBalloonsSVG();
  } catch(e) { console.error(e); toast('Delete failed','err'); }
}
