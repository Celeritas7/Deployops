  // Sections with zero items in the active phase still appear in the
  // folder grid with count 0 — the architectural win of F.9 is that
  // empty sections persist as DB rows. ===
  const allSections = sectionsCache[modelView] || [];
  const countByPhase = sec => modelItems.filter(i =>
    i.visible !== false && itemInPhase(i, modelPhase) && i.section_id === sec.id
  ).length;

  if (currentEditorSection === null) {
    // Folder grid
    if (allSections.length === 0) {
      html += `<div class="empty"><div class="icon">${PHASE_META[modelPhase]?.icon || '🛡️'}</div>
        <p>No sections yet for this phase.<br>Click <b>+ New Section</b> above to start.</p></div>`;
    } else {
      html += `<div class="folder-grid">`;
      allSections.forEach(section => {
        const count = countByPhase(section);
        const displayName = (lang === 'ja' && section.name_ja) ? section.name_ja : section.name;
        const icon = section.icon || '📁';
        html += `
          <div class="folder-card" data-sec="${esc(section.id)}" onclick="openSectionFolder(this.dataset.sec)">
            <span class="folder-count">${count}</span>
            <button class="edit-icon-btn admin-only" data-sec="${esc(section.id)}" onclick="event.stopPropagation();showEditSection(this.dataset.sec)" title="Edit section">✏</button>
            <div class="folder-icon">${esc(icon)}</div>
            <div class="folder-name">${esc(displayName)}</div>
          </div>`;
      });
      html += `</div>`;
    }
  } else {
    // Single-section detail view
    const section = allSections.find(s => s.id === currentEditorSection);
    if (!section) {
      // Section was deleted mid-render (concurrent action) — bounce to grid.
      currentEditorSection = null;
      el.innerHTML = ''; renderModels(); return;
    }
    const secName = section.name;
    const displayName = (lang === 'ja' && section.name_ja) ? section.name_ja : section.name;
    const secIcon = section.icon || '📁';
    const secItems = modelItems.filter(i =>
      i.visible !== false && itemInPhase(i, modelPhase) && i.section_id === section.id
    ).sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
    html += `
      <button class="back-btn" onclick="backToFolderGrid()">← Back to sections</button>
      <div class="cl-section">
        <div class="cl-section-header">
          <h3><span class="section-icon-display">${esc(secIcon)}</span> ${esc(displayName)}</h3>
          <span class="badge badge-blue">${secItems.length}</span>
        </div>
        <div class="cl-section-body">`;

    if (secItems.length === 0) {
      html += `<div class="empty-section-hint">Empty section — add the first item below ↓</div>`;
    }

    secItems.forEach((it, idx) => {
      const ph = itemPhases(it);
      const multi = ph.length > 1;
      const pills = ALL_PHASES.filter(p => ph.includes(p)).map(p =>
        `<span class="phase-pill ${p===modelPhase?'on':''}" title="${esc(PHASE_META[p].label)}">${esc(PHASE_META[p].short)}</span>`
      ).join('');
      const tierBadge = (it.tier && it.tier !== 'plain')
        ? `<span class="badge badge-blue" title="${esc((WS_TIERS[it.tier]||{}).cls||it.tier)}">${esc((WS_TIERS[it.tier]||{}).letter||'')}</span>`
        : '';
      html += `<div class="cl-item ${multi?'multi':''}">
        <span class="order">${idx+1}</span>
        <div style="flex:1;min-width:0">
          <div class="label">${esc(it.label)}</div>
          ${it.description ? `<div class="desc">${esc(it.description)}</div>` : ''}
        </div>
        <div class="phase-pills">${tierBadge}${pills}</div>
        <div class="meta">
          ${it.part_number ? `<span class="badge badge-blue">${esc(it.part_number)}</span>` : ''}
          ${it.qty         ? `<span class="badge badge-orange">×${it.qty}</span>` : ''}
          ${it.tool        ? `<span class="badge badge-green">${esc(it.tool)}</span>` : ''}
        </div>
        <div class="row-actions admin-only">
          <button class="btn btn-sm" onclick="moveModelItem('${it.id}',-1)" title="Up">▲</button>
          <button class="btn btn-sm" onclick="moveModelItem('${it.id}',1)"  title="Down">▼</button>
          <button class="btn btn-sm" onclick="editModelItem('${it.id}')"    title="Edit">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteModelItem('${it.id}')" title="Delete">✕</button>
        </div>
      </div>`;
    });

    if (inlineAddSection === secName) {
      html += renderInlineAddRow();
    } else {
      html += `<button class="add-item-btn admin-only" data-sec="${esc(secName)}" onclick="openInlineAdd(this.dataset.sec)">➕ Add item</button>`;
    }

    html += `</div></div>`;
  }

  el.innerHTML = html;

  if (inlineAddSection) {
    setTimeout(() => { const i = document.getElementById('inline-label'); if (i) i.focus(); }, 20);
  }
}

function renderInlineAddRow() {
  const isKit = modelPhase === 'pre_deploy';
  return `
    <div class="cl-item-inline">
      <input id="inline-label" class="inline-input inline-label" placeholder="Item label" onkeydown="inlineKey(event)">
      ${isKit ? `
        <input id="inline-pn"   class="inline-input" placeholder="Part #"  style="flex:0 1 110px;min-width:90px"  onkeydown="inlineKey(event)">
        <input id="inline-qty"  class="inline-input" placeholder="Qty"     style="flex:0 1 70px;min-width:60px"   type="number" onkeydown="inlineKey(event)">
        <input id="inline-tool" class="inline-input" placeholder="Tool"    style="flex:0 1 100px;min-width:80px"  onkeydown="inlineKey(event)">
      ` : `
        <input id="inline-desc" class="inline-input" placeholder="Description (optional)" style="flex:1 1 200px"  onkeydown="inlineKey(event)">
      `}
      <div class="inline-actions">
        <span class="hint">↵ save · esc cancel</span>
        <button class="btn btn-sm" onclick="closeInlineAdd()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveInlineItem()">Save</button>
      </div>
    </div>
  `;
}

function inlineKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); saveInlineItem(); }
  else if (e.key === 'Escape') { e.preventDefault(); closeInlineAdd(); }
}
function openInlineAdd(secName) { inlineAddSection = secName; renderModels(); }
function closeInlineAdd() {
  // F.10: draft cleanup removed — sections persist on create, so there's
  // nothing transient to clean up when the inline-add row closes.
  inlineAddSection = null;
  renderModels();
}

async function saveInlineItem() {
  const m = modelById(modelView); if (!m) return;
  const sec = inlineAddSection; if (!sec) return;
  const labelEl = document.getElementById('inline-label'); if (!labelEl) return;
  const label = labelEl.value.trim();
  if (!label) { labelEl.focus(); return; }

  const isKit = modelPhase === 'pre_deploy';
  // Defensive ensureSection: cache-first lookup short-circuits when the
  // section already exists; only hits the DB if the section is missing
  // (concurrent-tab race, stale cache, or a future entry-point that
  // bypasses confirmNewSection). Mirrors applyBulkAdd's pattern.
  let sectionRow;
  try {
    sectionRow = await ensureSection(m.id, sec);
  } catch(e) {
    console.error(e);
    toast('Section resolve failed: ' + (e.message || e), 'err');
    return;
  }
  if (!sectionRow) { toast('Section not found', 'err'); return; }
  const maxSort = Math.max(0, ...itemsForPhase(modelPhase).map(i => i.sort_order||0));
  const row = {
    model_id: m.id,
    phase: modelPhase,            // transition: single col = phases[0]
    phases: [modelPhase],         // new items belong to exactly the current phase
    section_type: isKit ? 'screw' : 'check',  // legacy column kept consistent for old code paths
    section_id: sectionRow.id,                  // F.10: section_id is the sole section reference
    sort_order: maxSort + 1,
    label
  };
  if (isKit) {
    row.part_number = document.getElementById('inline-pn').value.trim() || null;
    const q = document.getElementById('inline-qty').value;
    row.qty = q ? (parseInt(q) || null) : null;
    row.tool = document.getElementById('inline-tool').value.trim() || null;
  } else {
    row.description = document.getElementById('inline-desc').value.trim() || null;
  }

  try {
    const { data, error } = await sb.from('deployops_checklist_items').insert(row).select().single();
    if (error) throw error;
    modelItems.push(data);
    recountOpenModel();  // refresh list-view stats so back-nav shows accurate counts
    toast('Item added', 'ok');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

function showNewSection() {
  showModal(`
    <h3>➕ New Section</h3>
    <label>Section name</label>
    <input id="newSecName" placeholder="e.g. Pillar" onkeydown="if(event.key==='Enter'){event.preventDefault();confirmNewSection()}">
    <p style="font-size:11px;color:var(--text2);margin-top:6px">A new section will appear and the inline-add row will open so you can start typing items right away.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewSection()">Create</button>
    </div>
  `);
  setTimeout(() => { const i = document.getElementById('newSecName'); if (i) i.focus(); }, 30);
}
async function confirmNewSection() {
  const m = modelById(modelView); if (!m) return;
  const name = document.getElementById('newSecName').value.trim();
  if (!name) { toast('Enter a section name', 'err'); return; }
  try {
    // ensureSection handles both create and the "already exists" race via
    // UNIQUE(model_id, name) — returning the existing row in the second case
    // matches the prior "Section already exists — opening it" toast UX.
    const wasInCache = (sectionsCache[m.id] || []).some(s => s.name === name);
    const section = await ensureSection(m.id, name);
    if (!section) { toast('Section not found after create', 'err'); return; }
    if (wasInCache) toast('Section already exists — opening it', 'info');
    inlineAddSection = section.name;       // opens inline-add row in detail view
    currentEditorSection = section.id;     // auto-navigate into the new section
    closeModal();
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

// ===== Edit section (F.9 — rename / re-icon / delete) =====
function showEditSection(sectionId) {
  const m = modelById(modelView); if (!m) return;
  const section = (sectionsCache[m.id] || []).find(s => s.id === sectionId);
  if (!section) return;
  _pendingIcon = section.icon || '📁';
  const itemCount = modelItems.filter(i => i.section_id === sectionId).length;
  showModal(`
    <h3>Edit section</h3>
    <label>Section name (EN)</label>
    <input type="text" id="sectionEditName" value="${esc(section.name)}">
    <label>Section name (JA)</label>
    <input type="text" id="sectionEditNameJa" value="${esc(section.name_ja || '')}" placeholder="日本語名（任意）">
    <label>Icon — pick or paste a custom emoji</label>
    <div class="icon-picker-grid" id="iconPickerGrid"></div>
    <div class="custom-emoji-row">
      <input type="text" id="customEmojiInput" placeholder="Paste any emoji" maxlength="8" oninput="updateCustomPreview()">
      <div class="custom-preview" id="customPreview">${esc(_pendingIcon)}</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteSection('${section.id}', ${itemCount})">🗑️ Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditSection('${section.id}')">Save</button>
    </div>
  `);
  renderIconPicker();
}

function renderIconPicker() {
  const grid = document.getElementById('iconPickerGrid');
  if (!grid) return;
  grid.innerHTML = SECTION_ICONS.map(icon =>
    `<div class="icon-option ${icon === _pendingIcon ? 'selected' : ''}" data-icon="${esc(icon)}" onclick="selectIcon(this.dataset.icon)">${icon}</div>`
  ).join('');
}
function selectIcon(icon) {
  _pendingIcon = icon;
  const customInput = document.getElementById('customEmojiInput');
  if (customInput) customInput.value = '';
  const preview = document.getElementById('customPreview');
  if (preview) preview.textContent = icon;
  renderIconPicker();
}
function updateCustomPreview() {
  const v = document.getElementById('customEmojiInput').value.trim();
  const preview = document.getElementById('customPreview');
  if (v) {
    _pendingIcon = v;
    if (preview) preview.textContent = v;
    document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
  } else if (preview) {
    preview.textContent = _pendingIcon || '?';
  }
}

async function saveEditSection(sectionId) {
  const m = modelById(modelView); if (!m) return;
  const newName = document.getElementById('sectionEditName').value.trim();
  if (!newName) { toast('Section name cannot be empty', 'err'); return; }
  const newNameJa = document.getElementById('sectionEditNameJa').value.trim() || null;
  const newIcon = _pendingIcon || null;
  try {
    // F.10: section row is the sole source of truth for section name /
    // name_ja / icon. No item cascade needed — wsGroupBySection,
    // genGroups, and renderDeployPhaseBlock all read from sectionsCache.
    const { error: secErr } = await sb.from('deployops_sections')
      .update({ name: newName, name_ja: newNameJa, icon: newIcon })
      .eq('id', sectionId);
    if (secErr) throw secErr;
    // Patch sectionsCache so the re-render reflects the change without
    // a re-fetch. Items don't need patching (they no longer carry the
    // section name fields).
    const sec = (sectionsCache[m.id] || []).find(s => s.id === sectionId);
    if (sec) { sec.name = newName; sec.name_ja = newNameJa; sec.icon = newIcon; }
    closeModal();
    toast('Section updated', 'ok');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

async function deleteSection(sectionId, itemCount) {
  const m = modelById(modelView); if (!m) return;
  const section = (sectionsCache[m.id] || []).find(s => s.id === sectionId);
  if (!section) return;
  const msg = itemCount > 0
    ? `Delete section "${section.name}" and all ${itemCount} item${itemCount===1?'':'s'} inside?`
    : `Delete empty section "${section.name}"?`;
  if (!confirm(msg)) return;
  try {
    if (itemCount > 0) {
      const { error: itemErr } = await sb.from('deployops_checklist_items')
        .delete().eq('section_id', sectionId);
      if (itemErr) throw itemErr;
    }
    const { error: secErr } = await sb.from('deployops_sections')
      .delete().eq('id', sectionId);
    if (secErr) throw secErr;
    sectionsCache[m.id] = (sectionsCache[m.id] || []).filter(s => s.id !== sectionId);
    modelItems = modelItems.filter(i => i.section_id !== sectionId);
    if (currentEditorSection === sectionId) currentEditorSection = null;
    closeModal();
    recountOpenModel();
    toast('Section deleted', 'info');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e), 'err');
  }
}

// ===== Bulk add =====
function openBulkAdd() {
  const m = modelById(modelView); if (!m) return;
  // F.9: source from sectionsCache so empty sections (zero items in
  // current phase) also appear in the dropdown.
  const all = (sectionsCache[m.id] || []).map(s => s.name);
  const currentSectionRow = (sectionsCache[m.id] || []).find(s => s.id === currentEditorSection);
  const currentName = currentSectionRow?.name;

  const isKit = modelPhase === 'pre_deploy';
  const fmt   = isKit
    ? '<code>label | part_number | qty | tool</code> — everything after <code>label</code> is optional'
    : '<code>label | description</code> — description is optional';
  const sample = isKit
    ? "M6×20 hex screws | HX-M6-20 | 8 | 5mm Allen\nM4×10 cap screws | CAP-M4-10 | 12 | 3mm Allen\nUSB-C cable 1m | CBL-USBC-1 | 2"
    : "Frame welds inspected | Visual check at joint A/B\nBearings seated correctly\nWiring harness tagged | All cables labeled per drawing";

  showModal(`
    <h3>📋 Bulk Add — ${modelPhase==='pre_install_qc'?'Pre-Install QC':'Pre-Deploy'}</h3>
    <label>Section</label>
    <select id="bulkSec">
      ${all.length === 0 ? '<option value="__new">+ New Section…</option>' : ''}
      ${all.map(s => `<option value="${esc(s)}" ${s===currentName?'selected':''}>${esc(s)}</option>`).join('')}
      ${all.length > 0 ? '<option value="__new">+ New Section…</option>' : ''}
    </select>
    <input id="bulkNewSec" placeholder="New section name" style="display:${all.length===0?'block':'none'};margin-top:6px">
    <label>Items (one per line)</label>
    <textarea id="bulkText" rows="9" placeholder="${esc(sample)}"></textarea>
    <p style="font-size:11px;color:var(--text2);margin-top:6px;line-height:1.5">Format: ${fmt}</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="applyBulkAdd()">Add Items</button>
    </div>
  `);
  const sel = document.getElementById('bulkSec');
  const newSecInput = document.getElementById('bulkNewSec');
  sel.addEventListener('change', () => {
    newSecInput.style.display = sel.value === '__new' ? 'block' : 'none';
    if (sel.value === '__new') setTimeout(() => newSecInput.focus(), 10);
  });
  setTimeout(() => document.getElementById('bulkText').focus(), 30);
}

async function applyBulkAdd() {
  const m = modelById(modelView); if (!m) return;
  let secName = document.getElementById('bulkSec').value;
  if (secName === '__new') {
    secName = document.getElementById('bulkNewSec').value.trim();
    if (!secName) { toast('Enter a section name', 'err'); return; }
  }
  let sectionRow;
  try {
    sectionRow = await ensureSection(m.id, secName);
  } catch(e) {
    console.error(e);
    toast('Section lookup failed: ' + (e.message || e), 'err');
    return;
  }
  if (!sectionRow) { toast('Section lookup failed', 'err'); return; }
  const text = document.getElementById('bulkText').value;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) { toast('Paste at least one line', 'err'); return; }

  const isKit = modelPhase === 'pre_deploy';
  let maxSort = Math.max(0, ...itemsForPhase(modelPhase).map(i => i.sort_order||0));
  const rows = [];
  lines.forEach(line => {
    const parts = line.split('|').map(p => p.trim());
    const label = parts[0];
    if (!label) return;
    maxSort++;
    const r = {
      model_id: m.id, phase: modelPhase, phases: [modelPhase],
      section_type: isKit ? 'screw' : 'check',
      section_id: sectionRow.id,  // F.10: section_id is the sole section reference
      sort_order: maxSort, label
    };
    if (isKit) {
      r.part_number = parts[1] || null;
      r.qty         = parts[2] ? (parseInt(parts[2]) || null) : null;
      r.tool        = parts[3] || null;
    } else {
      r.description = parts[1] || null;
    }
    rows.push(r);
  });

  if (rows.length === 0) { toast('Nothing to add', 'err'); return; }

  try {
    const { data, error } = await sb.from('deployops_checklist_items').insert(rows).select();
    if (error) throw error;
    modelItems.push(...(data || []));
    recountOpenModel();
    closeModal();
    toast(`Added ${rows.length} item${rows.length===1?'':'s'} to "${secName}"`, 'ok');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Bulk add failed: ' + (e.message || e), 'err');
  }
}

// ===== Item edit/delete/move (Model flow) =====
async function deleteModelItem(id) {
  if (!confirm('Delete this item?')) return;
  const it = modelItems.find(x => x.id === id);
  try {
    const { error } = await sb.from('deployops_checklist_items').delete().eq('id', id);
    if (error) throw error;
    modelItems = modelItems.filter(x => x.id !== id);
    recountOpenModel();
    toast('Deleted', 'info');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e), 'err');
  }
}

// Recompute the open model's per-phase item counts from the in-memory item
// list. An item counts once in every phase it belongs to.
function recountOpenModel() {
  const m = modelById(modelView); if (!m) return;
  const c = { pre_install_qc: 0, pre_test_qc: 0, pre_deploy: 0 };
  modelItems.forEach(it => {
    if (it.visible === false) return;
    itemPhases(it).forEach(p => { if (c[p] !== undefined) c[p]++; });
  });
  modelItemCount[m.id] = c;
}

function editModelItem(id) {
  const it = modelItems.find(i => i.id === id); if (!it) return;
  const m = modelById(modelView);
  const lang = getUiLang();
  const phases = itemPhases(it);
  const isKit = phases.includes('pre_deploy');
  const tier = it.tier || 'plain';
  const TIER_OPTS = [['plain','Plain'],['verify','Verify · V'],['review','Review · R'],['witness','Witness · W']];
  const tierSeg = TIER_OPTS.map(([v,lbl]) =>
    `<label class="${tier===v?'on':''}" data-tier="${v}"><input type="radio" name="eiTier" value="${v}" ${tier===v?'checked':''} onchange="eiPickTier('${v}')">${lbl}</label>`
  ).join('');
  const phaseCks = ALL_PHASES.map(p =>
    `<label class="ck"><input type="checkbox" id="eiPh_${p}" ${phases.includes(p)?'checked':''} onchange="eiValidatePhases()"> ${PHASE_META[p].icon} ${PHASE_META[p].label}</label>`
  ).join('');
  // F.9: section field is now a dropdown of existing sections (id-keyed),
  // sourced from sectionsCache. Free-text typo creating a phantom section
  // is no longer possible. To create a new section, user cancels and uses
  // "+ New Section" from the folder grid.
  const sectionOpts = (sectionsCache[m?.id] || []).map(s => {
    const label = (lang === 'ja' && s.name_ja) ? s.name_ja : s.name;
    return `<option value="${esc(s.id)}" ${s.id===it.section_id?'selected':''}>${esc(label)}</option>`;
  }).join('');
  showModal(`
    <h3>Edit Item</h3>
    <label>Section</label> <select id="eiSection">${sectionOpts}</select>
    <label>Label (EN)</label> <input id="eiLabel" value="${esc(it.label||'')}">
    <label>Label (JA)</label> <input id="eiLabelJa" value="${esc(it.label_ja||'')}" placeholder="日本語ラベル（任意）">
    ${isKit ? `
      <label>Part Number</label> <input id="eiPN"   value="${esc(it.part_number||'')}">
      <label>Qty</label>          <input id="eiQty"  type="number" value="${it.qty||''}">
      <label>Tool</label>         <input id="eiTool" value="${esc(it.tool||'')}">
    ` : `
      <label>Description</label>  <input id="eiDesc" value="${esc(it.description||'')}">
    `}
    <label>Tier</label>
    <div class="seg" id="eiTierSeg">${tierSeg}</div>
    <label>Show in phases</label>
    <div class="phase-cks">${phaseCks}</div>
    <div class="inline-err" id="eiPhaseErr">Select at least one phase.</div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteModelItem('${it.id}')">🗑️ Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="eiSaveBtn" onclick="saveModelItemEdit('${it.id}',${isKit})">Save</button>
    </div>
  `);
  eiValidatePhases();
}

function eiPickTier(v) {
  document.querySelectorAll('#eiTierSeg label').forEach(l => l.classList.toggle('on', l.dataset.tier === v));
}
function eiSelectedPhases() {
  return ALL_PHASES.filter(p => document.getElementById('eiPh_' + p)?.checked);
}
function eiValidatePhases() {
  const ok = eiSelectedPhases().length > 0;
  document.getElementById('eiPhaseErr')?.classList.toggle('show', !ok);
  const btn = document.getElementById('eiSaveBtn');
  if (btn) btn.disabled = !ok;
  return ok;
}

async function saveModelItemEdit(id, isKit) {
  if (!eiValidatePhases()) return;
  const phases = eiSelectedPhases();
  const m = modelById(modelView);
  const newSectionId = document.getElementById('eiSection').value;
  const sectionRow = (sectionsCache[m?.id] || []).find(s => s.id === newSectionId);
  if (!sectionRow) { toast('Section not found', 'err'); return; }
  const upd = {
    section_id: sectionRow.id,  // F.10: section_id is the sole section reference
    label: document.getElementById('eiLabel').value.trim(),
    label_ja: document.getElementById('eiLabelJa').value.trim() || null,
    tier: document.querySelector('input[name="eiTier"]:checked')?.value || 'plain',
    phases,
    phase: phases[0],   // transition: keep the single-phase column in sync (= phases[0])
  };
  if (isKit) {
    upd.part_number = document.getElementById('eiPN').value.trim() || null;
    const q = document.getElementById('eiQty').value;
    upd.qty = q ? (parseInt(q) || null) : null;
    upd.tool = document.getElementById('eiTool').value.trim() || null;
  } else {
    upd.description = document.getElementById('eiDesc').value.trim() || null;
  }
  try {
    const { error } = await sb.from('deployops_checklist_items').update(upd).eq('id', id);
    if (error) throw error;
    const it = modelItems.find(i => i.id === id);
    if (it) Object.assign(it, upd);
    recountOpenModel();
    closeModal(); toast('Updated', 'ok'); renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}

async function moveModelItem(id, dir) {
  const it = modelItems.find(i => i.id === id); if (!it) return;
  // F.9: adjacency by section_id (more robust during the name→id migration).
  // Items without a section_id (defensive — should not exist post-backfill)
  // fall into a single "(unsorted)" bucket matching pre-F.9 semantics.
  const secId = it.section_id || null;
  const list = itemsForPhase(modelPhase).filter(x => (x.section_id || null) === secId);
  const idx = list.findIndex(x => x.id === id);
  const swap = list[idx + dir];
  if (!swap) return;
  const aOrder = it.sort_order, bOrder = swap.sort_order;
  try {
    await sb.from('deployops_checklist_items').update({ sort_order: bOrder }).eq('id', it.id);
    await sb.from('deployops_checklist_items').update({ sort_order: aOrder }).eq('id', swap.id);
    it.sort_order = bOrder; swap.sort_order = aOrder;
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Move failed', 'err');
  }
}

// ===== Model CRUD =====
function showAddModel() {
  showModal(`
    <h3>➕ New Model</h3>
    <label>Name</label>             <input id="mName" placeholder="e.g. CE DVT3">
    <label>Reference / Part #</label><input id="mRef"  placeholder="e.g. CE-DVT3">
    <label>Icon (emoji)</label>      <input id="mIcon" placeholder="🤖" maxlength="2">
    <label>Description</label>       <textarea id="mDesc" placeholder="Short description"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addModel()">Create</button>
    </div>
  `);
  setTimeout(() => { const i = document.getElementById('mName'); if (i) i.focus(); }, 30);
}
async function addModel() {
  const name = document.getElementById('mName').value.trim();
  const ref  = document.getElementById('mRef').value.trim();
  if (!name) { toast('Name is required', 'err'); return; }
  const row = {
    name, ref: ref || null,
    icon: document.getElementById('mIcon').value.trim() || null,
    description: document.getElementById('mDesc').value.trim() || null,
    visible: true,
    created_by: currentUser?.email || 'unknown'
  };
  try {
    const { data, error } = await sb.from('deployops_models').insert(row).select().single();
    if (error) throw error;
    models.push(data);
    closeModal(); toast(`Model "${name}" created`, 'ok');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Create failed: ' + (e.message || e), 'err');
  }
}

function showRenameModel(id) {
  const m = modelById(id); if (!m) return;
  // Edit form reads EN fields directly. Reading name_ja || name here would
  // cause JA-mode edits to silently overwrite the EN column on save (mName
  // → row.name). If JA editing is needed, add separate mName_ja / mDesc_ja
  // inputs alongside these and wire saveModelEdit to write both columns.
  showModal(`
    <h3>Edit Model</h3>
    <label>Name</label>             <input id="mName" value="${esc(m.name)}">
    <label>Reference / Part #</label><input id="mRef"  value="${esc(m.ref||'')}">
    <label>Icon</label>              <input id="mIcon" value="${esc(m.icon||'')}" maxlength="2">
    <label>Description</label>       <textarea id="mDesc">${esc(m.description||'')}</textarea>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteModel('${m.id}')">🗑️ Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModel('${m.id}')">Save</button>
    </div>
  `);
}
async function saveModel(id) {
  const m = modelById(id); if (!m) return;
  const upd = {
    name: document.getElementById('mName').value.trim() || m.name,
    ref:  document.getElementById('mRef').value.trim()  || null,
    icon: document.getElementById('mIcon').value.trim() || null,
    description: document.getElementById('mDesc').value.trim() || null
  };
  try {
    const { error } = await sb.from('deployops_models').update(upd).eq('id', id);
    if (error) throw error;
    Object.assign(m, upd);
    closeModal(); toast('Model updated', 'ok'); renderModels();
  } catch(e) {
    console.error(e);
    toast('Save failed: ' + (e.message || e), 'err');
  }
}
async function deleteModel(id) {
  const m = modelById(id); if (!m) return;
  const uN = modelUnitCount[id] || 0;
  const stats = modelItemCount[id] || { pre_install_qc: 0, pre_test_qc: 0, pre_deploy: 0 };
  const iN = stats.pre_install_qc + stats.pre_test_qc + stats.pre_deploy;
  const lang = getUiLang();
  const msg = `Delete model "${pickField(m, 'name', lang)}"?\n\n• ${iN} checklist item(s) will be deleted.\n• ${uN} unit(s) will be unlinked (kept in DB).`;
  if (!confirm(msg)) return;
  try {
    // Unlink units (set model_id to null) — keeps them in DB for legacy Deploy view
    if (uN > 0) {
      const { error: uErr } = await sb.from('deployops_units').update({ model_id: null }).eq('model_id', id);
      if (uErr) throw uErr;
    }
    // Delete checklist items for this model
    if (iN > 0) {
      const { error: iErr } = await sb.from('deployops_checklist_items').delete().eq('model_id', id);
      if (iErr) throw iErr;
    }
    // Delete the model
    const { error: mErr } = await sb.from('deployops_models').delete().eq('id', id);
    if (mErr) throw mErr;

    models = models.filter(x => x.id !== id);
    delete modelItemCount[id]; delete modelUnitCount[id];
    if (modelView === id) modelView = null;
    closeModal(); toast('Model deleted', 'info');
    renderModels();
  } catch(e) {
    console.error(e);
    toast('Delete failed: ' + (e.message || e), 'err');
  }
}

  if (drawings.length > 0) {
    document.getElementById('drawingSelect').value = drawings[0].id;
    await selectDrawing(drawings[0].id);
  }
  renderModels();
}

init();
