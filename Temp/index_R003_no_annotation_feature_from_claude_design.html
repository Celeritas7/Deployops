<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployOps</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#07090f;--surface:#0f1219;--surface2:#161c28;--surface3:#1e2538;--border:#2a3350;--text:#e2e8f0;--text2:#94a3b8;--accent:#60a5fa;--accent2:#818cf8;--red:#f87171;--green:#34d399;--orange:#fbbf24;--pink:#f472b6;--cyan:#22d3ee}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.logo{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.topbar select{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);padding:4px 10px;border-radius:6px;font-size:12px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{border-color:var(--accent);background:var(--surface3)}
.btn-primary{background:var(--accent);color:#000;font-weight:600;border-color:var(--accent)}
.btn-primary:hover{opacity:.9}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
.btn-sm{padding:4px 8px;font-size:11px}
.btn-green{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
.admin-only{display:none}
.is-admin .admin-only{display:inline-flex}
.is-admin .add-form.admin-only{display:flex}
.is-admin div.mode-indicator.admin-only{display:inline-block}

/* TABS */
.tabbar{display:flex;gap:2px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;background:none;border:none;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-panel{display:none;padding:20px}
.tab-panel.active{display:block}

/* DRAWING VIEWER */
.drawing-area{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:10px}
.drawing-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.drawing-container{position:relative;overflow:auto;max-height:calc(100vh - 220px)}
.drawing-container img{display:block;width:100%;user-select:none;-webkit-user-drag:none}
.drawing-container svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.drawing-container svg.interactive{pointer-events:all;touch-action:none}
.balloon-g{cursor:pointer;pointer-events:all}
.balloon-g:hover circle{stroke-width:3}
.balloon-g.selected circle{stroke:var(--cyan);stroke-width:4;filter:drop-shadow(0 0 6px rgba(34,211,238,.5))}
.upload-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;color:var(--text2)}
.upload-area .icon{font-size:48px}
.page-nav{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.mode-indicator{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.mode-indicator.add-mode{background:rgba(248,113,113,.15);color:var(--red);animation:pulse 1.5s infinite}
.mode-indicator.select-mode{background:rgba(96,165,250,.1);color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* CHECKLIST BUILDER */
.cl-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.cl-section-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.cl-section-header h3{font-size:14px;flex:1}
.cl-section-body{padding:12px 16px}
.cl-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;border:1px solid transparent;transition:all .15s;margin:4px 0}
.cl-item:hover{background:var(--surface2);border-color:var(--border)}
.cl-item .order{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);min-width:24px}
.cl-item .label{flex:1;font-size:13px}
.cl-item .desc{font-size:11px;color:var(--text2);margin-top:2px}
.cl-item .meta{display:flex;gap:6px;flex-shrink:0}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.badge-blue{background:rgba(96,165,250,.12);color:var(--accent)}
.badge-red{background:rgba(248,113,113,.12);color:var(--red)}
.badge-green{background:rgba(52,211,153,.12);color:var(--green)}
.badge-orange{background:rgba(251,191,36,.12);color:var(--orange)}
.add-form{display:flex;gap:8px;flex-wrap:wrap;padding:12px;background:var(--surface3);border-radius:8px;margin-bottom:12px}
.add-form input,.add-form select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:12px;font-family:inherit}
.add-form input{flex:1;min-width:120px}
.sub-tabs{display:flex;gap:2px;margin-bottom:12px}
.sub-tab{padding:6px 14px;border-radius:6px;border:none;background:var(--surface2);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.sub-tab.active{background:var(--accent);color:#000;font-weight:600}

/* UNITS */
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
.unit-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}
.unit-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(96,165,250,.1)}
.unit-card h3{font-size:15px;margin-bottom:6px}
.unit-card .progress{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:8px}
.unit-card .prog-bar{height:6px;background:var(--surface3);border-radius:3px;margin-top:4px;overflow:hidden}
.unit-card .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}

/* DEPLOY CHECKLIST */
.deploy-header{display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px}
.deploy-header h2{font-size:18px;flex:1}
.deploy-progress{width:100%;height:22px;background:var(--surface3);border-radius:6px;overflow:hidden;position:relative;margin-top:8px}
.deploy-progress .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:6px;transition:width .4s}
.deploy-progress .txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:600}
.deploy-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.deploy-section-header{padding:12px 16px;background:var(--surface2);font-weight:600;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.deploy-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.deploy-item:last-child{border-bottom:none}
.deploy-item:hover{background:var(--surface2)}
.deploy-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex-shrink:0;margin-top:2px}
.deploy-item.checked .di-label{text-decoration:line-through;color:var(--text2)}
.di-label{font-size:13px;flex:1}
.di-label .sub{display:block;font-size:11px;color:var(--text2);margin-top:2px}
.di-qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--orange);min-width:40px;text-align:right}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:340px;max-width:500px;width:90%}
.modal h3{margin-bottom:14px;font-size:16px}
.modal label{display:block;font-size:12px;color:var(--text2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:1px}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.modal textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* TOAST */
.toast-wrap{position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;color:white;animation:slideIn .3s ease}
.toast-ok{background:#059669}
.toast-err{background:#dc2626}
.toast-info{background:#2563eb}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:13px;margin-bottom:14px}

/* PRINT */
@media print{
  *{color-adjust:exact!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff;color:#111}
  .topbar,.tabbar,.no-print,.btn,.admin-only,.add-form{display:none!important}
  .tab-panel.active{display:block!important;padding:10px}
  .tab-panel:not(.active){display:none!important}
  .deploy-section,.unit-card,.cl-section{background:#fff;border-color:#ccc;break-inside:avoid}
  .deploy-section-header{background:#f0f0f0!important}
  .deploy-item input[type=checkbox]{appearance:none;width:16px;height:16px;border:2px solid #333;border-radius:3px}
  .deploy-item.checked input[type=checkbox]::after{content:'✓';display:block;text-align:center;font-size:12px;line-height:14px}
}
@media(max-width:768px){
  .topbar{flex-direction:column;align-items:stretch;gap:8px}
  .topbar-right{margin-left:0;justify-content:flex-end}
  .tabbar{overflow-x:auto}
  .tab-panel{padding:12px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">⚙️ DeployOps<span>Deployment Ops</span></div>
  <select id="drawingSelect" onchange="selectDrawing(this.value)" style="min-width:180px">
    <option value="">— Select Drawing —</option>
  </select>
  <button class="btn btn-primary admin-only btn-sm" onclick="showUploadModal()">📤 Upload PDF</button>
  <div class="topbar-right">
    <div id="loginArea">
      <button class="btn" onclick="handleLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:14px;height:14px"> Sign In</button>
    </div>
    <div id="userBadge" class="user-badge" style="display:none">
      <span id="userName"></span>
      <button class="btn btn-sm" onclick="handleLogout()" style="padding:2px 6px;font-size:10px">✕</button>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <button class="tab active" onclick="switchTab('drawing')">📐 Drawing</button>
  <button class="tab" onclick="switchTab('checklist')">✅ Checklist</button>
  <button class="tab" onclick="switchTab('deploy')">🚀 Deploy</button>
</div>

<!-- DRAWING TAB -->
<div id="drawingTab" class="tab-panel active">
  <div id="drawingContent"></div>
</div>

<!-- CHECKLIST TAB -->
<div id="checklistTab" class="tab-panel">
  <div id="checklistContent"></div>
</div>

<!-- DEPLOY TAB -->
<div id="deployTab" class="tab-panel">
  <div id="deployContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="handlePDFUpload(event)">

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://wylxvmkcrexwfpjpbhyy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak';
const GIS_CLIENT_ID = '1088099187141-ut0dn0scqt3h99htf3rg8gsrg2oo1ad8.apps.googleusercontent.com';
const ADMIN_EMAILS = ['mangaonkaraniket@gmail.com','anikettelexistence@gmail.com'];
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ============================================================
// STATE
// ============================================================
let currentUser = null, isAdmin = false;
let drawings = [], currentDrawing = null, currentPage = 1;
let balloons = [], balloonMode = 'select', selectedBalloonId = null, dragging = null;
let checkItems = [], clSubTab = 'check';
let units = [], deployUnit = null, unitChecks = {};

// ============================================================
// AUTH
// ============================================================
function initAuth() {
  const stored = localStorage.getItem('deployops_token');
  if (stored) {
    try {
      const cred = JSON.parse(stored);
      setUser(cred);
    } catch(e) { localStorage.removeItem('deployops_token'); }
  }
}

function handleLogin() {
  if (typeof google === 'undefined') { toast('Google Sign-In not loaded yet','err'); return; }
  google.accounts.id.initialize({
    client_id: GIS_CLIENT_ID,
    callback: (resp) => {
      const payload = JSON.parse(atob(resp.credential.split('.')[1]));
      const cred = { email: payload.email, name: payload.name, picture: payload.picture };
      localStorage.setItem('deployops_token', JSON.stringify(cred));
      setUser(cred);
      toast('Signed in as ' + cred.name, 'ok');
    }
  });
  google.accounts.id.prompt((n) => {
    if (n.isNotDisplayed() || n.isSkippedMoment()) {
      google.accounts.id.renderButton(document.createElement('div'), { theme: 'outline' });
      google.accounts.id.prompt();
    }
  });
}

function handleLogout() {
  localStorage.removeItem('deployops_token');
  currentUser = null; isAdmin = false;
  document.getElementById('loginArea').style.display = '';
  document.getElementById('userBadge').style.display = 'none';
  document.body.classList.remove('is-admin');
  toast('Signed out','info');
}

function setUser(cred) {
  currentUser = cred;
  isAdmin = ADMIN_EMAILS.includes(cred.email);
  document.getElementById('loginArea').style.display = 'none';
  document.getElementById('userBadge').style.display = 'flex';
  document.getElementById('userName').textContent = cred.name;
  if (isAdmin) document.body.classList.add('is-admin');
  else document.body.classList.remove('is-admin');
}

// ============================================================
// NAVIGATION
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['drawing','checklist','deploy'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + 'Tab').classList.add('active');
  if (tab === 'drawing') renderDrawing();
  if (tab === 'checklist') renderChecklist();
  if (tab === 'deploy') renderDeploy();
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type = 'info') {
  const d = document.createElement('div');
  d.className = 'toast toast-' + type;
  d.textContent = msg;
  document.getElementById('toastWrap').appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ============================================================
// DRAWINGS
// ============================================================
async function loadDrawings() {
  const { data } = await sb.from('deployops_drawings').select('*').order('created_at', { ascending: false });
  drawings = data || [];
  const sel = document.getElementById('drawingSelect');
  sel.innerHTML = '<option value="">— Select Drawing —</option>';
  drawings.forEach(d => {
    sel.innerHTML += `<option value="${d.id}">${d.drawing_ref} — ${d.name}</option>`;
  });
  if (drawings.length === 1) { sel.value = drawings[0].id; selectDrawing(drawings[0].id); }
}

async function selectDrawing(id) {
  currentDrawing = drawings.find(d => d.id === id) || null;
  currentPage = 1;
  if (currentDrawing) {
    await Promise.all([loadBalloons(), loadCheckItems(), loadUnits()]);
  } else {
    balloons = []; checkItems = []; units = [];
  }
  renderDrawing();
}

function showUploadModal() {
  showModal(`
    <h3>📤 Upload Engineering Drawing</h3>
    <label>Drawing Reference (Part Number)</label>
    <input id="upRef" placeholder="e.g. NXMA-0800100-0-0">
    <label>Drawing Name</label>
    <input id="upName" placeholder="e.g. SafetyNet">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="startPDFUpload()">Select PDF File</button>
    </div>
  `);
}

function startPDFUpload() {
  const ref = document.getElementById('upRef').value.trim();
  const name = document.getElementById('upName').value.trim();
  if (!ref || !name) { toast('Fill in both fields','err'); return; }
  window._uploadMeta = { ref, name };
  closeModal();
  document.getElementById('pdfInput').click();
}

async function handlePDFUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const { ref, name } = window._uploadMeta;
  toast('Converting PDF to images...','info');

  try {
    const arrayBuf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    const pageCount = pdf.numPages;

    // Create drawing record
    const { data: drawingRow, error: dbErr } = await sb.from('deployops_drawings').insert({
      drawing_ref: ref, name, page_count: pageCount,
      uploaded_by: currentUser?.email || 'unknown'
    }).select().single();
    if (dbErr) throw dbErr;

    // Convert each page to PNG and upload
    for (let i = 1; i <= pageCount; i++) {
      toast(`Processing page ${i}/${pageCount}...`,'info');
      const page = await pdf.getPage(i);
      const vp = page.getViewport({ scale: 2.5 });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const path = `${ref}/page_${i}.png`;
      const { error: stErr } = await sb.storage.from('deployops-drawings').upload(path, blob, { contentType: 'image/png', upsert: true });
      if (stErr) throw stErr;
    }

    toast(`Drawing "${ref}" uploaded (${pageCount} pages)`,'ok');
    await loadDrawings();
    document.getElementById('drawingSelect').value = drawingRow.id;
    selectDrawing(drawingRow.id);
  } catch(e) {
    console.error(e);
    toast('Upload failed: ' + (e.message || e.statusText || JSON.stringify(e)),'err');
  }
}

// ============================================================
// DRAWING VIEW + BALLOON EDITOR
// ============================================================
function getPageURL(pageNum) {
  if (!currentDrawing) return '';
  const path = `${currentDrawing.drawing_ref}/page_${pageNum}.png`;
  const { data } = sb.storage.from('deployops-drawings').getPublicUrl(path);
  return data.publicUrl;
}

function renderDrawing() {
  const el = document.getElementById('drawingContent');
  if (!currentDrawing) {
    el.innerHTML = `<div class="empty"><div class="icon">📐</div><p>Select or upload a drawing to begin</p></div>`;
    return;
  }

  const pageUrl = getPageURL(currentPage);
  el.innerHTML = `
    <div class="drawing-area">
      <div class="drawing-toolbar">
        <div class="page-nav">
          <button class="btn btn-sm" onclick="changePage(-1)" ${currentPage<=1?'disabled':''}>◀</button>
          <span>Page ${currentPage} / ${currentDrawing.page_count}</span>
          <button class="btn btn-sm" onclick="changePage(1)" ${currentPage>=currentDrawing.page_count?'disabled':''}>▶</button>
        </div>
        <button class="btn btn-sm admin-only ${balloonMode==='add'?'btn-danger':''}" onclick="toggleBalloonMode()" id="balloonModeBtn">
            ${balloonMode==='add'?'🔴 Cancel Add':'➕ Add Balloon'}
          </button>
          <div class="mode-indicator admin-only ${balloonMode==='add'?'add-mode':'select-mode'}">
            ${balloonMode==='add'?'CLICK TO PLACE':'SELECT MODE'}
          </div>
        <button class="btn btn-sm no-print" onclick="exportAnnotatedPNG()">📷 Export PNG</button>
        <button class="btn btn-sm no-print" onclick="window.print()">🖨️ Print</button>
      </div>
      <div class="drawing-container" id="drawingContainer">
        <img id="drawingImg" src="${pageUrl}" crossorigin="anonymous" onload="onDrawingLoad()">
        <svg id="balloonSvg" class="${isAdmin?'interactive':''}"></svg>
      </div>
    </div>
  `;
}

function onDrawingLoad() {
  renderBalloonsSVG();
  const svg = document.getElementById('balloonSvg');
  if (svg && isAdmin) {
    svg.onclick = handleDrawingClick;
  }
}

function changePage(delta) {
  const np = currentPage + delta;
  if (np < 1 || np > currentDrawing.page_count) return;
  currentPage = np;
  renderDrawing();
}

function toggleBalloonMode() {
  balloonMode = balloonMode === 'add' ? 'select' : 'add';
  selectedBalloonId = null;
  renderDrawing();
}

function handleDrawingClick(e) {
  if (isDragging) return;
  const svg = document.getElementById('balloonSvg');
  const img = document.getElementById('drawingImg');
  if (!img || !svg) return;

  // Check if click was on a balloon
  if (e.target.closest('.balloon-g')) {
    const g = e.target.closest('.balloon-g');
    const bid = g.dataset.id;
    if (balloonMode === 'select') {
      selectedBalloonId = selectedBalloonId === bid ? null : bid;
      renderBalloonsSVG();
      if (selectedBalloonId) showBalloonActions(bid);
    }
    return;
  }

  if (balloonMode !== 'add') { selectedBalloonId = null; renderBalloonsSVG(); return; }

  const rect = img.getBoundingClientRect();
  const x_pct = ((e.clientX - rect.left) / rect.width) * 100;
  const y_pct = ((e.clientY - rect.top) / rect.height) * 100;

  const nextNum = balloons.length > 0 ? Math.max(...balloons.map(b => b.number)) + 1 : 1;
  showModal(`
    <h3>Add Balloon</h3>
    <label>Number</label>
    <input id="bNum" type="number" value="${nextNum}">
    <label>Label (optional)</label>
    <input id="bLabel" placeholder="e.g. SignalTowerASSY">
    <label>Color</label>
    <select id="bColor">
      <option value="#e74c3c">🔴 Red (Sub-Assembly)</option>
      <option value="#2980b9">🔵 Blue (Fastener)</option>
      <option value="#27ae60">🟢 Green (Part)</option>
      <option value="#e67e22">🟠 Orange (Sensor)</option>
      <option value="#9b59b6">🟣 Purple</option>
    </select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBalloon(${x_pct},${y_pct})">Place</button>
    </div>
  `);
}

async function saveBalloon(x, y) {
  const num = parseInt(document.getElementById('bNum').value);
  const label = document.getElementById('bLabel').value.trim();
  const color = document.getElementById('bColor').value;
  if (isNaN(num)) { toast('Enter a number','err'); return; }
  closeModal();

  const { error } = await sb.from('deployops_balloons').insert({
    drawing_id: currentDrawing.id, page: currentPage,
    number: num, x_pct: x, y_pct: y, label, color
  });
  if (error) { toast('Save failed','err'); return; }
  toast(`Balloon ${num} placed`,'ok');
  await loadBalloons();
  renderBalloonsSVG();
}

function showBalloonActions(bid) {
  const b = balloons.find(x => x.id === bid);
  if (!b) return;
  showModal(`
    <h3>Balloon ${b.number}</h3>
    <label>Number</label>
    <input id="ebNum" type="number" value="${b.number}">
    <label>Label</label>
    <input id="ebLabel" value="${b.label || ''}">
    <label>Color</label>
    <select id="ebColor">
      <option value="#e74c3c" ${b.color==='#e74c3c'?'selected':''}>🔴 Red</option>
      <option value="#2980b9" ${b.color==='#2980b9'?'selected':''}>🔵 Blue</option>
      <option value="#27ae60" ${b.color==='#27ae60'?'selected':''}>🟢 Green</option>
      <option value="#e67e22" ${b.color==='#e67e22'?'selected':''}>🟠 Orange</option>
      <option value="#9b59b6" ${b.color==='#9b59b6'?'selected':''}>🟣 Purple</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteBalloon('${bid}')">🗑️ Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateBalloon('${bid}')">Save</button>
    </div>
  `);
}

async function updateBalloon(bid) {
  const num = parseInt(document.getElementById('ebNum').value);
  const label = document.getElementById('ebLabel').value.trim();
  const color = document.getElementById('ebColor').value;
  closeModal();
  await sb.from('deployops_balloons').update({ number: num, label, color }).eq('id', bid);
  toast('Balloon updated','ok');
  await loadBalloons();
  renderBalloonsSVG();
}

async function deleteBalloon(bid) {
  closeModal();
  await sb.from('deployops_balloons').delete().eq('id', bid);
  toast('Balloon deleted','ok');
  selectedBalloonId = null;
  await loadBalloons();
  renderBalloonsSVG();
}

async function loadBalloons() {
  if (!currentDrawing) { balloons = []; return; }
  const { data } = await sb.from('deployops_balloons').select('*').eq('drawing_id', currentDrawing.id).order('number');
  balloons = data || [];
}

function renderBalloonsSVG() {
  const svg = document.getElementById('balloonSvg');
  const img = document.getElementById('drawingImg');
  if (!svg || !img) return;

  const pageBalloons = balloons.filter(b => b.page === currentPage);
  const r = 18; // balloon radius in SVG coords (we use viewBox = 1000x(h))
  const imgW = img.naturalWidth || img.width;
  const imgH = img.naturalHeight || img.height;
  const vbW = 1000;
  const vbH = (imgH / imgW) * 1000;
  svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);

  let html = '';
  pageBalloons.forEach(b => {
    const cx = b.x_pct / 100 * vbW;
    const cy = b.y_pct / 100 * vbH;
    const sel = b.id === selectedBalloonId ? ' selected' : '';
    html += `<g class="balloon-g${sel}" data-id="${b.id}">
      <circle cx="${cx}" cy="${cy}" r="${r+3}" fill="white" opacity="0.9"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${b.color}" stroke="white" stroke-width="1.5"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" fill="white"
            font-size="${r*1.1}" font-weight="700" font-family="DM Sans,sans-serif">${b.number}</text>`;
    if (b.label) {
      html += `<text x="${cx}" y="${cy + r + 10}" text-anchor="middle" fill="white"
              font-size="7" font-family="DM Sans,sans-serif" opacity="0.9"
              stroke="rgba(0,0,0,0.5)" stroke-width="2" paint-order="stroke">${b.label}</text>`;
    }
    html += `</g>`;
  });
  svg.innerHTML = html;

  // Enable drag for admin
  if (isAdmin) {
    svg.querySelectorAll('.balloon-g').forEach(g => {
      g.addEventListener('pointerdown', startBalloonDrag);
    });
  }
}

let isDragging = false;

function startBalloonDrag(e) {
  if (balloonMode === 'add') return;
  e.preventDefault();
  e.stopPropagation();
  isDragging = false;
  const g = e.currentTarget;
  const bid = g.dataset.id;
  const img = document.getElementById('drawingImg');
  if (!img) return;

  const onMove = (ev) => {
    ev.preventDefault();
    isDragging = true;
    const rect = img.getBoundingClientRect();
    const x_pct = Math.max(0, Math.min(100, ((ev.clientX - rect.left) / rect.width) * 100));
    const y_pct = Math.max(0, Math.min(100, ((ev.clientY - rect.top) / rect.height) * 100));
    const svg = document.getElementById('balloonSvg');
    const vbW = 1000;
    const vbH = parseFloat(svg.getAttribute('viewBox').split(' ')[3]);
    const cx = x_pct / 100 * vbW;
    const cy = y_pct / 100 * vbH;

    // Update all circles and texts in the group
    g.querySelectorAll('circle').forEach(c => { c.setAttribute('cx', cx); c.setAttribute('cy', cy); });
    const texts = g.querySelectorAll('text');
    texts.forEach((t, i) => {
      t.setAttribute('x', cx);
      t.setAttribute('y', i === 0 ? cy : cy + 24);
    });
    g._dragPos = { x_pct, y_pct };
  };

  const onUp = async () => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    if (isDragging && g._dragPos) {
      await sb.from('deployops_balloons').update({ x_pct: g._dragPos.x_pct, y_pct: g._dragPos.y_pct }).eq('id', bid);
      await loadBalloons();
      renderBalloonsSVG();
    }
    // Reset after short delay so click handler doesn't fire
    setTimeout(() => { isDragging = false; }, 100);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

async function exportAnnotatedPNG() {
  const img = document.getElementById('drawingImg');
  if (!img) return;
  toast('Generating PNG...','info');

  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const pageBalloons = balloons.filter(b => b.page === currentPage);
  pageBalloons.forEach(b => {
    const cx = b.x_pct / 100 * canvas.width;
    const cy = b.y_pct / 100 * canvas.height;
    const r = Math.min(canvas.width, canvas.height) * 0.018;

    // White halo
    ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, Math.PI*2);
    ctx.fillStyle = 'white'; ctx.fill();
    // Color circle
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = b.color; ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
    // Number
    ctx.fillStyle = 'white'; ctx.font = `bold ${r*1.3}px DM Sans, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(b.number), cx, cy);
    // Label
    if (b.label) {
      ctx.font = `${r*0.6}px DM Sans, sans-serif`;
      ctx.fillStyle = 'white';
      ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
      ctx.strokeText(b.label, cx, cy + r + r*0.7);
      ctx.fillText(b.label, cx, cy + r + r*0.7);
    }
  });

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${currentDrawing.drawing_ref}_annotated_p${currentPage}.png`;
    a.click();
    toast('PNG downloaded','ok');
  }, 'image/png');
}

async function loadCheckItems() {
  if (!currentDrawing) { checkItems = []; return; }
  const { data } = await sb.from('deployops_checklist_items').select('*')
    .eq('drawing_id', currentDrawing.id).order('sort_order');
  checkItems = data || [];
}

function renderChecklist() {
  const el = document.getElementById('checklistContent');
  if (!currentDrawing) {
    el.innerHTML = `<div class="empty"><div class="icon">✅</div><p>Select a drawing first</p></div>`;
    return;
  }

  const checks = checkItems.filter(i => i.section_type === 'check');
  const screws = checkItems.filter(i => i.section_type === 'screw');
  const sections = {};

  const active = clSubTab;
  const items = active === 'check' ? checks : screws;
  items.forEach(i => { if (!sections[i.section_name]) sections[i.section_name] = []; sections[i.section_name].push(i); });

  let html = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <div class="sub-tabs" style="margin-bottom:0">
        <button class="sub-tab ${active==='check'?'active':''}" onclick="clSubTab='check';renderChecklist()">✅ Checks (${checks.length})</button>
        <button class="sub-tab ${active==='screw'?'active':''}" onclick="clSubTab='screw';renderChecklist()">🔩 Screws (${screws.length})</button>
      </div>
      <button class="btn btn-sm" onclick="printChecklist()">🖨️ Print Checklist</button>
    </div>
    <div class="add-form admin-only" id="addItemForm">
        <select id="aiSection" style="min-width:120px">
          <option value="">Section...</option>
          ${[...new Set(items.map(i=>i.section_name))].map(s=>`<option value="${s}">${s}</option>`).join('')}
          <option value="__new">+ New Section</option>
        </select>
        <input id="aiLabel" placeholder="Item label">
        ${active==='screw'?`
          <input id="aiPN" placeholder="Part Number" style="width:120px">
          <input id="aiQty" type="number" placeholder="Qty" style="width:70px">
          <input id="aiTool" placeholder="Tool" style="width:100px">
        `:'<input id="aiDesc" placeholder="Description (optional)" style="min-width:150px">'}
        <button class="btn btn-primary btn-sm" onclick="addItem()">Add</button>
      </div>
  `;

  if (Object.keys(sections).length === 0) {
    html += `<div class="empty"><div class="icon">${active==='check'?'✅':'🔩'}</div><p>No ${active} items yet. Add one above.</p></div>`;
  }

  Object.entries(sections).forEach(([secName, items]) => {
    html += `<div class="cl-section">
      <div class="cl-section-header"><h3>${secName}</h3><span class="badge badge-blue">${items.length}</span></div>
      <div class="cl-section-body">`;
    items.forEach((item, idx) => {
      html += `<div class="cl-item">
        <span class="order">${item.sort_order || idx+1}</span>
        <div style="flex:1">
          <div class="label">${item.label}</div>
          ${item.description?`<div class="desc">${item.description}</div>`:''}
        </div>`;
      if (active === 'screw') {
        if (item.part_number) html += `<span class="badge badge-blue">${item.part_number}</span>`;
        if (item.qty) html += `<span class="badge badge-orange">×${item.qty}</span>`;
        if (item.tool) html += `<span class="badge badge-green">${item.tool}</span>`;
      }
      html += `<div class="meta admin-only">
          <button class="btn btn-sm" onclick="moveItem('${item.id}',-1)" title="Move Up">▲</button>
          <button class="btn btn-sm" onclick="moveItem('${item.id}',1)" title="Move Down">▼</button>
          <button class="btn btn-sm" onclick="editItem('${item.id}')" title="Edit">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteItem('${item.id}')" title="Delete">✕</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  el.innerHTML = html;

  // Handle new section dropdown
  const secSelect = document.getElementById('aiSection');
  if (secSelect) {
    secSelect.onchange = () => {
      if (secSelect.value === '__new') {
        const name = prompt('New section name:');
        if (name) {
          const opt = document.createElement('option');
          opt.value = name; opt.textContent = name; opt.selected = true;
          secSelect.insertBefore(opt, secSelect.lastElementChild);
        } else { secSelect.value = ''; }
      }
    };
  }
}

async function addItem() {
  let secName = document.getElementById('aiSection').value;
  if (!secName || secName === '__new') { toast('Select a section','err'); return; }
  const label = document.getElementById('aiLabel').value.trim();
  if (!label) { toast('Enter a label','err'); return; }

  const maxOrder = checkItems.filter(i=>i.section_type===clSubTab).reduce((m,i)=>Math.max(m,i.sort_order||0),0);
  const row = {
    drawing_id: currentDrawing.id,
    section_type: clSubTab,
    section_name: secName,
    sort_order: maxOrder + 1,
    label
  };

  if (clSubTab === 'screw') {
    row.part_number = document.getElementById('aiPN')?.value.trim() || null;
    row.qty = parseInt(document.getElementById('aiQty')?.value) || null;
    row.tool = document.getElementById('aiTool')?.value.trim() || null;
  } else {
    row.description = document.getElementById('aiDesc')?.value.trim() || null;
  }

  const { error } = await sb.from('deployops_checklist_items').insert(row);
  if (error) { toast('Add failed','err'); return; }
  toast('Item added','ok');
  await loadCheckItems();
  renderChecklist();
}

async function deleteItem(id) {
  if (!confirm('Delete this checklist item?')) return;
  await sb.from('deployops_checklist_items').delete().eq('id', id);
  toast('Deleted','ok');
  await loadCheckItems();
  renderChecklist();
}

function editItem(id) {
  const item = checkItems.find(i => i.id === id);
  if (!item) return;
  const isScrew = item.section_type === 'screw';
  showModal(`
    <h3>Edit Item</h3>
    <label>Section</label>
    <input id="eiSection" value="${item.section_name}">
    <label>Label</label>
    <input id="eiLabel" value="${item.label}">
    ${isScrew ? `
      <label>Part Number</label><input id="eiPN" value="${item.part_number||''}">
      <label>Qty</label><input id="eiQty" type="number" value="${item.qty||''}">
      <label>Tool</label><input id="eiTool" value="${item.tool||''}">
    ` : `
      <label>Description</label><input id="eiDesc" value="${item.description||''}">
    `}
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItemEdit('${id}',${isScrew})">Save</button>
    </div>
  `);
}

async function saveItemEdit(id, isScrew) {
  const upd = {
    section_name: document.getElementById('eiSection').value.trim(),
    label: document.getElementById('eiLabel').value.trim()
  };
  if (isScrew) {
    upd.part_number = document.getElementById('eiPN').value.trim() || null;
    upd.qty = parseInt(document.getElementById('eiQty').value) || null;
    upd.tool = document.getElementById('eiTool').value.trim() || null;
  } else {
    upd.description = document.getElementById('eiDesc').value.trim() || null;
  }
  closeModal();
  await sb.from('deployops_checklist_items').update(upd).eq('id', id);
  toast('Updated','ok');
  await loadCheckItems();
  renderChecklist();
}

async function moveItem(id, direction) {
  const items = checkItems.filter(i => i.section_type === clSubTab).sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  const idx = items.findIndex(i => i.id === id);
  const swapIdx = idx + direction;
  if (swapIdx < 0 || swapIdx >= items.length) return;

  const a = items[idx], b = items[swapIdx];
  const aOrder = a.sort_order || idx, bOrder = b.sort_order || swapIdx;
  await sb.from('deployops_checklist_items').update({ sort_order: bOrder }).eq('id', a.id);
  await sb.from('deployops_checklist_items').update({ sort_order: aOrder }).eq('id', b.id);
  await loadCheckItems();
  renderChecklist();
}

function exportChecklistCSV() {
  const items = checkItems.filter(i => i.section_type === clSubTab).sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  if (items.length === 0) { toast('No items to export','err'); return; }

  let csv = '';
  if (clSubTab === 'screw') {
    csv = 'Section,Sort Order,Label,Part Number,Qty,Tool\n';
    items.forEach(i => {
      csv += `"${i.section_name}",${i.sort_order||0},"${i.label}","${i.part_number||''}",${i.qty||''},"${i.tool||''}"\n`;
    });
  } else {
    csv = 'Section,Sort Order,Label,Description\n';
    items.forEach(i => {
      csv += `"${i.section_name}",${i.sort_order||0},"${i.label}","${i.description||''}"\n`;
    });
  }

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${currentDrawing.drawing_ref}_${clSubTab}_checklist.csv`;
  a.click();
  toast('CSV exported','ok');
}

function buildSectionsHTML(items, unitChecks_arr, showCheckboxState) {
  const checkSections = {}, screwSections = {};
  items.forEach(i => {
    const target = i.section_type === 'screw' ? screwSections : checkSections;
    if (!target[i.section_name]) target[i.section_name] = [];
    target[i.section_name].push(i);
  });

  let html = '';

  // Checks
  if (Object.keys(checkSections).length > 0) {
    html += '<h3 style="font-size:13px;margin:10px 0 6px">✅ Checks</h3>';
    Object.entries(checkSections).forEach(([sec, sitems]) => {
      html += `<div class="section"><div class="section-title">${sec}</div>
        <table><tr><th style="width:30px">✓</th><th style="width:30px">#</th><th>Item</th><th>Description</th></tr>`;
      sitems.forEach((item, i) => {
        const ck = showCheckboxState && unitChecks_arr ? unitChecks_arr.some(c => c.item_id === item.id && c.checked) : false;
        html += `<tr><td><span class="cb ${ck?'done':''}"></span></td>
          <td>${item.sort_order || i+1}</td>
          <td>${item.label}</td>
          <td class="meta">${item.description || ''}</td></tr>`;
      });
      html += '</table></div>';
    });
  }

  // Screws
  if (Object.keys(screwSections).length > 0) {
    html += '<h3 style="font-size:13px;margin:14px 0 6px">🔩 Required Screws / Parts</h3>';
    Object.entries(screwSections).forEach(([sec, sitems]) => {
      html += `<div class="section"><div class="section-title">${sec}</div>
        <table><tr><th style="width:30px">✓</th><th>Part Number</th><th>Description</th><th style="width:60px">Qty</th><th>Tool</th></tr>`;
      sitems.forEach(item => {
        const ck = showCheckboxState && unitChecks_arr ? unitChecks_arr.some(c => c.item_id === item.id && c.checked) : false;
        html += `<tr><td><span class="cb ${ck?'done':''}"></span></td>
          <td><strong>${item.part_number || '—'}</strong></td>
          <td>${item.label}</td>
          <td class="qty">×${item.qty || '—'}</td>
          <td class="meta">${item.tool || '—'}</td></tr>`;
      });
      html += '</table></div>';
    });
  }

  return html;
}

function printChecklist() {
  const items = checkItems.filter(i => i.visible !== false).sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  if (items.length === 0) { toast('No items to print','err'); return; }
  const body = buildSectionsHTML(items, null, false);
  const html = buildPrintHTML(
    currentDrawing.name + ' — Checklist Template',
    currentDrawing.drawing_ref + '  |  ' + new Date().toLocaleDateString(),
    body
  );
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.print(); };
}

function printUnitChecklist() {
  if (!deployUnit) return;
  const items = checkItems.filter(i => i.visible !== false).sort((a,b) => (a.sort_order||0)-(b.sort_order||0));
  const uc = unitChecks[deployUnit.id] || [];
  const done = items.filter(i => uc.some(c => c.item_id === i.id && c.checked)).length;
  const body = `<div style="margin-bottom:12px;font-size:12px"><strong>Progress:</strong> ${done}/${items.length} complete</div>` +
    buildSectionsHTML(items, uc, true);
  const html = buildPrintHTML(
    deployUnit.unit_name + ' — Deploy Checklist',
    currentDrawing.drawing_ref + ' — ' + currentDrawing.name + '  |  ' + new Date().toLocaleDateString(),
    body
  );
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.print(); };
}

// ============================================================
// UNITS
// ============================================================
async function loadUnits() {
  if (!currentDrawing) { units = []; return; }
  const { data } = await sb.from('deployops_units').select('*').eq('drawing_id', currentDrawing.id).order('created_at');
  units = data || [];
}

function renderDeploy() {
  const el = document.getElementById('deployContent');
  if (!currentDrawing) {
    el.innerHTML = `<div class="empty"><div class="icon">🚀</div><p>Select a drawing first</p></div>`;
    return;
  }

  if (deployUnit) { renderUnitChecklist(el); return; }

  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <h2 style="font-size:18px;flex:1">🤖 Robot Units — ${currentDrawing.name}</h2>
      <button class="btn btn-primary admin-only" onclick="showAddUnitModal()">➕ Add Unit</button>
    </div>
  `;

  if (units.length === 0) {
    html += `<div class="empty"><div class="icon">🤖</div><p>No units yet. Add one to start deploying.</p></div>`;
  } else {
    html += `<div class="units-grid">`;
    units.forEach(u => {
      const total = checkItems.filter(i=>i.visible!==false).length;
      const done = (unitChecks[u.id] || []).filter(c => c.checked).length;
      const pct = total > 0 ? Math.round(done/total*100) : 0;
      html += `
        <div class="unit-card" onclick="openUnit('${u.id}')">
          <h3>🤖 ${u.unit_name}</h3>
          ${u.notes?`<p style="font-size:11px;color:var(--text2)">${u.notes}</p>`:''}
          <div class="progress">${done} / ${total} checked (${pct}%)</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div style="margin-top:8px;display:flex;gap:4px;justify-content:flex-end" onclick="event.stopPropagation()">
            <button class="btn btn-sm admin-only btn-danger" onclick="deleteUnit('${u.id}')">🗑️</button>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function showAddUnitModal() {
  showModal(`
    <h3>➕ Add Robot Unit</h3>
    <label>Unit Name</label>
    <input id="uName" placeholder="e.g. TX-001">
    <label>Notes (optional)</label>
    <textarea id="uNotes" placeholder="Location, batch, etc."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addUnit()">Add</button>
    </div>
  `);
}

async function addUnit() {
  const name = document.getElementById('uName').value.trim();
  if (!name) { toast('Enter a unit name','err'); return; }
  closeModal();
  const { error } = await sb.from('deployops_units').insert({
    drawing_id: currentDrawing.id,
    unit_name: name,
    notes: document.getElementById('uNotes').value.trim(),
    created_by: currentUser?.email || 'unknown'
  });
  if (error) { toast('Add failed: ' + error.message,'err'); return; }
  toast(`Unit "${name}" created`,'ok');
  await loadUnits();
  await loadAllUnitChecks();
  renderDeploy();
}

async function deleteUnit(id) {
  if (!confirm('Delete this unit and all its check data?')) return;
  await sb.from('deployops_unit_checks').delete().eq('unit_id', id);
  await sb.from('deployops_units').delete().eq('id', id);
  toast('Unit deleted','ok');
  await loadUnits();
  delete unitChecks[id];
  renderDeploy();
}

async function loadAllUnitChecks() {
  unitChecks = {};
  for (const u of units) {
    const { data } = await sb.from('deployops_unit_checks').select('*').eq('unit_id', u.id);
    unitChecks[u.id] = data || [];
  }
}

async function openUnit(unitId) {
  deployUnit = units.find(u => u.id === unitId);
  if (!deployUnit) return;
  if (!unitChecks[unitId]) {
    const { data } = await sb.from('deployops_unit_checks').select('*').eq('unit_id', unitId);
    unitChecks[unitId] = data || [];
  }
  renderDeploy();
}

function renderUnitChecklist(el) {
  const u = deployUnit;
  const checks = unitChecks[u.id] || [];
  const items = checkItems.filter(i => i.visible !== false);
  const done = items.filter(i => checks.some(c => c.item_id === i.id && c.checked)).length;
  const pct = items.length > 0 ? Math.round(done/items.length*100) : 0;

  // Group by section_type then section_name
  const checkSections = {}, screwSections = {};
  items.forEach(i => {
    const target = i.section_type === 'screw' ? screwSections : checkSections;
    if (!target[i.section_name]) target[i.section_name] = [];
    target[i.section_name].push(i);
  });

  let html = `
    <div class="deploy-header">
      <button class="btn btn-sm no-print" onclick="deployUnit=null;renderDeploy()">← Back</button>
      <h2>🤖 ${u.unit_name}</h2>
      <button class="btn btn-sm no-print" onclick="printUnitChecklist()">🖨️ Print</button>
    </div>
    <div class="deploy-progress">
      <div class="fill" style="width:${pct}%"></div>
      <div class="txt">${done} / ${items.length} complete (${pct}%)</div>
    </div>
    <div style="height:14px"></div>
  `;

  // Check sections
  if (Object.keys(checkSections).length > 0) {
    html += `<h3 style="font-size:14px;color:var(--text2);margin:12px 0 8px">✅ Checks</h3>`;
    Object.entries(checkSections).forEach(([secName, secItems]) => {
      html += renderDeploySection(secName, secItems, checks, u.id, false);
    });
  }

  // Screw sections
  if (Object.keys(screwSections).length > 0) {
    html += `<h3 style="font-size:14px;color:var(--text2);margin:16px 0 8px">🔩 Required Screws / Parts</h3>`;
    Object.entries(screwSections).forEach(([secName, secItems]) => {
      html += renderDeploySection(secName, secItems, checks, u.id, true);
    });
  }

  if (items.length === 0) {
    html += `<div class="empty"><p>No checklist items defined yet. Go to the Checklist tab to add items.</p></div>`;
  }

  el.innerHTML = html;
}

function renderDeploySection(secName, items, checks, unitId, isScrew) {
  let html = `<div class="deploy-section">
    <div class="deploy-section-header">
      <span>${isScrew?'🔩':'✅'}</span> ${secName}
      <span class="badge badge-blue" style="margin-left:auto">${items.filter(i=>checks.some(c=>c.item_id===i.id&&c.checked)).length}/${items.length}</span>
    </div>`;
  items.forEach(item => {
    const ck = checks.find(c => c.item_id === item.id);
    const checked = ck?.checked || false;
    html += `<div class="deploy-item ${checked?'checked':''}">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleUnitCheck('${unitId}','${item.id}',this.checked)">
      <div class="di-label">
        ${item.label}
        ${item.description?`<span class="sub">${item.description}</span>`:''}
        ${item.part_number?`<span class="sub" style="color:var(--accent)">${item.part_number}${item.tool?' — '+item.tool:''}</span>`:''}
      </div>
      ${item.qty?`<div class="di-qty">×${item.qty}</div>`:''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

async function toggleUnitCheck(unitId, itemId, checked) {
  const now = new Date().toISOString();
  const { error } = await sb.from('deployops_unit_checks').upsert({
    unit_id: unitId, item_id: itemId,
    checked,
    checked_by: currentUser?.email || 'unknown',
    checked_at: checked ? now : null
  }, { onConflict: 'unit_id,item_id' });

  if (error) { toast('Save failed','err'); return; }

  // Update local state
  const checks = unitChecks[unitId] || [];
  const existing = checks.find(c => c.item_id === itemId);
  if (existing) { existing.checked = checked; existing.checked_by = currentUser?.email; existing.checked_at = checked?now:null; }
  else { checks.push({ unit_id: unitId, item_id: itemId, checked, checked_by: currentUser?.email, checked_at: checked?now:null }); }
  unitChecks[unitId] = checks;

  renderDeploy();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  initAuth();
  await loadDrawings();
  // Auto-select first drawing if any
  if (drawings.length > 0) {
    document.getElementById('drawingSelect').value = drawings[0].id;
    await selectDrawing(drawings[0].id);
  }
  renderDrawing();
}

init();
</script>
